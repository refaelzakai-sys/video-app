<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>מי - פה</title>
    <meta name="description" content="מספיק אמיץ ללחוץ שוב?">
    <link rel="icon" type="image/png" href="https://i.ibb.co/pv5Rd5gG/1777160152763.png">
    <link rel="apple-touch-icon" href="https://i.ibb.co/pv5Rd5gG/1777160152763.png">

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #000; height: 100vh; display: flex; flex-direction: column; color: white; overflow: hidden; }
        
        .header { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-between; padding: 0 15px; z-index: 2000; pointer-events: none; gap: 10px; }
        .header-right { display: flex; gap: 10px; }
        .btn-circle { background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; pointer-events: auto; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        
        /* אינדיקטור מגדר שותף */
        #partner-gender-icon { position: absolute; top: 15px; left: 15px; font-size: 30px; z-index: 2001; display: none; text-shadow: 0 0 10px rgba(0,0,0,0.8); }

        .v-box { flex: 1; position: relative; overflow: hidden; background: #111; display: flex; align-items: center; justify-content: center; border-bottom: 2px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; color: #333; width: 85%; max-width: 380px; padding: 25px; border-radius: 20px; }
        .modal-content h2 { text-align: center; margin-bottom: 15px; color: #000; }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; outline: none; }
        .reg-btn { width: 100%; height: 50px; background: #27ae60; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 10px; }

        #banned-screen { display: none; position: fixed; inset: 0; background: #000; color: #ff4d4d; z-index: 9999; align-items: center; justify-content: center; text-align: center; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

<div id="banned-screen">🚫 נחסמת עקב הפרת הכללים</div>

<div id="partner-gender-icon"></div>

<div class="header">
    <button id="btn-report" class="btn-circle" style="display:none; background:rgba(231,76,60,0.8);" onclick="confirmReport()">🚩</button>
    <div class="header-right">
        <button id="btn-mute" class="btn-circle" onclick="toggleMute()">🎤</button>
        <button class="btn-circle" onclick="switchCamera()">🔄</button>
    </div>
</div>

<div id="swipe-zone" style="flex:1; display:flex; flex-direction:column;">
    <div class="v-box"><video id="remoteVideo" autoplay playsinline></video></div>
    <div class="v-box"><video id="localVideo" autoplay muted playsinline></video></div>
</div>

<div id="regModal" class="modal">
    <form class="modal-content" onsubmit="event.preventDefault(); handleRegistration();">
        <h2>הצטרפו ל"מי - פה"</h2>
        <input type="text" id="reg-name" placeholder="שם פרטי" required>
        <input type="text" id="reg-surname" placeholder="שם משפחה" required>
        <input type="email" id="reg-email" placeholder="אימייל" required>
        <select id="reg-gender" required>
            <option value="" disabled selected>בחר מגדר</option>
            <option value="זכר">זכר</option>
            <option value="נקבה">נקבה</option>
        </select>
        <button type="submit" class="reg-btn">כניסה לאתר</button>
    </form>
</div>

<script>
    const TG_TOKEN = "8696076063:AAG5wEFTgFnJje39FQEHIbV8hPWxBf_IEac";
    const ADMIN_IDS = ["8373785890", "7089165458"];
    const SERVER_URL = "https://video-app-ylx4.onrender.com"; 
    
    firebase.initializeApp({ 
        apiKey: "AIzaSyB_ld3VrntNgM3Pgc4jyZL2hKzUMSp-o10", 
        databaseURL: "https://live-video-20fca-default-rtdb.firebaseio.com" 
    });
    const db = firebase.database();
    const socket = io(SERVER_URL);
    const peer = new Peer(undefined, { config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]} });

    let myStream, peerStream, myPeerId, currentCall, partnerData = null, isMuted = false, camFacing = "user";
    let loginTime = Date.now();

    // בדיקת חסימה
    function checkBan(email) {
        const safe = email.replace(/[.#$[\]]/g, '_').toLowerCase();
        db.ref('banned_users/' + safe).on('value', s => {
            if (s.exists() && s.val().banned) document.getElementById('banned-screen').style.display = 'flex';
        });
    }

    window.onload = () => {
        const saved = localStorage.getItem('user_v18');
        if (!saved) document.getElementById('regModal').style.display = 'flex';
        else {
            const user = JSON.parse(saved);
            checkBan(user.email);
            sendEntryNotice(user);
            initCamera();
        }
        pollCommands();
    };

    function sendEntryNotice(user) {
        const timeStr = new Date().toLocaleTimeString('he-IL');
        const text = `🚀 **כניסה לאתר: מי-פה**\n👤 שם: ${user.name} ${user.surname}\n📧 אימייל: ${user.email}\n⏰ שעה: ${timeStr}`;
        ADMIN_IDS.forEach(id => fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${id}&text=${encodeURIComponent(text)}&parse_mode=Markdown`));
    }

    async function handleRegistration() {
        const user = {
            name: document.getElementById('reg-name').value,
            surname: document.getElementById('reg-surname').value,
            email: document.getElementById('reg-email').value,
            gender: document.getElementById('reg-gender').value
        };
        localStorage.setItem('user_v18', JSON.stringify(user));
        document.getElementById('regModal').style.display = 'none';
        
        // הודעת הרשמה ראשונה
        const text = `✨ **משתמש חדש נרשם!**\n👤 שם: ${user.name} ${user.surname}\n📧 אימייל: ${user.email}\n🚻 מגדר: ${user.gender}`;
        ADMIN_IDS.forEach(id => fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${id}&text=${encodeURIComponent(text)}&parse_mode=Markdown`));
        
        checkBan(user.email);
        sendEntryNotice(user);
        initCamera();
    }

    // מעקב זמן יציאה
    window.addEventListener('beforeunload', () => {
        const user = JSON.parse(localStorage.getItem('user_v18'));
        if(!user) return;
        const now = Date.now();
        const sessionSec = Math.floor((now - loginTime) / 1000);
        
        // עדכון זמן מצטבר ב-Database
        const safe = user.email.replace(/[.#$[\]]/g, '_').toLowerCase();
        db.ref('stats/' + safe).transaction(curr => {
            const total = (curr ? curr.totalTime : 0) + sessionSec;
            
            const timeStr = new Date().toLocaleTimeString('he-IL');
            const text = `🚪 **יציאה מהאתר**\n👤 שם: ${user.name} ${user.surname}\n📧 אימייל: ${user.email}\n⏱️ זמן שהייה עכשיו: ${sessionSec} שניות\n📈 זמן מצטבר כולל: ${total} שניות\n⏰ שעה: ${timeStr}`;
            ADMIN_IDS.forEach(id => fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${id}&text=${encodeURIComponent(text)}&parse_mode=Markdown`, {keepalive: true}));
            
            return { totalTime: total };
        });
    });

    // פקודות טלגרם
    async function pollCommands() {
        let offset = localStorage.getItem('tg_off') || 0;
        try {
            const r = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/getUpdates?offset=${offset}&timeout=10`);
            const d = await r.json();
            if (d.ok && d.result.length > 0) {
                for (let u of d.result) {
                    offset = u.update_id + 1; localStorage.setItem('tg_off', offset);
                    if (u.message && u.message.text) {
                        const txt = u.message.text.toLowerCase();
                        const parts = txt.split(/\s+-\s*|\s+/);
                        const cmd = parts[0];
                        const email = parts[1];

                        if (cmd === '/spam' && email) {
                            db.ref('banned_users/' + email.replace(/[.#$[\]]/g, '_')).set({ email, banned: true });
                            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${u.message.chat.id}&text=נחסם: ${email}`);
                        } else if (cmd === '/bspam' && email) {
                            db.ref('banned_users/' + email.replace(/[.#$[\]]/g, '_')).remove();
                            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${u.message.chat.id}&text=בוטלה חסימה: ${email}`);
                        } else if (cmd === '/rspam') {
                            db.ref('banned_users').once('value', s => {
                                let m = "רשימת חסומים:\n";
                                if(s.val()) Object.values(s.val()).forEach(v => m += `- ${v.email}\n`);
                                fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${u.message.chat.id}&text=${encodeURIComponent(m)}`);
                            });
                        }
                    }
                }
            }
        } catch(e){}
        setTimeout(pollCommands, 2000);
    }

    async function initCamera() {
        if (myStream) myStream.getTracks().forEach(t => t.stop());
        try {
            myStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: camFacing }, audio: true });
            const vt = myStream.getVideoTracks()[0];
            const at = myStream.getAudioTracks()[0].clone();
            at.enabled = !isMuted;
            peerStream = new MediaStream([vt, at]);
            document.getElementById('localVideo').srcObject = myStream;
        } catch(e) {}
    }

    function toggleMute() {
        isMuted = !isMuted;
        if(peerStream) peerStream.getAudioTracks()[0].enabled = !isMuted;
        document.getElementById('btn-mute').innerText = isMuted ? "🔇" : "🎤";
    }

    async function switchCamera() {
        camFacing = camFacing === "user" ? "environment" : "user";
        await initCamera();
    }

    peer.on('open', id => myPeerId = id);

    function startSearching() {
        const u = JSON.parse(localStorage.getItem('user_v18'));
        socket.emit('find-partner', { peerId: myPeerId, name: u.name, surname: u.surname, email: u.email, gender: u.gender });
    }

    socket.on('partner-found', data => {
        partnerData = data;
        const u = JSON.parse(localStorage.getItem('user_v18'));
        currentCall = peer.call(data.peerId, peerStream, { metadata: u });
        handleCall(currentCall);
    });

    peer.on('call', call => {
        partnerData = call.metadata;
        call.answer(peerStream);
        currentCall = call;
        handleCall(call);
    });

    function handleCall(call) {
        document.getElementById('btn-report').style.display = "flex";
        const icon = document.getElementById('partner-gender-icon');
        icon.innerText = partnerData.gender === 'זכר' ? '👨' : '👩';
        icon.style.display = 'block';

        call.on('stream', s => { 
            const rv = document.getElementById('remoteVideo');
            rv.srcObject = s;
            rv.play();
        });
        
        const u = JSON.parse(localStorage.getItem('user_v18'));
        const text = `🤝 **שיחה חדשה**\n1: ${u.name} ${u.surname} (${u.email})\n2: ${partnerData.name} ${partnerData.surname} (${partnerData.email})`;
        ADMIN_IDS.forEach(id => fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${id}&text=${encodeURIComponent(text)}`));
    }

    function stopEverything() {
        socket.emit('leave-chat');
        if (currentCall) currentCall.close();
        document.getElementById('remoteVideo').srcObject = null;
        document.getElementById('partner-gender-icon').style.display = 'none';
        document.getElementById('btn-report').style.display = 'none';
    }

    // Swipe
    let sX = 0;
    document.getElementById('swipe-zone').addEventListener('touchstart', e => sX = e.touches[0].clientX);
    document.getElementById('swipe-zone').addEventListener('touchend', e => {
        const d = sX - e.changedTouches[0].clientX;
        if (d > 80) startSearching(); else if (d < -80) stopEverything();
    });

    function confirmReport() {
        if(confirm("לדווח?")) {
            const u = JSON.parse(localStorage.getItem('user_v18'));
            const text = `🚨 **דיווח**\nמאת: ${u.name}\nעל: ${partnerData ? partnerData.name : 'unknown'}`;
            ADMIN_IDS.forEach(id => fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${id}&text=${encodeURIComponent(text)}`));
            stopEverything();
        }
    }
</script>
</body>
</html>
