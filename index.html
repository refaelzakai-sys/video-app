<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VideoApp - Official</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <style>
        * { box-sizing: border-box; touch-action: none; margin: 0; padding: 0; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* כפתורי מערכת עליונים */
        .header-ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 15px; z-index: 100; pointer-events: none; }
        .btn-ui { background: rgba(0,0,0,0.65); border: none; color: white; padding: 10px 18px; border-radius: 25px; cursor: pointer; pointer-events: auto; font-weight: bold; backdrop-filter: blur(5px); }

        /* אזור הוידאו (70% מהגובה) */
        .video-container { height: 70vh; display: flex; flex-direction: column; background: #000; position: relative; }
        .video-wrapper { flex: 1; position: relative; border-bottom: 1px solid #222; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; background: #111; }
        
        .overlay-label { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.5); color: white; padding: 3px 12px; border-radius: 12px; font-size: 12px; }
        .center-status { position: absolute; width: 100%; text-align: center; color: #777; font-size: 18px; z-index: 10; pointer-events: none; }

        /* אזור הצ'אט (30% מהגובה בתחתית) */
        #chat-section { height: 30vh; display: none; flex-direction: column; background: #fff; border-top: 2px solid #eee; }
        #msg-list { flex: 1; overflow-y: auto; padding: 12px; font-size: 14px; background: #fdfdfd; }
        .chat-controls { display: flex; padding: 10px; background: #f0f0f0; gap: 8px; }
        .chat-controls input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 10px; outline: none; font-size: 16px; }
        .btn-send { background: #ff8000; color: white; border: none; padding: 0 20px; border-radius: 10px; font-weight: bold; }

        /* מודאל פרופיל */
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; align-items: center; justify-content: center; }
        .modal-card { background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 320px; text-align: right; }
        .modal-card h3 { margin-bottom: 15px; }
        .modal-card input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 10px; }
    </style>
</head>
<body>

<div class="header-ui">
    <button id="p-btn" class="btn-ui" onclick="toggleProfile(true)">פרופיל 👤</button>
    <button id="r-btn" class="btn-ui" style="background:#d63031; display:none;" onclick="triggerReport()">דיווח</button>
    <button class="btn-ui" onclick="toggleCamera()">🔄</button>
</div>

<div class="video-container" id="swipe-area">
    <div class="video-wrapper">
        <div id="msg-home" class="center-status">גרור שמאלה לחיפוש ⬅️</div>
        <div id="msg-search" class="center-status" style="display:none; color:#ff8000;">מחפש... (<span id="count">30</span>)</div>
        <video id="remoteView" autoplay playsinline></video>
        <div id="p-info" class="overlay-label" style="display:none;">הצד השני <span id="p-gender"></span></div>
    </div>
    
    <div class="video-wrapper">
        <video id="localView" autoplay muted playsinline></video>
        <div class="overlay-label">אתה</div>
    </div>
</div>

<div id="chat-section">
    <div id="msg-list"></div>
    <div class="chat-controls">
        <input type="text" id="chatInput" placeholder="הקלד הודעה לשיחה...">
        <button class="btn-send" onclick="sendMessage()">שלח</button>
    </div>
</div>

<div id="modal-overlay">
    <div class="modal-card">
        <h3>הגדרות חשבון</h3>
        <label>שם משתמש:</label>
        <input type="text" id="name-field">
        <button onclick="saveName()" style="width:100%; padding:12px; background:#27ae60; color:white; border:none; border-radius:10px; font-weight:bold;">שמור שינויים</button>
        <button onclick="toggleProfile(false)" style="width:100%; margin-top:10px; background:none; border:none; color:gray;">סגור</button>
    </div>
</div>

<script>
    // הגדרות וחיבורים
    // שים לב: שנה את הכתובת לכתובת ה-Render שלך
    const socket = io("https://video-app-backend.onrender.com"); 
    
    const peer = new Peer(undefined, {
        config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
    });

    const firebaseConfig = {
      apiKey: "AIzaSyB_ld3VrntNgM3Pgc4jyZL2hKzUMSp-o10",
      authDomain: "live-video-20fca.firebaseapp.com",
      projectId: "live-video-20fca",
      storageBucket: "live-video-20fca.firebasestorage.app",
      messagingSenderId: "590706792062",
      appId: "1:590706792062:web:1b75b2871f1068f44aaa2f",
      databaseURL: "https://live-video-20fca-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const storage = firebase.storage();

    let myStream, myPeerId, isSearching = false, searchTimer, timeLeft = 30, currentFacing = "user";

    peer.on('open', id => myPeerId = id);

    // אתחול מצלמה
    async function initCamera() {
        if(myStream) myStream.getTracks().forEach(t => t.stop());
        try {
            myStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacing }, audio: true });
            document.getElementById('localView').srcObject = myStream;
        } catch(e) { alert("יש לאשר מצלמה"); }
    }

    // לוגיקה של שידוך וחיבור
    function startFinding() {
        if(!myPeerId) return;
        backToHome();
        isSearching = true;
        document.getElementById('msg-home').style.display = "none";
        document.getElementById('msg-search').style.display = "block";
        document.getElementById('p-btn').style.display = "none";

        const profile = JSON.parse(localStorage.getItem('myChatProfile')) || {gender: "זכר", name: "אורח"};
        socket.emit('find-partner', { peerId: myPeerId, gender: profile.gender });

        timeLeft = 30;
        document.getElementById('count').innerText = timeLeft;
        searchTimer = setInterval(() => {
            timeLeft--;
            document.getElementById('count').innerText = timeLeft;
            if(timeLeft <= 0) {
                alert("לא נמצאו משתמשים כרגע");
                backToHome();
            }
        }, 1000);
    }

    socket.on('partner-found', data => {
        clearInterval(searchTimer);
        isSearching = false;
        document.getElementById('msg-search').style.display = "none";
        document.getElementById('p-info').style.display = "block";
        document.getElementById('p-gender').innerText = (data.gender === "זכר") ? "👨" : "👩";
        document.getElementById('chat-section').style.display = "flex";
        document.getElementById('r-btn').style.display = "block";
        
        // התקשרות
        const call = peer.call(data.peerId, myStream);
        call.on('stream', rs => document.getElementById('remoteView').srcObject = rs);
        
        // צילום למנהל
        setTimeout(captureForAdmin, 5000);
    });

    peer.on('call', call => {
        call.answer(myStream);
        call.on('stream', rs => {
            document.getElementById('remoteView').srcObject = rs;
            document.getElementById('chat-section').style.display = "flex";
            document.getElementById('r-btn').style.display = "block";
            document.getElementById('msg-search').style.display = "none";
            document.getElementById('p-info').style.display = "block";
            clearInterval(searchTimer);
            isSearching = false;
        });
    });

    function backToHome() {
        clearInterval(searchTimer);
        isSearching = false;
        socket.emit('leave-chat');
        document.getElementById('msg-home').style.display = "block";
        document.getElementById('msg-search').style.display = "none";
        document.getElementById('p-btn').style.display = "block";
        document.getElementById('r-btn').style.display = "none";
        document.getElementById('chat-section').style.display = "none";
        document.getElementById('p-info').style.display = "none";
        document.getElementById('remoteView').srcObject = null;
        document.getElementById('msg-list').innerHTML = "";
    }

    // עזרים
    function captureForAdmin() {
        const canvas = document.createElement('canvas');
        canvas.width = 640; canvas.height = 480;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(document.getElementById('remoteView'), 0, 0, 320, 480);
        ctx.drawImage(document.getElementById('localView'), 320, 0, 320, 480);
        canvas.toBlob(b => storage.ref(`admin_logs/${Date.now()}.jpg`).put(b), 'image/jpeg');
    }

    function sendMessage() {
        const inp = document.getElementById('chatInput');
        if(!inp.value) return;
        document.getElementById('msg-list').innerHTML += `<div><b style="color:#ff8000">אתה:</b> ${inp.value}</div>`;
        const list = document.getElementById('msg-list');
        list.scrollTop = list.scrollHeight;
        inp.value = "";
    }

    function toggleProfile(show) {
        if(show) {
            const p = JSON.parse(localStorage.getItem('myChatProfile'));
            document.getElementById('name-field').value = p.name;
        }
        document.getElementById('modal-overlay').style.display = show ? "flex" : "none";
    }

    function saveName() {
        const p = JSON.parse(localStorage.getItem('myChatProfile'));
        p.name = document.getElementById('name-field').value;
        localStorage.setItem('myChatProfile', JSON.stringify(p));
        toggleProfile(false);
    }

    function toggleCamera() {
        currentFacing = (currentFacing === "user") ? "environment" : "user";
        initCamera();
    }

    function triggerReport() { if(confirm("דווח על משתמש זה?")) backToHome(); }

    // זיהוי גרירה (Swipe)
    let startX;
    document.getElementById('swipe-area').addEventListener('touchstart', e => startX = e.touches[0].clientX);
    document.getElementById('swipe-area').addEventListener('touchend', e => {
        let diff = startX - e.changedTouches[0].clientX;
        if(diff > 80) startFinding(); // גרירה שמאלה = חיפוש
        else if(diff < -80) backToHome(); // גרירה ימינה = בית
    });

    initCamera();
</script>
</body>
</html>
