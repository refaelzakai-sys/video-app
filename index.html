<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VideoApp Pro - Swipe & Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #000; height: 100vh; display: flex; flex-direction: column; color: white; overflow: hidden; }
        
        /* כפתורי בקרה */
        .header { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-between; padding: 0 15px; z-index: 100; pointer-events: none; }
        .btn { background: rgba(255,255,255,0.15); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px 20px; border-radius: 30px; cursor: pointer; pointer-events: auto; font-weight: bold; font-size: 14px; }
        
        /* אזור הוידאו */
        .video-container { height: 65vh; display: flex; flex-direction: column; position: relative; background: #000; }
        .v-box { flex: 1; position: relative; border-bottom: 2px solid #111; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #0a0a0a; }
        video { width: 100%; height: 100%; object-fit: cover; z-index: 5; position: relative; background: #000; }
        
        .pfp-placeholder { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 2; filter: blur(8px); opacity: 0.4; transition: opacity 0.5s; }
        .status-msg { position: absolute; z-index: 20; color: #fff; text-align: center; width: 100%; pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .searching-text { color: #3498db; font-weight: bold; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* אזור הצ'אט */
        #chat-section { height: 35vh; display: none; flex-direction: column; background: #ffffff; color: #000; z-index: 50; }
        #messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; background: #fdfdfd; }
        
        /* בועות הודעה */
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.4; word-wrap: break-word; position: relative; }
        .msg.me { align-self: flex-start; background: #e9e9eb; color: #000; border-bottom-right-radius: 4px; }
        .msg.partner { align-self: flex-end; background: #007aff; color: #fff; border-bottom-left-radius: 4px; text-align: right; }
        
        .chat-input-area { display: flex; padding: 10px; background: #f1f1f1; border-top: 1px solid #ddd; gap: 10px; align-items: center; }
        .chat-input-area input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #ccc; outline: none; font-size: 16px; }

        /* הרשמה */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #fff; color: #333; width: 100%; max-width: 400px; padding: 30px; border-radius: 25px; }
        .modal-content input, .modal-content select { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; }
    </style>
</head>
<body>

<div class="header">
    <div></div>
    <button id="btn-report" class="btn" style="background:#c0392b; display:none;" onclick="reportAndNext()">דיווח 🚩</button>
    <button class="btn" onclick="switchCamera()">🔄 החלף מצלמה</button>
</div>

<div class="video-container" id="swipe-zone">
    <div class="v-box">
        <div id="msg-idle" class="status-msg">⬅️ שמאלה לחיפוש | ימינה לביטול ➡️</div>
        <div id="msg-search" class="status-msg searching-text" style="display:none;">מחפש שותף מעניין...</div>
        <img id="partner-pfp" class="pfp-placeholder" src="" style="display:none;">
        <video id="remoteVideo" autoplay playsinline></video>
    </div>
    
    <div class="v-box" style="height: 35%;">
        <video id="localVideo" autoplay muted playsinline></video>
        <div style="position:absolute; bottom:10px; right:10px; background:rgba(231, 76, 60, 0.7); padding:4px 10px; border-radius:10px; font-size:11px; font-weight:bold;">LIVE 🔴</div>
    </div>
</div>

<div id="chat-section">
    <div id="messages"></div>
    <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="כתוב הודעה..." onkeypress="if(event.key==='Enter') sendChatMessage()">
        <button onclick="sendChatMessage()" style="background:none; border:none; font-size:24px; cursor:pointer;">🚀</button>
    </div>
</div>

<div id="regModal" class="modal">
    <div class="modal-content">
        <h2 style="text-align:center;">הגדרות</h2>
        <input type="text" id="reg-name" placeholder="השם שלך">
        <input type="email" id="reg-email" placeholder="אימייל">
        <label style="font-size:13px; color:#666; margin-top:10px; display:block;">תמונת פרופיל (אופציונלי):</label>
        <input type="file" id="reg-pfp" accept="image/*">
        <select id="reg-gender">
            <option value="זכר">זכר</option>
            <option value="נקבה">נקבה</option>
        </select>
        <button id="reg-submit" class="btn" style="background:#2ecc71; width:100%; margin-top:20px; border:none;" onclick="handleRegistration()">צא לדרך!</button>
    </div>
</div>

<script>
    const SERVER_URL = "https://video-app-ylx4.onrender.com"; 
    const socket = io(SERVER_URL);
    const peer = new Peer(undefined, {
        config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
    });

    const firebaseConfig = {
      apiKey: "AIzaSyB_ld3VrntNgM3Pgc4jyZL2hKzUMSp-o10",
      authDomain: "live-video-20fca.firebaseapp.com",
      projectId: "live-video-20fca",
      storageBucket: "live-video-20fca.firebasestorage.app",
      messagingSenderId: "590706792062",
      appId: "1:590706792062:web:1b75b2871f1068f44aaa2f"
    };
    firebase.initializeApp(firebaseConfig);
    const storage = firebase.storage();

    let myStream, myPeerId, currentCall, isSearching = false, inChat = false, camFacing = "user";

    window.onload = () => {
        if (!localStorage.getItem('user_v3')) document.getElementById('regModal').style.display = 'flex';
        else initCamera();
    };

    async function handleRegistration() {
        const btn = document.getElementById('reg-submit');
        btn.disabled = true; btn.innerText = "מתחבר...";
        const email = document.getElementById('reg-email').value;
        const pfpFile = document.getElementById('reg-pfp').files[0];
        let pfpUrl = "";

        if (pfpFile) {
            const ref = storage.ref(`profiles/${email}_${Date.now()}`);
            await ref.put(pfpFile);
            pfpUrl = await ref.getDownloadURL();
        }

        const userData = { name: document.getElementById('reg-name').value, email: email, gender: document.getElementById('reg-gender').value, pfp: pfpUrl };
        localStorage.setItem('user_v3', JSON.stringify(userData));
        document.getElementById('regModal').style.display = 'none';
        initCamera();
    }

    async function initCamera() {
        if (myStream) myStream.getTracks().forEach(t => t.stop());
        try {
            myStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: camFacing }, audio: true });
            document.getElementById('localVideo').srcObject = myStream;
            if (currentCall && currentCall.peerConnection) {
                const videoTrack = myStream.getVideoTracks()[0];
                const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
                if (sender) sender.replaceTrack(videoTrack);
            }
        } catch (err) { alert("אשר מצלמה"); }
    }

    function switchCamera() { camFacing = (camFacing === "user" ? "environment" : "user"); initCamera(); }

    peer.on('open', id => myPeerId = id);

    function startSearching() {
        if (!myPeerId || isSearching) return;
        if (currentCall) currentCall.close();
        isSearching = true; inChat = false;
        
        document.getElementById('messages').innerHTML = "";
        document.getElementById('msg-idle').style.display = "none";
        document.getElementById('msg-search').style.display = "block";
        document.getElementById('chat-section').style.display = "none";
        document.getElementById('btn-report').style.display = "none";
        document.getElementById('remoteVideo').srcObject = null;
        document.getElementById('partner-pfp').style.display = "none";

        const user = JSON.parse(localStorage.getItem('user_v3'));
        socket.emit('find-partner', { peerId: myPeerId, gender: user.gender, pfpUrl: user.pfp });
    }

    function stopEverything() {
        isSearching = false; inChat = false;
        socket.emit('leave-chat');
        document.getElementById('msg-idle').style.display = "block";
        document.getElementById('msg-search').style.display = "none";
        document.getElementById('chat-section').style.display = "none";
        document.getElementById('btn-report').style.display = "none";
        document.getElementById('remoteVideo').srcObject = null;
        document.getElementById('partner-pfp').style.display = "none";
        if (currentCall) currentCall.close();
    }

    socket.on('partner-found', data => {
        setupChatUI(data.pfpUrl);
        currentCall = peer.call(data.peerId, myStream);
        handleStream(currentCall);
    });

    peer.on('call', call => {
        call.answer(myStream);
        currentCall = call;
        setupChatUI();
        handleStream(call);
    });

    function handleStream(call) {
        inChat = true; isSearching = false;
        call.on('stream', remoteStream => {
            const rv = document.getElementById('remoteVideo');
            rv.srcObject = remoteStream;
            rv.onloadedmetadata = () => { document.getElementById('partner-pfp').style.display = "none"; };
        });
        call.on('close', () => { if(inChat) startSearching(); });
    }

    function setupChatUI(pfp) {
        document.getElementById('msg-search').style.display = "none";
        document.getElementById('chat-section').style.display = "flex";
        document.getElementById('btn-report').style.display = "block";
        if (pfp) {
            const pfpImg = document.getElementById('partner-pfp');
            pfpImg.src = pfp;
            pfpImg.style.display = "block";
        }
    }

    // פונקציות הצ'אט
    function sendChatMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text || !inChat) return;
        
        socket.emit('send-chat-msg', text);
        addMessageToUI('me', text);
        input.value = "";
    }

    socket.on('receive-chat-msg', msg => {
        addMessageToUI('partner', msg);
    });

    function addMessageToUI(type, text) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        const container = document.getElementById('messages');
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    socket.on('partner-disconnected', () => { if (inChat) startSearching(); });

    function reportAndNext() {
        if(confirm("לדווח ולעבור לשותף הבא?")) {
            socket.emit('report-user');
            startSearching();
        }
    }

    let touchStartX = 0;
    document.getElementById('swipe-zone').addEventListener('touchstart', e => touchStartX = e.touches[0].clientX);
    document.getElementById('swipe-zone').addEventListener('touchend', e => {
        const diff = touchStartX - e.changedTouches[0].clientX;
        if (diff > 80) startSearching();
        else if (diff < -80) stopEverything();
    });
</script>
</body>
</html>
