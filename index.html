<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VideoApp - Next Gen</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    
    <style>
        * { box-sizing: border-box; touch-action: none; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #000; margin: 0; color: white; height: 100vh; overflow: hidden; }

        /* סרגל עליון */
        .header { position: absolute; top: 0; width: 100%; display: flex; justify-content: space-between; padding: 15px; z-index: 100; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); }
        .btn-ui { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; backdrop-filter: blur(5px); }
        
        /* אזור הוידאו */
        .main-view { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        .remote-container { flex: 1; background: #111; position: relative; display: flex; align-items: center; justify-content: center; }
        .local-container { height: 30%; background: #222; border-top: 2px solid #333; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .overlay-info { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 15px; font-size: 14px; }

        /* צ'אט אומיגל */
        #chat-box { position: absolute; bottom: 30%; width: 100%; height: 150px; background: rgba(255,255,255,0.9); color: #333; display: none; flex-direction: column; z-index: 50; }
        #msgs { flex: 1; overflow-y: auto; padding: 10px; font-size: 13px; }
        .chat-input { display: flex; border-top: 1px solid #ddd; }
        .chat-input input { flex: 1; border: none; padding: 12px; outline: none; }

        /* מודאל פרופיל */
        #profile-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; }
        .modal-content { background: white; color: #333; padding: 25px; border-radius: 15px; width: 80%; max-width: 300px; }

        /* הודעות מצב */
        #search-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.5); z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 18px; }
        .home-watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.3; font-size: 24px; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <button class="btn-ui" onclick="showProfile()">פרופיל 👤</button>
    <button class="btn-ui" style="background:red" onclick="confirmReport()">דיווח</button>
    <button class="btn-ui" onclick="switchCamera()">🔄</button>
</div>

<div class="main-view" id="swipe-zone">
    <div class="remote-container">
        <div id="home-msg" class="home-watermark">גרור שמאלה כדי להתחיל <br> ⬅️</div>
        <div id="search-status" style="display:none; text-align:center;">
            <div class="loader"></div> מחפש משתמש...
        </div>
        <video id="remoteVideo" autoplay playsinline></video>
        <div class="overlay-info" id="partner-tag" style="display:none;">הצד השני <span id="partner-emoji"></span></div>
    </div>
    
    <div class="local-container">
        <video id="localVideo" autoplay muted playsinline></video>
        <div class="overlay-info">אתה</div>
    </div>
</div>

<div id="chat-box">
    <div id="msgs"></div>
    <div class="chat-input">
        <input type="text" id="chatMsg" placeholder="כתוב הודעה...">
        <button onclick="sendMsg()" style="padding:10px; background:#ff8000; color:white; border:none;">></button>
    </div>
</div>

<div id="profile-modal">
    <div class="modal-content">
        <h3>עריכת פרופיל</h3>
        <label>שם:</label>
        <input type="text" id="edit-name" style="width:100%; padding:8px; margin:10px 0;">
        <button onclick="saveProfile()" style="width:100%; padding:10px; background:#28a745; color:white; border:none; border-radius:5px;">שמור</button>
        <button onclick="closeProfile()" style="width:100%; margin-top:5px; background:none; border:none; color:gray;">ביטול</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyB_ld3VrntNgM3Pgc4jyZL2hKzUMSp-o10",
      authDomain: "live-video-20fca.firebaseapp.com",
      projectId: "live-video-20fca",
      storageBucket: "live-video-20fca.firebasestorage.app",
      messagingSenderId: "590706792062",
      appId: "1:590706792062:web:1b75b2871f1068f44aaa2f",
      databaseURL: "https://live-video-20fca-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let localStream, peer, isSearching = false, isConnected = false, searchTimer, currentFacingMode = "user";

    // --- אתחול ---
    async function init() {
        localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode }, audio: true });
        document.getElementById('localVideo').srcObject = localStream;
        if(!localStorage.getItem('myChatProfile')) location.reload(); // חזרה לרישום אם אין פרופיל
    }

    // --- מחוות גרירה ---
    let startX, startY;
    document.getElementById('swipe-zone').addEventListener('touchstart', e => {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
    });

    document.getElementById('swipe-zone').addEventListener('touchend', e => {
        let diffX = startX - e.changedTouches[0].clientX;
        let diffY = startY - e.changedTouches[0].clientY;

        if (Math.abs(diffX) > 80) {
            if (diffX > 0) startSearch(); // גרירה שמאלה - חיפוש/הבא
            else backToHome(); // גרירה ימינה - חזרה לבית
        } else if (diffY > 80) {
            backToHome(); // גרירה למעלה - חזרה לבית
        }
    });

    // --- לוגיקה של שיחות ---
    function startSearch() {
        if(isConnected) resetConnection();
        isSearching = true;
        document.getElementById('home-msg').style.display = "none";
        document.getElementById('search-status').style.display = "block";
        document.getElementById('partner-tag').style.display = "none";
        
        searchTimer = setTimeout(() => {
            if(isSearching) {
                alert("לא נמצא משתמש, חוזר לבית");
                backToHome();
            }
        }, 30000);

        // מדמה חיבור
        setTimeout(() => { if(isSearching) onConnect("נקבה"); }, 4000);
    }

    function onConnect(partnerGender) {
        clearTimeout(searchTimer);
        isSearching = false;
        isConnected = true;
        document.getElementById('search-status').style.display = "none";
        document.getElementById('partner-tag').style.display = "block";
        document.getElementById('partner-emoji').innerText = (partnerGender === "זכר") ? "👨" : "👩";
        document.getElementById('chat-box').style.display = "flex";
        document.getElementById('msgs').innerHTML = "שיחה התחילה...";
    }

    function backToHome() {
        resetConnection();
        document.getElementById('home-msg').style.display = "block";
        document.getElementById('search-status').style.display = "none";
        document.getElementById('chat-box').style.display = "none";
        document.getElementById('partner-tag').style.display = "none";
    }

    function resetConnection() {
        clearTimeout(searchTimer);
        isSearching = false;
        isConnected = false;
        document.getElementById('remoteVideo').srcObject = null;
        document.getElementById('msgs').innerHTML = "";
    }

    // --- פרופיל ---
    function showProfile() {
        const p = JSON.parse(localStorage.getItem('myChatProfile'));
        document.getElementById('edit-name').value = p.name;
        document.getElementById('profile-modal').style.display = "flex";
    }

    function saveProfile() {
        const p = JSON.parse(localStorage.getItem('myChatProfile'));
        p.name = document.getElementById('edit-name').value;
        localStorage.setItem('myChatProfile', JSON.stringify(p));
        closeProfile();
    }

    function closeProfile() { document.getElementById('profile-modal').style.display = "none"; }

    function sendMsg() {
        const inp = document.getElementById('chatMsg');
        if(!inp.value) return;
        document.getElementById('msgs').innerHTML += `<div><b>אתה:</b> ${inp.value}</div>`;
        inp.value = '';
    }

    async function switchCamera() {
        currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
        init();
    }

    function confirmReport() { if(confirm("האם לדווח?")) backToHome(); }

    init();
</script>
</body>
</html>
