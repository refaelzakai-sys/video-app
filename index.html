<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VideoChat - Style Omegle</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    
    <style>
        * { box-sizing: border-box; touch-action: none; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* סרגל עליון - כפתורים למעלה */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #eee; border-bottom: 1px solid #ccc; z-index: 10; }
        .btn-small-report { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        .btn-icon { background: none; border: none; font-size: 24px; cursor: pointer; padding: 0 10px; }

        /* מסך הרשמה */
        #setup-screen { position: fixed; inset: 0; background: #fff; z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .form-card { width: 100%; max-width: 400px; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }

        /* אזור הוידאו */
        .video-container { flex: 1; display: flex; background: #000; position: relative; }
        @media (max-width: 768px) { .video-container { flex-direction: column; } }
        
        .v-box { flex: 1; position: relative; border: 1px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .v-label { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.5); color: #fff; padding: 2px 8px; font-size: 12px; }

        /* אזור הצ'אט בסגנון אומיגל */
        #chat-section { height: 180px; display: none; flex-direction: column; border-top: 2px solid #ccc; background: #fff; }
        #messages { flex: 1; overflow-y: auto; padding: 10px; border-bottom: 1px solid #ddd; font-size: 14px; }
        .chat-input-area { display: flex; padding: 5px; background: #fff; }
        .chat-input-area input { flex: 1; border: 1px solid #ccc; padding: 10px; border-radius: 3px; outline: none; }
        .send-btn { background: #eee; border: 1px solid #ccc; padding: 10px 20px; font-weight: bold; cursor: pointer; }

        /* כפתור התחלה מרכזי */
        .footer-controls { padding: 10px; display: flex; justify-content: center; background: #eee; }
        .btn-start-main { background: #ff8000; color: white; padding: 10px 40px; font-size: 18px; border: none; border-radius: 5px; cursor: pointer; }

        #status-bar { text-align: center; background: #fff2e6; font-size: 13px; color: #d35400; display: none; padding: 5px; }
    </style>
</head>
<body>

<div class="top-bar">
    <button class="btn-small-report" onclick="confirmReport()">דיווח</button>
    <div id="logo" style="font-weight: bold; color: #ff8000;">VideoApp</div>
    <button class="btn-icon" onclick="switchCamera()">🔄</button>
</div>

<div id="setup-screen">
    <div class="form-card">
        <h2 style="text-align: center;">הגדרת פרופיל</h2>
        <input type="text" id="u-name" placeholder="שם" style="width:100%; padding:10px; margin-bottom:10px;">
        <input type="date" id="u-dob" style="width:100%; padding:10px; margin-bottom:10px;">
        <select id="u-gender" style="width:100%; padding:10px; margin-bottom:20px;">
            <option value="" disabled selected>מין</option>
            <option value="זכר">זכר</option>
            <option value="נקבה">נקבה</option>
        </select>
        <button class="btn-start-main" style="width:100%" onclick="saveUser()">התחלה</button>
    </div>
</div>

<div id="status-bar">מחפש...</div>

<div class="video-container" id="swipe-area">
    <div class="v-box">
        <video id="remoteVideo" autoplay playsinline></video>
        <div class="v-label">הצד השני</div>
    </div>
    <div class="v-box">
        <video id="localVideo" autoplay muted playsinline></video>
        <div class="v-label">אתה</div>
    </div>
</div>

<div id="chat-section">
    <div id="messages"></div>
    <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="הקלד הודעה...">
        <button class="send-btn" onclick="sendText()">שלח</button>
    </div>
</div>

<div class="footer-controls">
    <button id="start-btn" class="btn-start-main" onclick="toggleSearch()">התחלה</button>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
      apiKey: "AIzaSyB_ld3VrntNgM3Pgc4jyZL2hKzUMSp-o10",
      authDomain: "live-video-20fca.firebaseapp.com",
      projectId: "live-video-20fca",
      storageBucket: "live-video-20fca.firebasestorage.app",
      messagingSenderId: "590706792062",
      appId: "1:590706792062:web:1b75b2871f1068f44aaa2f",
      databaseURL: "https://live-video-20fca-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let localStream, isSearching = false, isConnected = false, currentFacingMode = "user";

    // --- מחוות גרירה (Swipe) ---
    let touchstartX = 0, touchstartY = 0;
    const swipeArea = document.getElementById('swipe-area');

    swipeArea.addEventListener('touchstart', e => {
        touchstartX = e.changedTouches[0].screenX;
        touchstartY = e.changedTouches[0].screenY;
    });

    swipeArea.addEventListener('touchend', e => {
        let touchendX = e.changedTouches[0].screenX;
        let touchendY = e.changedTouches[0].screenY;
        handleSwipe(touchstartX, touchendX, touchstartY, touchendY);
    });

    function handleSwipe(xStart, xEnd, yStart, yEnd) {
        const diffX = xStart - xEnd;
        const diffY = yStart - yEnd;

        if (Math.abs(diffX) > 100) { // גרירה לצדדים - העברת משתמש
            if (isConnected || isSearching) {
                console.log("מעביר למשתמש הבא...");
                toggleSearch(); // מדמה "הבא"
                setTimeout(toggleSearch, 500);
            }
        } else if (diffY < -100) { // גרירה למטה - חזרה לבית
            resetToHome();
        }
    }

    // --- לוגיקה ---
    function saveUser() {
        const name = document.getElementById('u-name').value;
        const dob = document.getElementById('u-dob').value;
        const gender = document.getElementById('u-gender').value;
        if(!name || !dob || !gender) return alert("מלא את כל הפרטים");
        localStorage.setItem('myChatProfile', JSON.stringify({name, dob, gender}));
        document.getElementById('setup-screen').style.display = 'none';
        setupCamera();
    }

    async function setupCamera() {
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode }, audio: true });
        document.getElementById('localVideo').srcObject = localStream;
    }

    async function switchCamera() {
        currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
        await setupCamera();
    }

    function toggleSearch() {
        if (!isSearching && !isConnected) {
            isSearching = true;
            document.getElementById('start-btn').innerText = "עצור";
            document.getElementById('status-bar').style.display = "block";
            setTimeout(mockConnect, 3000); // דימוי חיבור
        } else {
            resetToHome();
        }
    }

    function mockConnect() {
        isSearching = false;
        isConnected = true;
        document.getElementById('status-bar').style.display = "none";
        document.getElementById('start-btn').innerText = "הבא (Next)";
        document.getElementById('chat-section').style.display = "flex";
        document.getElementById('messages').innerHTML = "<b>מחובר!</b><br>";
    }

    function resetToHome() {
        isSearching = false;
        isConnected = false;
        document.getElementById('start-btn').innerText = "התחלה";
        document.getElementById('chat-section').style.display = "none";
        document.getElementById('status-bar').style.display = "none";
        document.getElementById('remoteVideo').srcObject = null;
    }

    function confirmReport() {
        if (confirm("האם לדווח?")) {
            alert("דווח נשלח.");
            resetToHome();
        }
    }

    function sendText() {
        const input = document.getElementById('chatInput');
        if(!input.value) return;
        const msgDiv = document.getElementById('messages');
        msgDiv.innerHTML += `<div><span style="color:blue">אתה:</span> ${input.value}</div>`;
        input.value = '';
        msgDiv.scrollTop = msgDiv.scrollHeight;
    }

    if(localStorage.getItem('myChatProfile')) {
        document.getElementById('setup-screen').style.display = 'none';
        setupCamera();
    }
</script>
</body>
</html>
