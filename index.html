<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VideoApp - Omegle Style</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    
    <style>
        * { box-sizing: border-box; touch-action: none; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: #fff; color: #000; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* כפתורי מערכת למעלה */
        .ui-header { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 15px; z-index: 100; pointer-events: none; }
        .btn-action { background: rgba(0,0,0,0.6); border: none; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; backdrop-filter: blur(5px); pointer-events: auto; font-weight: bold; font-size: 13px; }
        
        /* אזור הוידאו - תופס את רוב המסך */
        .video-section { height: 65vh; display: flex; flex-direction: column; background: #000; position: relative; }
        .v-box { flex: 1; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #222; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* שכבות מידע על הוידאו */
        .label-tag { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.5); color: white; padding: 2px 10px; border-radius: 10px; font-size: 11px; }
        .centered-msg { position: absolute; width: 100%; text-align: center; color: #555; font-size: 18px; z-index: 5; pointer-events: none; }

        /* צ'אט אומיגל - נמצא מתחת לוידאו */
        #chat-container { height: 35vh; display: none; flex-direction: column; background: #f4f4f4; border-top: 1px solid #ccc; }
        #msg-flow { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; background: white; }
        .input-area { display: flex; padding: 8px; background: #eee; gap: 8px; }
        .input-area input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; outline: none; }
        .send-btn { background: #ff8000; color: white; border: none; padding: 0 15px; border-radius: 5px; font-weight: bold; }

        /* מודאל פרופיל */
        #profile-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; }
        .modal-body { background: white; padding: 20px; border-radius: 10px; width: 80%; max-width: 300px; }
    </style>
</head>
<body>

<div class="ui-header">
    <button id="p-btn" class="btn-action" onclick="showP()">פרופיל 👤</button>
    <button id="r-btn" class="btn-action" style="background:#d63031; display:none;" onclick="report()">דיווח</button>
    <button class="btn-action" onclick="switchCam()">🔄</button>
</div>

<div class="video-section" id="swipe-zone">
    <div class="v-box">
        <div id="hint-text" class="centered-msg">גרור שמאלה לחיפוש ⬅️</div>
        <div id="search-text" class="centered-msg" style="display:none; color:#ff8000;">מחפש...</div>
        <video id="remoteVid" autoplay playsinline></video>
        <div id="p-tag" class="label-tag" style="display:none;">הצד השני <span id="p-emoji"></span></div>
    </div>
    
    <div class="v-box">
        <video id="localVid" autoplay muted playsinline></video>
        <div class="label-tag">אתה</div>
    </div>
</div>

<div id="chat-container">
    <div id="msg-flow"></div>
    <div class="input-area">
        <input type="text" id="chatInp" placeholder="כתוב הודעה...">
        <button class="send-btn" onclick="send()">שלח</button>
    </div>
</div>

<div id="profile-modal">
    <div class="modal-body">
        <h3 style="margin-bottom:10px;">עריכת שם</h3>
        <input type="text" id="name-inp" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:5px;">
        <button onclick="saveP()" style="width:100%; padding:10px; background:#2ecc71; border:none; color:white; border-radius:5px; font-weight:bold;">שמור</button>
        <button onclick="hideP()" style="width:100%; margin-top:10px; border:none; background:none; color:gray;">ביטול</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyB_ld3VrntNgM3Pgc4jyZL2hKzUMSp-o10",
      authDomain: "live-video-20fca.firebaseapp.com",
      projectId: "live-video-20fca",
      storageBucket: "live-video-20fca.firebasestorage.app",
      messagingSenderId: "590706792062",
      appId: "1:590706792062:web:1b75b2871f1068f44aaa2f",
      databaseURL: "https://live-video-20fca-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);

    let stream, searching = false, connected = false, timer, dir = "user";

    async function init() {
        if(stream) stream.getTracks().forEach(t => t.stop());
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: dir }, audio: true });
        document.getElementById('localVid').srcObject = stream;
    }

    // ניהול סוואיפ
    let x0, y0;
    document.getElementById('swipe-zone').addEventListener('touchstart', e => { x0 = e.touches[0].clientX; y0 = e.touches[0].clientY; });
    document.getElementById('swipe-zone').addEventListener('touchend', e => {
        let dx = x0 - e.changedTouches[0].clientX;
        let dy = y0 - e.changedTouches[0].clientY;
        if(Math.abs(dx) > 80) dx > 0 ? start() : goHome();
        else if(Math.abs(dy) > 80) goHome();
    });

    function start() {
        goHome();
        searching = true;
        document.getElementById('hint-text').style.display = "none";
        document.getElementById('search-text').style.display = "block";
        document.getElementById('p-btn').style.display = "none";
        
        timer = setTimeout(() => {
            if(searching) { alert("לא נמצא משתמש"); goHome(); }
        }, 30000);

        // דימוי חיבור (למטרת פיתוח הממשק)
        setTimeout(() => { if(searching) onJoin("נקבה"); }, 3000);
    }

    function onJoin(gender) {
        clearTimeout(timer);
        searching = false; connected = true;
        document.getElementById('search-text').style.display = "none";
        document.getElementById('p-tag').style.display = "block";
        document.getElementById('p-emoji').innerText = (gender === "זכר") ? "👨" : "👩";
        document.getElementById('chat-container').style.display = "flex";
        document.getElementById('r-btn').style.display = "block";
    }

    function goHome() {
        clearTimeout(timer);
        searching = connected = false;
        document.getElementById('hint-text').style.display = "block";
        document.getElementById('search-text').style.display = "none";
        document.getElementById('p-btn').style.display = "block";
        document.getElementById('r-btn').style.display = "none";
        document.getElementById('chat-container').style.display = "none";
        document.getElementById('p-tag').style.display = "none";
        document.getElementById('remoteVid').srcObject = null;
        document.getElementById('msg-flow').innerHTML = "";
    }

    // פרופיל
    function showP() {
        const p = JSON.parse(localStorage.getItem('myChatProfile'));
        document.getElementById('name-inp').value = p.name;
        document.getElementById('profile-modal').style.display = "flex";
    }
    function saveP() {
        const p = JSON.parse(localStorage.getItem('myChatProfile'));
        p.name = document.getElementById('name-inp').value;
        localStorage.setItem('myChatProfile', JSON.stringify(p));
        hideP();
    }
    function hideP() { document.getElementById('profile-modal').style.display = "none"; }

    // צ'אט
    function send() {
        const inp = document.getElementById('chatInp');
        if(!inp.value) return;
        const flow = document.getElementById('msg-flow');
        flow.innerHTML += `<div><b style="color:#ff8000">אתה:</b> ${inp.value}</div>`;
        inp.value = "";
        flow.scrollTop = flow.scrollHeight;
    }

    function switchCam() { dir = (dir === "user") ? "environment" : "user"; init(); }

    function report() { if(confirm("לדווח על המשתמש?")) goHome(); }

    init();
</script>
</body>
</html>
