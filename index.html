<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VideoApp - Fix</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <style>
        * { box-sizing: border-box; touch-action: none; margin: 0; padding: 0; }
        body { font-family: system-ui; background: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .header { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 15px; z-index: 100; pointer-events: none; }
        .btn { background: rgba(0,0,0,0.7); border: none; color: white; padding: 10px 18px; border-radius: 25px; cursor: pointer; pointer-events: auto; font-weight: bold; }
        .video-grid { height: 70vh; display: flex; flex-direction: column; background: #000; }
        .v-box { flex: 1; position: relative; border-bottom: 1px solid #333; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #chat-area { height: 30vh; display: none; flex-direction: column; background: #fff; border-top: 2px solid #eee; }
        #messages { flex: 1; overflow-y: auto; padding: 10px; }
        .controls { display: flex; padding: 10px; background: #eee; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #ccc; }
        .status { position: absolute; width: 100%; text-align: center; color: #888; z-index: 10; font-size: 18px; }
    </style>
</head>
<body>

<div class="header">
    <button id="p-btn" class="btn" onclick="openProfile()">פרופיל 👤</button>
    <button id="r-btn" class="btn" style="background:#e74c3c; display:none;" onclick="report()">דיווח</button>
    <button class="btn" onclick="flipCamera()">🔄</button>
</div>

<div class="video-grid" id="touch-zone">
    <div class="v-box">
        <div id="h-msg" class="status">גרור שמאלה לחיפוש ⬅️</div>
        <div id="s-msg" class="status" style="display:none; color:#ff8000;">מחפש... (<span id="sec">30</span>)</div>
        <video id="remoteV" autoplay playsinline></video>
    </div>
    <div class="v-box">
        <video id="localV" autoplay muted playsinline></video>
    </div>
</div>

<div id="chat-area">
    <div id="messages"></div>
    <div class="controls">
        <input type="text" id="chatIn" placeholder="כתוב הודעה...">
        <button onclick="sendMsg()" style="background:#ff8000; color:white; border:none; padding:10px 20px; border-radius:8px;">שלח</button>
    </div>
</div>

<script>
    // 1. תבדוק שהכתובת הזו מדויקת מה-Render שלך (כולל https:// ובלי / בסוף)
    const RENDER_URL = "https://video-app-backend.onrender.com"; 
    const socket = io(RENDER_URL);

    const peer = new Peer(undefined, {
        config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
    });

    let myStream, myId, isSearching = false, timer, timeLeft = 30, facing = "user";

    // בדיקת חיבור לשרת
    socket.on('connect', () => console.log("מחובר לשרת ה-Socket!"));
    socket.on('connect_error', () => alert("שגיאה בחיבור לשרת ב-Render. וודא שהשרת רץ."));

    peer.on('open', id => {
        myId = id;
        console.log("PeerID מוכן: " + id);
    });

    async function init() {
        if(myStream) myStream.getTracks().forEach(t => t.stop());
        myStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facing }, audio: true });
        document.getElementById('localV').srcObject = myStream;
    }

    // פונקציית החיפוש שהופעלה ע"י הגרירה
    function startSearch() {
        if (!myId) {
            alert("המערכת עדיין מתחברת, נסה שוב בעוד שנייה");
            return;
        }
        
        resetUI();
        isSearching = true;
        document.getElementById('h-msg').style.display = "none";
        document.getElementById('s-msg').style.display = "block";
        document.getElementById('p-btn').style.display = "none";

        // שליחה לשרת
        const profile = JSON.parse(localStorage.getItem('myChatProfile')) || {gender:"זכר"};
        socket.emit('find-partner', { peerId: myId, gender: profile.gender });

        timeLeft = 30;
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('sec').innerText = timeLeft;
            if(timeLeft <= 0) {
                alert("לא נמצא משתמש");
                resetUI();
            }
        }, 1000);
    }

    socket.on('partner-found', data => {
        clearInterval(timer);
        isSearching = false;
        document.getElementById('s-msg').style.display = "none";
        document.getElementById('chat-area').style.display = "flex";
        document.getElementById('r-btn').style.display = "block";
        
        const call = peer.call(data.peerId, myStream);
        call.on('stream', rs => document.getElementById('remoteV').srcObject = rs);
    });

    peer.on('call', call => {
        call.answer(myStream);
        call.on('stream', rs => {
            document.getElementById('remoteV').srcObject = rs;
            document.getElementById('chat-area').style.display = "flex";
            document.getElementById('r-btn').style.display = "block";
            document.getElementById('s-msg').style.display = "none";
            clearInterval(timer);
        });
    });

    function resetUI() {
        clearInterval(timer);
        isSearching = false;
        document.getElementById('h-msg').style.display = "block";
        document.getElementById('s-msg').style.display = "none";
        document.getElementById('p-btn').style.display = "block";
        document.getElementById('r-btn').style.display = "none";
        document.getElementById('chat-area').style.display = "none";
        document.getElementById('remoteV').srcObject = null;
    }

    // גרירה (Swipe) - וודא שאתה גורר על אזור הוידאו
    let startX;
    document.getElementById('touch-zone').addEventListener('touchstart', e => startX = e.touches[0].clientX);
    document.getElementById('touch-zone').addEventListener('touchend', e => {
        let diff = startX - e.changedTouches[0].clientX;
        if(diff > 50) startSearch(); // גרירה שמאלה
    });

    function flipCamera() { facing = (facing === "user" ? "environment" : "user"); init(); }
    function sendMsg() { /* לוגיקת שליחה */ }
    function openProfile() { alert("פרופיל ייפתח כאן"); }
    function report() { if(confirm("לדווח?")) resetUI(); }

    init();
</script>
</body>
</html>
