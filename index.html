<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VideoApp Pro - Fast Switch & Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #000; height: 100vh; display: flex; flex-direction: column; color: white; overflow: hidden; }
        
        .header { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-between; padding: 0 15px; z-index: 100; pointer-events: none; }
        .btn { background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px 18px; border-radius: 30px; cursor: pointer; pointer-events: auto; font-weight: bold; }
        
        .video-container { height: 65vh; display: flex; flex-direction: column; position: relative; background: #000; }
        .v-box { flex: 1; position: relative; border-bottom: 2px solid #111; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; z-index: 5; background: #000; }
        
        .pfp-placeholder { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 2; filter: blur(10px); opacity: 0.5; }
        .status-msg { position: absolute; z-index: 20; color: #fff; text-align: center; width: 100%; pointer-events: none; }

        #chat-section { height: 35vh; display: none; flex-direction: column; background: #fff; color: #000; z-index: 50; }
        #messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; background: #f9f9f9; }
        .msg { max-width: 80%; padding: 10px; border-radius: 15px; font-size: 15px; }
        .msg.me { align-self: flex-start; background: #e2e2e2; }
        .msg.partner { align-self: flex-end; background: #007bff; color: #fff; }
        
        .chat-input-area { display: flex; padding: 10px; background: #eee; gap: 10px; }
        .chat-input-area input { flex: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid #ccc; outline: none; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #fff; color: #333; width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; }
    </style>
</head>
<body>

<div class="header">
    <div></div>
    <button id="btn-report" class="btn" style="background:#c0392b; display:none;" onclick="startSearching()">דווח ועבור 🚩</button>
    <button class="btn" onclick="switchCamera()">🔄 החלף מצלמה</button>
</div>

<div class="video-container" id="swipe-zone">
    <div class="v-box">
        <div id="msg-idle" class="status-msg">⬅️ שמאלה לחיפוש | ימינה לסגירה ➡️</div>
        <div id="msg-search" class="status-msg" style="display:none; color:#3498db;">מחפש שותף...</div>
        <img id="partner-pfp" class="pfp-placeholder" src="" style="display:none;">
        <video id="remoteVideo" autoplay playsinline></video>
    </div>
    <div class="v-box" style="height: 40%;">
        <video id="localVideo" autoplay muted playsinline></video>
    </div>
</div>

<div id="chat-section">
    <div id="messages"></div>
    <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="הודעה..." onkeypress="if(event.key==='Enter') sendChatMessage()">
        <button onclick="sendChatMessage()" style="border:none; background:none; font-size:22px;">🚀</button>
    </div>
</div>

<div id="regModal" class="modal">
    <div class="modal-content">
        <h2 style="text-align:center;">הגדרות</h2>
        <input type="text" id="reg-name" placeholder="שם">
        <input type="email" id="reg-email" placeholder="אימייל">
        <input type="file" id="reg-pfp" accept="image/*">
        <select id="reg-gender"><option value="זכר">זכר</option><option value="נקבה">נקבה</option></select>
        <button id="reg-submit" class="btn" style="background:#2ecc71; width:100%; margin-top:15px; border:none;" onclick="handleRegistration()">המשך</button>
    </div>
</div>

<script>
    const SERVER_URL = "https://video-app-ylx4.onrender.com"; 
    const socket = io(SERVER_URL);
    const peer = new Peer(undefined);

    const firebaseConfig = {
      apiKey: "AIzaSyB_ld3VrntNgM3Pgc4jyZL2hKzUMSp-o10",
      authDomain: "live-video-20fca.firebaseapp.com",
      projectId: "live-video-20fca",
      storageBucket: "live-video-20fca.firebasestorage.app",
      messagingSenderId: "590706792062",
      appId: "1:590706792062:web:1b75b2871f1068f44aaa2f"
    };
    firebase.initializeApp(firebaseConfig);
    const storage = firebase.storage();

    let myStream, myPeerId, currentCall, isSearching = false, camFacing = "user";

    window.onload = () => {
        if (!localStorage.getItem('user_v4')) document.getElementById('regModal').style.display = 'flex';
        else initCamera();
    };

    async function handleRegistration() {
        const email = document.getElementById('reg-email').value;
        const pfpFile = document.getElementById('reg-pfp').files[0];
        let pfpUrl = "";
        if (pfpFile) {
            const ref = storage.ref(`profiles/${email}`);
            await ref.put(pfpFile);
            pfpUrl = await ref.getDownloadURL();
        }
        localStorage.setItem('user_v4', JSON.stringify({ email, pfp: pfpUrl, gender: document.getElementById('reg-gender').value }));
        document.getElementById('regModal').style.display = 'none';
        initCamera();
    }

    async function initCamera() {
        if (myStream) {
            myStream.getTracks().forEach(t => t.stop()); // סגירה מוחלטת לפני פתיחה מחדש
        }
        try {
            myStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: camFacing, width: { ideal: 640 }, height: { ideal: 480 } }, 
                audio: true 
            });
            document.getElementById('localVideo').srcObject = myStream;

            if (currentCall && currentCall.peerConnection) {
                const videoTrack = myStream.getVideoTracks()[0];
                const sender = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
                if (sender) sender.replaceTrack(videoTrack);
            }
        } catch (e) { console.error("Camera error", e); }
    }

    function switchCamera() {
        camFacing = (camFacing === "user" ? "environment" : "user");
        initCamera();
    }

    peer.on('open', id => myPeerId = id);

    function startSearching() {
        if (!myPeerId || isSearching) return;
        if (currentCall) currentCall.close();
        isSearching = true;
        
        document.getElementById('messages').innerHTML = "";
        document.getElementById('msg-idle').style.display = "none";
        document.getElementById('msg-search').style.display = "block";
        document.getElementById('chat-section').style.display = "none";
        document.getElementById('remoteVideo').srcObject = null;

        const user = JSON.parse(localStorage.getItem('user_v4'));
        socket.emit('find-partner', { peerId: myPeerId, gender: user.gender, pfpUrl: user.pfp });
    }

    function stopEverything() {
        isSearching = false;
        socket.emit('leave-chat');
        if (currentCall) currentCall.close();
        document.getElementById('msg-idle').style.display = "block";
        document.getElementById('msg-search').style.display = "none";
        document.getElementById('chat-section').style.display = "none";
        document.getElementById('remoteVideo').srcObject = null;
    }

    socket.on('partner-found', data => {
        isSearching = false;
        openChatUI(data.pfpUrl);
        currentCall = peer.call(data.peerId, myStream);
        handleCall(currentCall);
    });

    peer.on('call', call => {
        call.answer(myStream);
        currentCall = call;
        openChatUI();
        handleCall(call);
    });

    function handleCall(call) {
        call.on('stream', s => {
            document.getElementById('remoteVideo').srcObject = s;
            document.getElementById('partner-pfp').style.display = "none";
        });
        call.on('close', () => { if(!isSearching) startSearching(); });
    }

    function openChatUI(pfp) {
        document.getElementById('msg-search').style.display = "none";
        document.getElementById('chat-section').style.display = "flex";
        document.getElementById('btn-report').style.display = "block";
        if (pfp) {
            document.getElementById('partner-pfp').src = pfp;
            document.getElementById('partner-pfp').style.display = "block";
        }
    }

    function sendChatMessage() {
        const input = document.getElementById('chatInput');
        if (!input.value.trim()) return;
        socket.emit('send-chat-msg', input.value);
        addMsg('me', input.value);
        input.value = "";
    }

    socket.on('receive-chat-msg', msg => addMsg('partner', msg));

    function addMsg(type, text) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        const msgs = document.getElementById('messages');
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
    }

    socket.on('partner-disconnected', () => startSearching());

    // מחוות Swipe
    let startX = 0;
    document.getElementById('swipe-zone').addEventListener('touchstart', e => startX = e.touches[0].clientX);
    document.getElementById('swipe-zone').addEventListener('touchend', e => {
        const diff = startX - e.changedTouches[0].clientX;
        if (diff > 70) startSearching(); // שמאלה: חיפוש/החלפה
        else if (diff < -70) stopEverything(); // ימינה: סיום/בית
    });
</script>
</body>
</html>
